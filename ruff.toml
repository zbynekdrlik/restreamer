target-version = "py311"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "DJ",   # flake8-django
    "SIM",  # flake8-simplify
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "S101",  # assert usage
    "S105",  # hardcoded password string (false positives)
    "S106",  # hardcoded password argument (false positives)
    "S107",  # hardcoded password default (false positives)
    "DJ001", # nullable CharField
    "T201",  # print statement (used intentionally)
    "B008",  # function call in default argument
    "UP009", # UTF-8 encoding declaration
    "S603",  # subprocess without shell=True check
    "S607",  # start process with partial path
    "S602",  # subprocess with shell=True
    "S113",  # request without timeout
    "S308",  # suspicious mark_safe usage
    "S301",  # suspicious pickle usage
    "S324",  # hashlib insecure hash function
    "DJ008", # model without __str__
    "E722",  # bare except
    "SIM102", # collapsible if
    "SIM108", # if-else-block instead of ternary
    "SIM113", # enumerate for loop
    "SIM115", # open file with context handler
    "SIM212", # if-expr with twisted arms
    "UP031",  # printf string formatting
    "F403",   # undefined local with import star
    "F811",   # redefined while unused
    "E402",   # module import not at top of file
]

[lint.per-file-ignores]
"*/migrations/*.py" = ["E", "W", "F", "I", "B", "C4", "UP", "DJ", "SIM", "S", "T20"]
"*/settings*.py" = ["S", "E402"]
"*/manage.py" = ["T201"]

[format]
quote-style = "double"
