<body class="">

<header> 
    {% block header %}

    {% endblock header %}

{% block sidebar %}
{% include 'base/navbar.html' %}
{% endblock sidebar %}


<main>
{% block content %}

{% endblock content %}
</main>


<footer class="footer">
    {% include 'base/footer.html' %}
</footer>

{% block javascript %}

<!-- websocket -->
<script>
    console.log('WebSocket script loaded');

    const socket = new WebSocket('wss://' + window.location.host + '/ws/buffer_health/');

    socket.onopen = function(e) {
        console.log('WebSocket connection established');
    };

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        console.log('Received data:', data);
        document.getElementById('buffer-health').innerText = data.message.buffer_duration;
    };

    socket.onerror = function(e) {
        console.error('WebSocket error:', e);
    };

    socket.onclose = function(e) {
        console.error('WebSocket closed unexpectedly');
    };
</script>

<script id="notyf-messages" type="application/json">
    [
    {% for message in messages %}
        {
            "message": "{{ message.message|escapejs }}",
            "tags": "{{ message.tags }}"
        }{% if not forloop.last %},{% endif %}
    {% endfor %}
    ]
</script>

{% endblock %}


<script src="{% static 'js/script.js' %}" type="text/javascript"></script>
