{% extends 'base/base_auth.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h2 class="mb-0">Password Reset Complete</h2>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">Your password has been successfully reset. You can now log in with your new password.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
