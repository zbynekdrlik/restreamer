name: Rust CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_stream_lan:
        description: "Deploy to stream.lan after CI passes"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Rust changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'local-client-rs/**'
              - '.github/workflows/rust-ci.yml'
              - '.github/workflows/rust-release.yml'

  version-check:
    name: Version check
    needs: changes
    if: needs.changes.outputs.rust == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require Cargo.toml version bump on PR to main
        run: |
          PR_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:local-client-rs/Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "PR version:   $PR_VERSION"
          echo "Main version: $MAIN_VERSION"

          # Compare versions using Python
          pip install packaging --quiet

          python3 -c "
          from packaging.version import Version
          pr = Version('$PR_VERSION')
          main = Version('$MAIN_VERSION')
          if pr <= main:
              import sys
              print()
              print('ERROR: Cargo.toml version must be bumped higher than main.')
              print(f'  Current main: {main}')
              print(f'  This PR:      {pr}')
              parts = str(main).split('.')
              major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
              print()
              print('Suggested next versions:')
              print(f'  Patch: {major}.{minor}.{patch + 1}')
              print(f'  Minor: {major}.{minor + 1}.0')
              print(f'  Major: {major + 1}.0.0')
              sys.exit(1)
          print(f'Version bump OK: {main} -> {pr}')
          "
      - name: Check Cargo.toml version is not already tagged
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="local-client-rs-v${VERSION}"
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          if git tag -l | grep -qx "$TAG"; then
            echo "ERROR: Tag $TAG already exists. Bump the version in Cargo.toml."
            exit 1
          fi
          echo "OK: Tag $TAG does not exist yet."

  lint:
    name: Lint (fmt + clippy)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $ffmpegZip = "$env:TEMP\ffmpeg.zip"
          $ffmpegDir = "C:\ffmpeg"

          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip

          Write-Host "Extracting ffmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath $env:TEMP -Force

          # Find the extracted folder (includes version number)
          $extractedDir = Get-ChildItem "$env:TEMP\ffmpeg-*-essentials_build" | Select-Object -First 1
          if ($extractedDir) {
            Move-Item "$($extractedDir.FullName)\bin" $ffmpegDir -Force
            Write-Host "Installed ffmpeg to $ffmpegDir"
            echo "$ffmpegDir" >> $env:GITHUB_PATH
          } else {
            Write-Error "Failed to find extracted ffmpeg directory"
            exit 1
          }
      - name: Verify ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          C:\ffmpeg\ffmpeg.exe -version
      - name: Run tests
        run: cargo test --workspace --verbose
        env:
          SQLX_OFFLINE: true

  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --workspace --exclude-files "src-tauri/*" --fail-under 55 --skip-clean --timeout 300

  security:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0134

  build-tauri:
    name: Build Tauri app
    needs: [changes, lint, test]
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install trunk and wasm-bindgen-cli
        run: |
          cargo install trunk wasm-bindgen-cli
      - name: Install binaryen (wasm-opt)
        shell: pwsh
        run: |
          # Download and extract binaryen for wasm optimization
          $version = "version_123"
          $url = "https://github.com/WebAssembly/binaryen/releases/download/$version/binaryen-$version-x86_64-windows.tar.gz"
          $outFile = "$env:TEMP\binaryen.tar.gz"
          $retries = 3
          for ($i = 1; $i -le $retries; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 120
              break
            } catch {
              Write-Host "Download attempt $i failed: $_"
              if ($i -eq $retries) { throw "Failed to download binaryen after $retries attempts" }
              Start-Sleep -Seconds 10
            }
          }
          tar -xzf $outFile -C $env:TEMP
          Copy-Item "$env:TEMP\binaryen-$version\bin\wasm-opt.exe" "$env:CARGO_HOME\bin\"
          Write-Host "Installed wasm-opt to $env:CARGO_HOME\bin\"
      - name: Build Leptos UI (WASM)
        run: |
          cd leptos-ui
          trunk build --release
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Tauri app
        run: cargo tauri build
        env:
          SQLX_OFFLINE: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Tauri installer
        uses: actions/upload-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: local-client-rs/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

  file-size:
    name: File size check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no .rs file exceeds 1000 lines
        run: |
          OVERSIZED=$(find local-client-rs -name '*.rs' -exec sh -c 'lines=$(wc -l < "$1"); if [ "$lines" -gt 1000 ]; then echo "$1: $lines lines"; fi' _ {} \;)
          if [ -n "$OVERSIZED" ]; then
            echo "ERROR: The following Rust files exceed 1000 lines:"
            echo "$OVERSIZED"
            exit 1
          fi
          echo "OK: All Rust files are within the 1000-line limit."

  test-integrity:
    name: Test integrity check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Scan for #[ignore] on tests
        run: |
          IGNORED=$(grep -rn '#\[ignore\]' --include='*.rs' . || true)
          if [ -n "$IGNORED" ]; then
            echo "ERROR: Found #[ignore] attributes on tests. All tests must run."
            echo "$IGNORED"
            exit 1
          fi
          echo "OK: No #[ignore] attributes found."
      - name: Scan for assert!(true) false positives
        run: |
          FALSE_POS=$(grep -rn 'assert!(true)' --include='*.rs' . || true)
          if [ -n "$FALSE_POS" ]; then
            echo "ERROR: Found assert!(true) — tests must verify real behavior."
            echo "$FALSE_POS"
            exit 1
          fi
          echo "OK: No assert!(true) found."
      - name: Scan for empty test bodies
        run: |
          # Find test functions whose body is just {} or { } with nothing meaningful
          EMPTY=$(grep -Pzo '#\[test\]\s*\n\s*(async\s+)?fn\s+\w+\([^)]*\)[^{]*\{\s*\}' --include='*.rs' -rn . || true)
          if [ -n "$EMPTY" ]; then
            echo "ERROR: Found empty test bodies — tests must contain real assertions."
            echo "$EMPTY"
            exit 1
          fi
          echo "OK: No empty test bodies found."
      - name: Scan for assert_eq with trivial values
        run: |
          # Catch assert_eq!(1, 1), assert_eq!(true, true), etc.
          TRIVIAL=$(grep -rn 'assert_eq!(1,\s*1)\|assert_eq!(true,\s*true)\|assert_eq!("",\s*"")' --include='*.rs' . || true)
          if [ -n "$TRIVIAL" ]; then
            echo "ERROR: Found trivial assertions — tests must verify real behavior."
            echo "$TRIVIAL"
            exit 1
          fi
          echo "OK: No trivial assertions found."
      - name: Verify zero ignored tests in cargo test output
        run: |
          # Run tests and capture output
          OUTPUT=$(cargo test --workspace 2>&1)
          echo "$OUTPUT"

          # Check for any ignored tests
          IGNORED_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ ignored' | grep -v '0 ignored' || true)
          if [ -n "$IGNORED_COUNT" ]; then
            echo "ERROR: Some tests were ignored:"
            echo "$IGNORED_COUNT"
            exit 1
          fi

          # Check for any filtered tests
          FILTERED_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ filtered out' | grep -v '0 filtered out' || true)
          if [ -n "$FILTERED_COUNT" ]; then
            echo "ERROR: Some tests were filtered out:"
            echo "$FILTERED_COUNT"
            exit 1
          fi

          # Verify at least a minimum number of tests ran
          TOTAL_PASSED=$(echo "$OUTPUT" | grep -oP '(\d+) passed' | grep -oP '\d+' | paste -sd+ | bc)
          echo "Total tests passed: $TOTAL_PASSED"
          if [ "$TOTAL_PASSED" -lt 120 ]; then
            echo "ERROR: Expected at least 120 tests, but only $TOTAL_PASSED passed."
            echo "This may indicate tests were removed or are not being discovered."
            exit 1
          fi

          echo "OK: All $TOTAL_PASSED tests ran with 0 ignored and 0 filtered."
      - name: Verify deploy-stream-lan has always() condition
        run: |
          # Check that deploy-stream-lan job uses always() to prevent incorrect skipping
          WORKFLOW_FILE="../.github/workflows/rust-ci.yml"
          DEPLOY_CONDITION=$(grep -A3 "deploy-stream-lan:" "$WORKFLOW_FILE" | grep "if:" || true)

          if [ -z "$DEPLOY_CONDITION" ]; then
            echo "ERROR: deploy-stream-lan job missing 'if' condition"
            exit 1
          fi

          if ! echo "$DEPLOY_CONDITION" | grep -q "always()"; then
            echo "ERROR: deploy-stream-lan job MUST use always() to ensure condition evaluation"
            echo "Found: $DEPLOY_CONDITION"
            echo ""
            echo "Without always(), the job may be incorrectly skipped when needed jobs"
            echo "have complex conditions (like rust-ci-gate with if: always())."
            exit 1
          fi

          echo "OK: deploy-stream-lan uses always() in condition."
      - name: Verify auto-release has always() condition
        run: |
          # Check that auto-release job uses always() to prevent incorrect skipping
          WORKFLOW_FILE="../.github/workflows/rust-ci.yml"
          RELEASE_CONDITION=$(grep -A3 "auto-release:" "$WORKFLOW_FILE" | grep "if:" || true)

          if [ -z "$RELEASE_CONDITION" ]; then
            echo "ERROR: auto-release job missing 'if' condition"
            exit 1
          fi

          if ! echo "$RELEASE_CONDITION" | grep -q "always()"; then
            echo "ERROR: auto-release job MUST use always() to ensure condition evaluation"
            echo "Found: $RELEASE_CONDITION"
            exit 1
          fi

          echo "OK: auto-release uses always() in condition."

  frontend-e2e:
    name: Frontend E2E (Playwright)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check if npm-based frontend exists
        id: check-npm
        run: |
          if [ -f "package-lock.json" ] && grep -q "playwright" package.json 2>/dev/null; then
            echo "has_playwright=true" >> $GITHUB_OUTPUT
          else
            echo "has_playwright=false" >> $GITHUB_OUTPUT
            echo "Skipping Playwright tests - Leptos/WASM frontend does not use npm"
          fi
      - name: Install dependencies
        if: steps.check-npm.outputs.has_playwright == 'true'
        run: npm ci
      - name: Install Playwright browsers
        if: steps.check-npm.outputs.has_playwright == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        if: steps.check-npm.outputs.has_playwright == 'true'
        run: npx playwright test
      - name: Upload test results
        if: always() && steps.check-npm.outputs.has_playwright == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: local-client-rs/playwright-report/
          if-no-files-found: ignore
      - name: Skip message for Leptos frontend
        if: steps.check-npm.outputs.has_playwright == 'false'
        run: echo "Frontend E2E tests skipped - using Leptos/WASM frontend"

  rust-ci-gate:
    name: Rust CI Gate
    if: always()
    needs:
      [
        changes,
        version-check,
        lint,
        test,
        coverage,
        security,
        build-tauri,
        file-size,
        test-integrity,
        frontend-e2e,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "changes:        ${{ needs.changes.result }}"
          echo "version-check:  ${{ needs.version-check.result }}"
          echo "lint:           ${{ needs.lint.result }}"
          echo "test:           ${{ needs.test.result }}"
          echo "coverage:       ${{ needs.coverage.result }}"
          echo "security:       ${{ needs.security.result }}"
          echo "build-tauri:    ${{ needs.build-tauri.result }}"
          echo "file-size:      ${{ needs.file-size.result }}"
          echo "test-integrity: ${{ needs.test-integrity.result }}"
          echo "frontend-e2e:   ${{ needs.frontend-e2e.result }}"

          # If no Rust changes, all skipped jobs are fine
          if [[ "${{ needs.changes.outputs.rust }}" != "true" ]]; then
            echo "No Rust changes detected — gate passes."
            exit 0
          fi

          # All must succeed when Rust files changed
          FAILED=0

          # version-check is only required on pull_request (skipped on push is OK)
          VERSION_RESULT="${{ needs.version-check.result }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "$VERSION_RESULT" != "success" ]]; then
              echo "FAIL: version-check did not succeed (result: $VERSION_RESULT)"
              FAILED=1
            fi
          else
            echo "version-check: $VERSION_RESULT (OK - only required on PRs)"
          fi

          # All other jobs must succeed
          for job_result in \
            "lint:${{ needs.lint.result }}" \
            "test:${{ needs.test.result }}" \
            "coverage:${{ needs.coverage.result }}" \
            "security:${{ needs.security.result }}" \
            "build-tauri:${{ needs.build-tauri.result }}" \
            "file-size:${{ needs.file-size.result }}" \
            "test-integrity:${{ needs.test-integrity.result }}" \
            "frontend-e2e:${{ needs.frontend-e2e.result }}"; do
            name="${job_result%%:*}"
            result="${job_result##*:}"
            if [[ "$result" != "success" ]]; then
              echo "FAIL: $name did not succeed (result: $result)"
              FAILED=1
            fi
          done

          if [[ "$FAILED" == "1" ]]; then
            exit 1
          fi

          echo "All Rust CI checks passed!"

  deploy-stream-lan:
    name: Deploy to stream.lan
    needs: [rust-ci-gate, build-tauri]
    if: always() && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.rust-ci-gate.result == 'success' && needs.build-tauri.result == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    steps:
      - name: Clean old artifacts
        shell: powershell
        run: |
          # Remove old artifacts to prevent version mix-ups on self-hosted runner
          Remove-Item -Path "artifacts" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned artifacts directory"

      - name: Download Tauri installer
        uses: actions/download-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: artifacts/tauri

      - name: List artifacts
        run: |
          Write-Host "=== Tauri installer (unified app with embedded service) ==="
          Get-ChildItem artifacts/tauri/
        shell: powershell

      - name: Deploy unified app
        shell: powershell
        run: |
          # Deploy unified Tauri app (contains embedded service - no separate service binary)
          $ErrorActionPreference = "Continue"

          $stagingDir = "C:\ProgramData\Restreamer\staging"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          $installer = Get-ChildItem "artifacts/tauri/*.exe" | Select-Object -First 1
          Copy-Item $installer.FullName "$stagingDir\Restreamer-Setup.exe" -Force
          Write-Host "Staged: $($installer.Name)"

          # Stop old processes (both old service and tray)
          Write-Host "=== Stopping old processes ==="
          net stop "restreamer-service" 2>&1 | Out-Null
          taskkill /F /IM "restreamer-service.exe" 2>&1 | Out-Null
          taskkill /F /IM "restreamer-tray.exe" 2>&1 | Out-Null
          taskkill /F /IM "Restreamer.exe" 2>&1 | Out-Null

          # CRITICAL: Stop and disable old Python NSSM services that block RTMP port 1234
          Write-Host "=== Disabling legacy Python services ==="
          foreach ($svc in @("inpoint_service", "endpoint_service")) {
            $service = Get-Service -Name $svc -ErrorAction SilentlyContinue
            if ($service) {
              Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
              Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
              Write-Host "Disabled: $svc"
            }
          }
          # Kill any ffmpeg processes spawned by old services (they hold RTMP port 1234)
          taskkill /F /IM "ffmpeg.exe" 2>&1 | Out-Null
          Start-Sleep -Seconds 2

          # Remove old service if it exists (unified app doesn't use Windows service)
          Write-Host "=== Removing old Windows service ==="
          sc.exe stop "restreamer-service" 2>&1 | Out-Null
          sc.exe delete "restreamer-service" 2>&1 | Out-Null

          # Clean up old files from previous two-binary architecture
          Write-Host "=== Cleaning up old files ==="
          $InstallDir = "C:\Program Files\Restreamer"
          Remove-Item "$InstallDir\restreamer-service.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$InstallDir\restreamer-tray.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$stagingDir\restreamer-service.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$stagingDir\deploy.ps1" -Force -ErrorAction SilentlyContinue

          # Run NSIS installer (installs unified Tauri app)
          Write-Host "=== Installing unified Tauri app ==="
          Start-Process -FilePath "$stagingDir\Restreamer-Setup.exe" -ArgumentList "/S" -Wait

          # Verify only Restreamer.exe exists (no old binaries)
          Write-Host "=== Verifying install ==="
          Get-ChildItem "$InstallDir\*.exe"

          Write-Host "=== Deployment complete ==="
          # Ensure success exit code (net stop/taskkill/sc.exe may have set non-zero)
          exit 0

      - name: Launch unified app via Task Scheduler
        shell: powershell
        run: |
          # The unified Tauri app runs as a tray application with embedded service
          # No separate Windows service - just the tray app
          $ErrorActionPreference = "SilentlyContinue"
          $TaskName = "Restreamer"
          $ExePath = "C:\Program Files\Restreamer\Restreamer.exe"
          $Username = "newlevel"

          Write-Host "=== Configuring unified app launch ==="

          # Remove old tray task if it exists
          Unregister-ScheduledTask -TaskName "RestreamerTray" -Confirm:$false -ErrorAction SilentlyContinue

          # Remove ALL existing Restreamer-related scheduled tasks
          Get-ScheduledTask | Where-Object { $_.TaskName -like "*estreamer*" } | ForEach-Object {
            Write-Host "Removing old task: $($_.TaskName)"
            Unregister-ScheduledTask -TaskName $_.TaskName -Confirm:$false -ErrorAction SilentlyContinue
          }

          # Create task for unified app with Interactive logon
          $action = New-ScheduledTaskAction -Execute $ExePath
          $trigger = New-ScheduledTaskTrigger -AtLogon -User $Username
          $principal = New-ScheduledTaskPrincipal -UserId $Username -LogonType Interactive -RunLevel Limited
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -ExecutionTimeLimit 0

          $null = Register-ScheduledTask -TaskName $TaskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force 2>&1
          Write-Host "Registered task: $TaskName"

          # Start the task
          $null = Start-ScheduledTask -TaskName $TaskName 2>&1
          Start-Sleep -Seconds 5

          # Verify app is running
          $app = Get-Process -Name "Restreamer" -ErrorAction SilentlyContinue
          if ($app) {
            Write-Host "=== Unified app launched (PID: $($app.Id), Session: $($app.SessionId)) ==="
          } else {
            Write-Host "WARNING: App not found - user may need to be logged in"
            Write-Host "The app will start on next user login via scheduled task"
          }
          exit 0

      - name: Verify deployment
        shell: powershell
        run: |
          # Wait for embedded service to start
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 10
            Write-Host "API Status: OK"
            Write-Host "Streaming event: $($response.streaming_event.name)"
          } catch {
            Write-Host "API check: FAILED - $_"
            Write-Host "The unified app may not be fully started yet"
            # Don't fail - app starts on user session
          }

  e2e-streaming-test:
    name: E2E Streaming Test
    needs: [deploy-stream-lan]
    if: always() && needs.deploy-stream-lan.result == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    timeout-minutes: 10
    env:
      MANAGER_SSH_HOST: 172.105.95.118
      MANAGER_SSH_USER: root
      CLIENT_UUID: "95da874e-6b06-41e5-99db-6f47a459c48b"
    steps:
      - name: Wait for services to initialize
        shell: powershell
        run: |
          Write-Host "Waiting for Restreamer services to fully start..."
          Start-Sleep -Seconds 10

      - name: Verify API is responding
        shell: powershell
        run: |
          $maxRetries = 5
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 10
              Write-Host "API responding on attempt $i"
              break
            } catch {
              Write-Host "Attempt $i failed: $_"
              if ($i -eq $maxRetries) { throw "API not responding after $maxRetries attempts" }
              Start-Sleep -Seconds 5
            }
          }

      - name: Activate streaming event on manager
        shell: powershell
        timeout-minutes: 2
        run: |
          # Activate receiving via E2E API (no SSH needed)
          $body = @{
            user_uuid = $env:CLIENT_UUID
            event_name = "E2E-Test"
          } | ConvertTo-Json

          Write-Host "Activating E2E-Test streaming event via API..."
          $response = Invoke-RestMethod -Uri "https://restreamer.newlevel.media/api/e2e/activate-receiving/" `
            -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30

          if ($response.status -ne "ok") {
            throw "Failed to activate receiving: $($response | ConvertTo-Json)"
          }

          Write-Host "Activated event $($response.event_id): $($response.event_name)"
          Write-Host "receiving_activated: $($response.receiving_activated)"

      - name: Wait for poller to sync event
        shell: powershell
        run: |
          Write-Host "Waiting for poller to sync streaming event..."
          $maxRetries = 10
          $synced = $false
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/streaming-event" -TimeoutSec 10
              if ($response -and $response.receiving_activated) {
                Write-Host "Streaming event synced: $($response.identifier)"
                $synced = $true
                break
              }
            } catch {}
            Write-Host "Waiting for event sync (attempt $i/$maxRetries)..."
            Start-Sleep -Seconds 3
          }
          if (-not $synced) {
            throw "FAILED: Poller did not sync streaming event after $maxRetries attempts (30s timeout)"
          }

      - name: Get initial chunk count
        id: initial-chunks
        shell: powershell
        run: |
          $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $initialCount = $stats.total_chunks
          Write-Host "Initial chunk count: $initialCount"
          "INITIAL_CHUNKS=$initialCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Send test RTMP stream via ffmpeg
        shell: powershell
        timeout-minutes: 2
        run: |
          # Send a 15-second test stream to Restreamer RTMP endpoint
          # Using ffmpeg with synthetic video/audio (reliable for CI testing)
          $ErrorActionPreference = 'Continue'
          $ffmpegPath = "C:\Users\newlevel\restreamer\local-client\ffmpeg.exe"

          Write-Host "Starting 15-second test RTMP stream..."

          # ffmpeg outputs to stderr, so use Start-Process to avoid PowerShell error handling
          $proc = Start-Process -FilePath $ffmpegPath -ArgumentList @(
            "-y", "-re",
            "-f", "lavfi", "-i", "testsrc=duration=15:size=320x240:rate=30",
            "-f", "lavfi", "-i", "sine=frequency=1000:duration=15",
            "-c:v", "libx264", "-preset", "ultrafast", "-c:a", "aac",
            "-f", "flv", "rtmp://127.0.0.1:1234/live/ci-e2e-test"
          ) -NoNewWindow -Wait -PassThru

          if ($proc.ExitCode -ne 0) {
            throw "ffmpeg failed with exit code $($proc.ExitCode)"
          }
          Write-Host "Test stream completed successfully"

      - name: Wait for chunk processing
        shell: powershell
        run: |
          Write-Host "Waiting for chunks to be processed and uploaded..."
          Start-Sleep -Seconds 10

      - name: Verify chunks created and uploaded
        shell: powershell
        run: |
          $initialCount = [int]$env:INITIAL_CHUNKS

          # Wait up to 30s for all chunks to be uploaded (pending -> 0)
          $maxWait = 6
          $stats = $null
          for ($w = 1; $w -le $maxWait; $w++) {
            $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
            if ($stats.pending_chunks -eq 0) {
              Write-Host "All chunks uploaded (attempt $w/$maxWait)"
              break
            }
            Write-Host "Pending chunks: $($stats.pending_chunks) - waiting for S3 upload (attempt $w/$maxWait)..."
            Start-Sleep -Seconds 5
          }

          $newChunks = $stats.total_chunks - $initialCount
          $pendingChunks = $stats.pending_chunks

          Write-Host "=== E2E Test Results ==="
          Write-Host "Initial chunks: $initialCount"
          Write-Host "Current total:  $($stats.total_chunks)"
          Write-Host "New chunks:     $newChunks"
          Write-Host "Sent chunks:    $($stats.sent_chunks)"
          Write-Host "Pending:        $pendingChunks"
          Write-Host "Total bytes:    $($stats.total_bytes)"

          # Expect at least 8 chunks from 15-second stream (1 chunk per second, some tolerance)
          if ($newChunks -lt 8) {
            throw "Expected at least 8 new chunks, got $newChunks"
          }

          # HARD FAIL: All chunks must be uploaded to S3
          if ($pendingChunks -gt 0) {
            throw "FAILED: $pendingChunks chunks still pending S3 upload after 30s wait"
          }

          Write-Host "=== Local E2E Test PASSED ==="
        env:
          INITIAL_CHUNKS: ${{ steps.initial-chunks.outputs.INITIAL_CHUNKS }}

      - name: Verify chunks on manager DB
        shell: powershell
        timeout-minutes: 2
        run: |
          # Verify chunks reached manager server database (proves: client -> S3 -> manager notification -> DB)
          Write-Host "Verifying chunks exist on manager server DB..."

          $uri = "https://restreamer.newlevel.media/api/e2e/chunk-verification/?user_uuid=$env:CLIENT_UUID&event_name=E2E-Test&min_chunks=8"
          $response = Invoke-RestMethod -Uri $uri -Method GET -TimeoutSec 30

          Write-Host "Event ID: $($response.event_id)"
          Write-Host "Chunk count on manager: $($response.chunk_count)"
          Write-Host "Min required: $($response.min_chunks_required)"
          Write-Host "Has enough: $($response.has_enough)"
          Write-Host "Identifier: $($response.identifier)"

          if (-not $response.has_enough) {
            throw "FAILED: Manager DB has only $($response.chunk_count) chunks, need at least $($response.min_chunks_required)"
          }

          Write-Host "=== Manager chunk verification PASSED ==="

      - name: Activate delivering and initialize YouTube stream
        shell: powershell
        timeout-minutes: 3
        run: |
          # Activate delivering via E2E API (no SSH needed)
          $body = @{
            user_uuid = $env:CLIENT_UUID
            event_name = "E2E-Test"
          } | ConvertTo-Json

          Write-Host "Activating delivering for E2E-Test event via API..."
          $response = Invoke-RestMethod -Uri "https://restreamer.newlevel.media/api/e2e/activate-delivering/" `
            -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30

          if ($response.status -ne "ok") {
            throw "Failed to activate delivering: $($response | ConvertTo-Json)"
          }

          Write-Host "Delivering activated for event $($response.event_id)"
          Write-Host "Endpoint: $($response.endpoint)"
          Write-Host "Chunk count: $($response.chunk_count)"
          Write-Host "init_stream_queued: $($response.init_stream_queued)"

          if (-not $response.init_stream_queued) {
            throw "init_stream task was not queued - delivery will not start"
          }

          Write-Host "YouTube delivery initialization queued successfully"

      - name: Wait for delivering server to start streaming
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Waiting for delivering server to process chunks..."
          Start-Sleep -Seconds 30

      - name: Verify delivering server is streaming
        shell: powershell
        timeout-minutes: 3
        run: |
          # Check delivering server status via E2E API with retry loop
          Write-Host "Checking delivering server status via API..."

          $maxRetries = 6
          $verified = $false
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "https://restreamer.newlevel.media/api/e2e/delivering-status/?user_uuid=$env:CLIENT_UUID&event_name=E2E-Test" `
                -Method GET -TimeoutSec 30

              Write-Host "--- Attempt $i/$maxRetries ---"
              Write-Host "Event ID: $($response.event_id)"
              Write-Host "Delivering activated: $($response.delivering_activated)"
              Write-Host "Server IP: $($response.server_ip)"
              Write-Host "Server ready: $($response.server_ready)"
              Write-Host "Endpoints alive: $($response.endpoints_alive)"

              # Show per-endpoint details
              if ($response.endpoint_details) {
                foreach ($ep in $response.endpoint_details) {
                  Write-Host "  Endpoint: $($ep.alias) | alive=$($ep.alive) | pid=$($ep.pid) | buffer=$($ep.buff_size_mb)MB | chunk_id=$($ep.current_chunk_id)"
                }
              }

              if ($response.delivering_activated -and $response.server_ready) {
                $verified = $true
                if ($response.endpoints_alive) {
                  Write-Host "Endpoint processes confirmed alive!"
                  break
                }
                # Server ready but endpoint-status not available yet - still valid
                Write-Host "Server ready (endpoint process details not available)"
                break
              }

              Write-Host "Not fully ready yet, retrying in 10s..."
            } catch {
              Write-Host "Request failed on attempt $i : $_"
            }
            Start-Sleep -Seconds 10
          }

          if (-not $verified) {
            throw "FAILED: Delivering server not fully operational after $maxRetries attempts. delivering_activated=$($response.delivering_activated), server_ready=$($response.server_ready)"
          }

          if ($response.endpoints_alive) {
            Write-Host "=== FULL E2E WITH YOUTUBE DELIVERY PASSED (with endpoint verification) ==="
          } else {
            Write-Host "=== FULL E2E WITH YOUTUBE DELIVERY PASSED ==="
          }
          Write-Host "Stream -> Restreamer -> S3 -> Manager -> Delivering -> YouTube: VERIFIED"

      - name: Verify delivery progression
        shell: powershell
        timeout-minutes: 2
        run: |
          # Take two readings 15s apart to verify chunk_id is advancing
          Write-Host "Verifying delivery progression (two readings 15s apart)..."

          $response1 = Invoke-RestMethod -Uri "https://restreamer.newlevel.media/api/e2e/delivering-status/?user_uuid=$env:CLIENT_UUID&event_name=E2E-Test" `
            -Method GET -TimeoutSec 30

          $chunk1 = 0
          if ($response1.endpoint_details -and $response1.endpoint_details.Count -gt 0) {
            $chunk1 = $response1.endpoint_details[0].current_chunk_id
          }
          Write-Host "Reading 1: chunk_id = $chunk1"

          Start-Sleep -Seconds 15

          $response2 = Invoke-RestMethod -Uri "https://restreamer.newlevel.media/api/e2e/delivering-status/?user_uuid=$env:CLIENT_UUID&event_name=E2E-Test" `
            -Method GET -TimeoutSec 30

          $chunk2 = 0
          if ($response2.endpoint_details -and $response2.endpoint_details.Count -gt 0) {
            $chunk2 = $response2.endpoint_details[0].current_chunk_id
          }
          Write-Host "Reading 2: chunk_id = $chunk2"

          if ($chunk2 -gt $chunk1) {
            Write-Host "=== Delivery progression CONFIRMED: chunk_id advanced from $chunk1 to $chunk2 ==="
          } else {
            Write-Host "WARNING: chunk_id did not advance ($chunk1 -> $chunk2). Delivery may be stalled but not failing test."
          }

      - name: Deactivate streaming event
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          # Deactivate via E2E API (no SSH needed)
          # Note: This step always succeeds - cleanup failure is non-critical
          $ErrorActionPreference = 'SilentlyContinue'

          $body = @{
            user_uuid = $env:CLIENT_UUID
            event_name = "E2E-Test"
          } | ConvertTo-Json

          Write-Host "Deactivating E2E-Test streaming event via API..."
          try {
            $response = Invoke-RestMethod -Uri "https://restreamer.newlevel.media/api/e2e/deactivate/" `
              -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30

            Write-Host "Deactivated event $($response.event_id)"
            Write-Host "receiving_activated: $($response.receiving_activated)"
            Write-Host "delivering_activated: $($response.delivering_activated)"
          } catch {
            Write-Host "Cleanup API call failed: $_"
            Write-Host "Event may remain activated until manually deactivated"
          }
          # Always exit successfully - cleanup is best-effort
          exit 0

  e2e-obs-youtube-test:
    name: E2E OBS-to-YouTube Test
    needs: [deploy-stream-lan]
    if: always() && needs.deploy-stream-lan.result == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    timeout-minutes: 15
    env:
      MANAGER_URL: "https://restreamer.newlevel.media"
      CLIENT_UUID: "95da874e-6b06-41e5-99db-6f47a459c48b"
      EVENT_NAME: "E2E-Test"
      OBS_WS_HOST: "127.0.0.1"
      OBS_WS_PORT: "4455"
      OBS_WS_PASSWORD: ${{ secrets.OBS_WS_PASSWORD }}
    steps:
      - name: Ensure OBS is running
        shell: powershell
        run: |
          $obs = Get-Process obs64 -ErrorAction SilentlyContinue
          if (-not $obs) {
            Write-Host "OBS not running, starting via scheduled task..."
            Start-ScheduledTask -TaskName "Start OBS Studio" -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 8
            $obs = Get-Process obs64 -ErrorAction SilentlyContinue
            if (-not $obs) {
              throw "FAILED: Could not start OBS Studio"
            }
          }
          Write-Host "OBS is running (PID: $($obs.Id))"

      - name: Save original OBS stream settings and switch to Restreamer
        id: obs-setup
        shell: powershell
        run: |
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)

          try {
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()
            Write-Host "Connected to OBS WebSocket"
          } catch {
            throw "FAILED: Cannot connect to OBS WebSocket at $uri - $_"
          }

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Receive Hello message
          $hello = Receive-OBSMessage $ws
          Write-Host "OBS WebSocket version: $($hello.d.obsWebSocketVersion)"

          # Build auth string
          $authRequired = $hello.d.authentication
          if ($authRequired) {
            $challenge = $authRequired.challenge
            $salt = $authRequired.salt

            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $salt)
            $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))

            $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $challenge)
            $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))

            $identify = @{
              op = 1
              d = @{
                rpcVersion = 1
                authentication = $authHash
              }
            } | ConvertTo-Json -Depth 5
          } else {
            $identify = @{
              op = 1
              d = @{
                rpcVersion = 1
              }
            } | ConvertTo-Json -Depth 5
          }

          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws
          Write-Host "OBS identified: op=$($identified.op)"

          # Get current stream service settings
          $getSettings = @{
            op = 6
            d = @{
              requestType = "GetStreamServiceSettings"
              requestId = "get-settings-1"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $getSettings
          $settingsResp = Receive-OBSMessage $ws
          $currentSettings = $settingsResp.d.responseData.streamServiceSettings
          $currentType = $settingsResp.d.responseData.streamServiceType

          Write-Host "Original stream type: $currentType"
          Write-Host "Original server: $($currentSettings.server)"

          # Save original settings for restoration
          $origServer = $currentSettings.server
          $origKey = $currentSettings.key
          "ORIG_SERVER=$origServer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ORIG_KEY=$origKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ORIG_TYPE=$currentType" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # Switch to local Restreamer RTMP
          $setSettings = @{
            op = 6
            d = @{
              requestType = "SetStreamServiceSettings"
              requestId = "set-settings-1"
              requestData = @{
                streamServiceType = "rtmp_custom"
                streamServiceSettings = @{
                  server = "rtmp://127.0.0.1:1234/live"
                  key = "obs-e2e-test"
                }
              }
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $setSettings
          $setResp = Receive-OBSMessage $ws
          Write-Host "Switched OBS to Restreamer RTMP: rtmp://127.0.0.1:1234/live/obs-e2e-test"

          $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()

      - name: Activate receiving on manager
        shell: powershell
        timeout-minutes: 2
        run: |
          $body = @{
            user_uuid = $env:CLIENT_UUID
            event_name = $env:EVENT_NAME
          } | ConvertTo-Json

          Write-Host "Activating receiving for $($env:EVENT_NAME)..."
          $response = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/activate-receiving/" `
            -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30

          if ($response.status -ne "ok") {
            throw "Failed to activate receiving: $($response | ConvertTo-Json)"
          }
          Write-Host "Receiving activated: event_id=$($response.event_id)"

      - name: Wait for poller to sync event
        shell: powershell
        run: |
          Write-Host "Waiting for poller to sync streaming event to client..."
          $maxRetries = 12
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/streaming-event" -TimeoutSec 10
              if ($response -and $response.receiving_activated) {
                Write-Host "Event synced: $($response.identifier)"
                return
              }
            } catch {}
            Write-Host "Waiting for sync (attempt $i/$maxRetries)..."
            Start-Sleep -Seconds 3
          }
          throw "FAILED: Poller did not sync event after $maxRetries attempts"

      - name: Start OBS stream
        shell: powershell
        run: |
          # Send StartStream via OBS WebSocket, then disconnect.
          # We verify stream status separately to avoid event message noise.
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)
          $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Receive Hello + Identify
          $hello = Receive-OBSMessage $ws
          $authRequired = $hello.d.authentication
          if ($authRequired) {
            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
            $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
            $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
            $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
            $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
          } else {
            $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
          }
          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws

          # Send StartStream request
          $startStream = @{
            op = 6
            d = @{
              requestType = "StartStream"
              requestId = "start-stream-1"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $startStream
          # Read response - skip any event messages (op=5) that arrive before the response (op=7)
          for ($r = 0; $r -lt 5; $r++) {
            $startResp = Receive-OBSMessage $ws
            Write-Host "Received message: op=$($startResp.op)"
            if ($startResp.op -eq 7) { break }
          }

          $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()
          Write-Host "StartStream sent, waiting for OBS to connect to RTMP..."

      - name: Verify OBS is streaming
        shell: powershell
        run: |
          # Reconnect to check stream status (avoids event noise from StartStream)
          Start-Sleep -Seconds 5

          $maxRetries = 6
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $getStatus = @{
              op = 6
              d = @{
                requestType = "GetStreamStatus"
                requestId = "get-status-$attempt"
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $getStatus

            # Read responses, skip events (op=5)
            $statusResp = $null
            for ($r = 0; $r -lt 5; $r++) {
              $msg = Receive-OBSMessage $ws
              if ($msg.op -eq 7) {
                $statusResp = $msg
                break
              }
              Write-Host "Skipping event: op=$($msg.op)"
            }

            $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()

            if ($statusResp -and $statusResp.d.responseData.outputActive) {
              Write-Host "OBS is streaming (attempt $attempt/$maxRetries)"
              Write-Host "OBS is now streaming to Restreamer RTMP"
              return
            }

            Write-Host "OBS not streaming yet (attempt $attempt/$maxRetries), waiting..."
            Start-Sleep -Seconds 5
          }

          throw "FAILED: OBS stream did not start after $maxRetries attempts"

      - name: Wait for chunks and verify upload
        shell: powershell
        timeout-minutes: 3
        run: |
          Write-Host "Waiting for chunks to be created and uploaded to S3..."

          $initialStats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $initialCount = $initialStats.total_chunks
          Write-Host "Initial chunk count: $initialCount"

          $maxRetries = 30
          for ($i = 1; $i -le $maxRetries; $i++) {
            $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
            $newChunks = $stats.total_chunks - $initialCount
            Write-Host "Attempt $i/$maxRetries: new_chunks=$newChunks, pending=$($stats.pending_chunks)"

            if ($newChunks -ge 8 -and $stats.pending_chunks -eq 0) {
              Write-Host "=== Chunks verified: $newChunks new chunks, 0 pending ==="
              return
            }
            Start-Sleep -Seconds 3
          }

          $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $newChunks = $stats.total_chunks - $initialCount
          if ($newChunks -lt 8) {
            throw "FAILED: Only $newChunks new chunks created (need >= 8)"
          }
          if ($stats.pending_chunks -gt 0) {
            throw "FAILED: $($stats.pending_chunks) chunks still pending S3 upload"
          }

      - name: Verify chunks on manager DB
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Verifying chunks reached manager server DB..."
          $uri = "$($env:MANAGER_URL)/api/e2e/chunk-verification/?user_uuid=$($env:CLIENT_UUID)&event_name=$($env:EVENT_NAME)&min_chunks=8"
          $response = Invoke-RestMethod -Uri $uri -Method GET -TimeoutSec 30

          Write-Host "Chunk count on manager: $($response.chunk_count)"
          Write-Host "Has enough (>= 8): $($response.has_enough)"

          if (-not $response.has_enough) {
            throw "FAILED: Manager DB has only $($response.chunk_count) chunks, need >= 8"
          }
          Write-Host "=== Manager chunk verification PASSED ==="

      - name: Activate delivering
        shell: powershell
        timeout-minutes: 3
        run: |
          $body = @{
            user_uuid = $env:CLIENT_UUID
            event_name = $env:EVENT_NAME
          } | ConvertTo-Json

          Write-Host "Activating delivering for $($env:EVENT_NAME)..."
          $response = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/activate-delivering/" `
            -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30

          if ($response.status -ne "ok") {
            throw "Failed to activate delivering: $($response | ConvertTo-Json)"
          }

          Write-Host "Delivering activated: endpoint=$($response.endpoint), chunks=$($response.chunk_count)"
          Write-Host "init_stream_queued: $($response.init_stream_queued)"

          if (-not $response.init_stream_queued) {
            throw "init_stream task was not queued"
          }

      - name: Wait for delivering server ready
        shell: powershell
        timeout-minutes: 5
        run: |
          Write-Host "Waiting for delivering server to boot and start ffmpeg..."
          $maxRetries = 18
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/delivering-status/?user_uuid=$($env:CLIENT_UUID)&event_name=$($env:EVENT_NAME)" `
                -Method GET -TimeoutSec 30

              Write-Host "--- Attempt $i/$maxRetries ---"
              Write-Host "  delivering_activated: $($response.delivering_activated)"
              Write-Host "  server_ip: $($response.server_ip)"
              Write-Host "  server_ready: $($response.server_ready)"
              Write-Host "  endpoints_alive: $($response.endpoints_alive)"

              if ($response.endpoint_details) {
                foreach ($ep in $response.endpoint_details) {
                  Write-Host "  Endpoint: $($ep.alias) | alive=$($ep.alive) | buffer=$($ep.buff_size_mb)MB | chunk=$($ep.current_chunk_id)"
                }
              }

              if ($response.delivering_activated -and $response.server_ready -and $response.endpoints_alive) {
                Write-Host "=== Delivering server fully operational ==="
                return
              }
            } catch {
              Write-Host "Request failed on attempt $i : $_"
            }
            Start-Sleep -Seconds 15
          }
          throw "FAILED: Delivering server not ready after $maxRetries attempts (~4.5 min)"

      - name: Verify YouTube broadcast is live
        shell: powershell
        timeout-minutes: 5
        run: |
          Write-Host "Verifying stream is live on YouTube..."
          $maxRetries = 18
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/youtube-status/?user_uuid=$($env:CLIENT_UUID)&event_name=$($env:EVENT_NAME)" `
                -Method GET -TimeoutSec 30

              Write-Host "--- Attempt $i/$maxRetries ---"
              Write-Host "  has_active_broadcast: $($response.has_active_broadcast)"

              if ($response.has_active_broadcast) {
                Write-Host "  broadcast_id: $($response.broadcast_id)"
                Write-Host "  life_cycle_status: $($response.life_cycle_status)"
                Write-Host "  title: $($response.title)"

                if ($response.life_cycle_status -eq "live" -or $response.life_cycle_status -eq "liveStarting") {
                  Write-Host ""
                  Write-Host "=========================================="
                  Write-Host "  YOUTUBE BROADCAST IS LIVE!"
                  Write-Host "  Status: $($response.life_cycle_status)"
                  Write-Host "  Title: $($response.title)"
                  Write-Host "=========================================="
                  return
                }
              }

              if ($response.error_detail) {
                Write-Host "  detail: $($response.error_detail)"
              }
            } catch {
              Write-Host "Request failed on attempt $i : $_"
            }
            Start-Sleep -Seconds 15
          }
          throw "FAILED: YouTube broadcast not live after $maxRetries attempts (~4.5 min)"

      - name: Verify delivery progression
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Verifying delivery is progressing (two readings 15s apart)..."

          $r1 = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/delivering-status/?user_uuid=$($env:CLIENT_UUID)&event_name=$($env:EVENT_NAME)" `
            -Method GET -TimeoutSec 30
          $chunk1 = 0
          if ($r1.endpoint_details -and $r1.endpoint_details.Count -gt 0) {
            $chunk1 = $r1.endpoint_details[0].current_chunk_id
          }
          Write-Host "Reading 1: chunk_id = $chunk1"

          Start-Sleep -Seconds 15

          $r2 = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/delivering-status/?user_uuid=$($env:CLIENT_UUID)&event_name=$($env:EVENT_NAME)" `
            -Method GET -TimeoutSec 30
          $chunk2 = 0
          if ($r2.endpoint_details -and $r2.endpoint_details.Count -gt 0) {
            $chunk2 = $r2.endpoint_details[0].current_chunk_id
          }
          Write-Host "Reading 2: chunk_id = $chunk2"

          if ($chunk2 -gt $chunk1) {
            Write-Host "=== Delivery progression CONFIRMED: $chunk1 -> $chunk2 ==="
          } else {
            Write-Host "WARNING: chunk_id did not advance ($chunk1 -> $chunk2)"
          }

      - name: Stop OBS stream
        if: always()
        shell: powershell
        run: |
          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $stopStream = @{
              op = 6
              d = @{
                requestType = "StopStream"
                requestId = "stop-stream-1"
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $stopStream
            $stopResp = Receive-OBSMessage $ws
            Write-Host "OBS stream stopped"

            $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()
          } catch {
            Write-Host "Failed to stop OBS stream (may not have been streaming): $_"
          }

      - name: Deactivate streaming event
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $body = @{
            user_uuid = $env:CLIENT_UUID
            event_name = $env:EVENT_NAME
          } | ConvertTo-Json

          Write-Host "Deactivating $($env:EVENT_NAME)..."
          try {
            $response = Invoke-RestMethod -Uri "$($env:MANAGER_URL)/api/e2e/deactivate/" `
              -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30
            Write-Host "Deactivated: receiving=$($response.receiving_activated), delivering=$($response.delivering_activated)"
          } catch {
            Write-Host "Deactivation failed: $_"
          }
          exit 0

      - name: Restore OBS stream settings
        if: always()
        shell: powershell
        run: |
          $origServer = "${{ steps.obs-setup.outputs.ORIG_SERVER }}"
          $origKey = "${{ steps.obs-setup.outputs.ORIG_KEY }}"
          $origType = "${{ steps.obs-setup.outputs.ORIG_TYPE }}"

          if (-not $origServer -or -not $origKey) {
            Write-Host "No original settings saved - skipping restore"
            exit 0
          }

          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            # Restore original settings
            $serviceType = if ($origType) { $origType } else { "rtmp_custom" }
            $setSettings = @{
              op = 6
              d = @{
                requestType = "SetStreamServiceSettings"
                requestId = "restore-settings-1"
                requestData = @{
                  streamServiceType = $serviceType
                  streamServiceSettings = @{
                    server = $origServer
                    key = $origKey
                  }
                }
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $setSettings
            $setResp = Receive-OBSMessage $ws
            Write-Host "Restored OBS to original destination"

            $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()
          } catch {
            Write-Host "WARNING: Failed to restore OBS settings: $_"
            Write-Host "You may need to manually restore OBS stream settings"
          }
          exit 0

  auto-release:
    name: Auto-release tag
    needs: [rust-ci-gate]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.rust-ci-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="local-client-rs-v${VERSION}"
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
