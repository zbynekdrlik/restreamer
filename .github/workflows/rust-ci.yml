name: Rust CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_stream_lan:
        description: "Deploy to stream.lan after CI passes"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Rust changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'local-client-rs/**'
              - '.github/workflows/rust-ci.yml'
              - '.github/workflows/rust-release.yml'

  version-check:
    name: Version check
    needs: changes
    if: needs.changes.outputs.rust == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require Cargo.toml version bump on PR to main
        run: |
          PR_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:local-client-rs/Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "PR version:   $PR_VERSION"
          echo "Main version: $MAIN_VERSION"

          # Compare versions using Python
          pip install packaging --quiet

          python3 -c "
          from packaging.version import Version
          pr = Version('$PR_VERSION')
          main = Version('$MAIN_VERSION')
          if pr <= main:
              import sys
              print()
              print('ERROR: Cargo.toml version must be bumped higher than main.')
              print(f'  Current main: {main}')
              print(f'  This PR:      {pr}')
              parts = str(main).split('.')
              major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
              print()
              print('Suggested next versions:')
              print(f'  Patch: {major}.{minor}.{patch + 1}')
              print(f'  Minor: {major}.{minor + 1}.0')
              print(f'  Major: {major + 1}.0.0')
              sys.exit(1)
          print(f'Version bump OK: {main} -> {pr}')
          "
      - name: Check Cargo.toml version is not already tagged
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="local-client-rs-v${VERSION}"
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          if git tag -l | grep -qx "$TAG"; then
            echo "ERROR: Tag $TAG already exists. Bump the version in Cargo.toml."
            exit 1
          fi
          echo "OK: Tag $TAG does not exist yet."

  lint:
    name: Lint (fmt + clippy)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $ffmpegZip = "$env:TEMP\ffmpeg.zip"
          $ffmpegDir = "C:\ffmpeg"

          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip

          Write-Host "Extracting ffmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath $env:TEMP -Force

          # Find the extracted folder (includes version number)
          $extractedDir = Get-ChildItem "$env:TEMP\ffmpeg-*-essentials_build" | Select-Object -First 1
          if ($extractedDir) {
            Move-Item "$($extractedDir.FullName)\bin" $ffmpegDir -Force
            Write-Host "Installed ffmpeg to $ffmpegDir"
            echo "$ffmpegDir" >> $env:GITHUB_PATH
          } else {
            Write-Error "Failed to find extracted ffmpeg directory"
            exit 1
          }
      - name: Verify ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          C:\ffmpeg\ffmpeg.exe -version
      - name: Run tests
        run: cargo test --workspace --verbose
        env:
          SQLX_OFFLINE: true

  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --workspace --exclude-files "src-tauri/*" --fail-under 55 --skip-clean --timeout 300

  security:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0134

  build-tauri:
    name: Build Tauri app
    needs: [changes, lint, test]
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install trunk and wasm-bindgen-cli
        run: |
          cargo install trunk wasm-bindgen-cli
      - name: Install binaryen (wasm-opt)
        shell: pwsh
        run: |
          # Download and extract binaryen for wasm optimization
          $version = "version_123"
          $url = "https://github.com/WebAssembly/binaryen/releases/download/$version/binaryen-$version-x86_64-windows.tar.gz"
          $outFile = "$env:TEMP\binaryen.tar.gz"
          $retries = 3
          for ($i = 1; $i -le $retries; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $outFile -TimeoutSec 120
              break
            } catch {
              Write-Host "Download attempt $i failed: $_"
              if ($i -eq $retries) { throw "Failed to download binaryen after $retries attempts" }
              Start-Sleep -Seconds 10
            }
          }
          tar -xzf $outFile -C $env:TEMP
          Copy-Item "$env:TEMP\binaryen-$version\bin\wasm-opt.exe" "$env:CARGO_HOME\bin\"
          Write-Host "Installed wasm-opt to $env:CARGO_HOME\bin\"
      - name: Build Leptos UI (WASM)
        run: |
          cd leptos-ui
          trunk build --release
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Tauri app
        run: cargo tauri build
        env:
          SQLX_OFFLINE: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Tauri installer
        uses: actions/upload-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: local-client-rs/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

  file-size:
    name: File size check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no .rs file exceeds 1000 lines
        run: |
          OVERSIZED=$(find local-client-rs -name '*.rs' -exec sh -c 'lines=$(wc -l < "$1"); if [ "$lines" -gt 1000 ]; then echo "$1: $lines lines"; fi' _ {} \;)
          if [ -n "$OVERSIZED" ]; then
            echo "ERROR: The following Rust files exceed 1000 lines:"
            echo "$OVERSIZED"
            exit 1
          fi
          echo "OK: All Rust files are within the 1000-line limit."

  test-integrity:
    name: Test integrity check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Scan for #[ignore] on tests
        run: |
          IGNORED=$(grep -rn '#\[ignore\]' --include='*.rs' . || true)
          if [ -n "$IGNORED" ]; then
            echo "ERROR: Found #[ignore] attributes on tests. All tests must run."
            echo "$IGNORED"
            exit 1
          fi
          echo "OK: No #[ignore] attributes found."
      - name: Scan for assert!(true) false positives
        run: |
          FALSE_POS=$(grep -rn 'assert!(true)' --include='*.rs' . || true)
          if [ -n "$FALSE_POS" ]; then
            echo "ERROR: Found assert!(true) — tests must verify real behavior."
            echo "$FALSE_POS"
            exit 1
          fi
          echo "OK: No assert!(true) found."
      - name: Scan for empty test bodies
        run: |
          # Find test functions whose body is just {} or { } with nothing meaningful
          EMPTY=$(grep -Pzo '#\[test\]\s*\n\s*(async\s+)?fn\s+\w+\([^)]*\)[^{]*\{\s*\}' --include='*.rs' -rn . || true)
          if [ -n "$EMPTY" ]; then
            echo "ERROR: Found empty test bodies — tests must contain real assertions."
            echo "$EMPTY"
            exit 1
          fi
          echo "OK: No empty test bodies found."
      - name: Scan for assert_eq with trivial values
        run: |
          # Catch assert_eq!(1, 1), assert_eq!(true, true), etc.
          TRIVIAL=$(grep -rn 'assert_eq!(1,\s*1)\|assert_eq!(true,\s*true)\|assert_eq!("",\s*"")' --include='*.rs' . || true)
          if [ -n "$TRIVIAL" ]; then
            echo "ERROR: Found trivial assertions — tests must verify real behavior."
            echo "$TRIVIAL"
            exit 1
          fi
          echo "OK: No trivial assertions found."
      - name: Verify zero ignored tests in cargo test output
        run: |
          # Run tests and capture output
          OUTPUT=$(cargo test --workspace 2>&1)
          echo "$OUTPUT"

          # Check for any ignored tests
          IGNORED_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ ignored' | grep -v '0 ignored' || true)
          if [ -n "$IGNORED_COUNT" ]; then
            echo "ERROR: Some tests were ignored:"
            echo "$IGNORED_COUNT"
            exit 1
          fi

          # Check for any filtered tests
          FILTERED_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ filtered out' | grep -v '0 filtered out' || true)
          if [ -n "$FILTERED_COUNT" ]; then
            echo "ERROR: Some tests were filtered out:"
            echo "$FILTERED_COUNT"
            exit 1
          fi

          # Verify at least a minimum number of tests ran
          TOTAL_PASSED=$(echo "$OUTPUT" | grep -oP '(\d+) passed' | grep -oP '\d+' | paste -sd+ | bc)
          echo "Total tests passed: $TOTAL_PASSED"
          if [ "$TOTAL_PASSED" -lt 120 ]; then
            echo "ERROR: Expected at least 120 tests, but only $TOTAL_PASSED passed."
            echo "This may indicate tests were removed or are not being discovered."
            exit 1
          fi

          echo "OK: All $TOTAL_PASSED tests ran with 0 ignored and 0 filtered."
      - name: Verify deploy-stream-lan has always() condition
        run: |
          # Check that deploy-stream-lan job uses always() to prevent incorrect skipping
          WORKFLOW_FILE="../.github/workflows/rust-ci.yml"
          DEPLOY_CONDITION=$(grep -A3 "deploy-stream-lan:" "$WORKFLOW_FILE" | grep "if:" || true)

          if [ -z "$DEPLOY_CONDITION" ]; then
            echo "ERROR: deploy-stream-lan job missing 'if' condition"
            exit 1
          fi

          if ! echo "$DEPLOY_CONDITION" | grep -q "always()"; then
            echo "ERROR: deploy-stream-lan job MUST use always() to ensure condition evaluation"
            echo "Found: $DEPLOY_CONDITION"
            echo ""
            echo "Without always(), the job may be incorrectly skipped when needed jobs"
            echo "have complex conditions (like rust-ci-gate with if: always())."
            exit 1
          fi

          echo "OK: deploy-stream-lan uses always() in condition."
      - name: Verify auto-release has always() condition
        run: |
          # Check that auto-release job uses always() to prevent incorrect skipping
          WORKFLOW_FILE="../.github/workflows/rust-ci.yml"
          RELEASE_CONDITION=$(grep -A3 "auto-release:" "$WORKFLOW_FILE" | grep "if:" || true)

          if [ -z "$RELEASE_CONDITION" ]; then
            echo "ERROR: auto-release job missing 'if' condition"
            exit 1
          fi

          if ! echo "$RELEASE_CONDITION" | grep -q "always()"; then
            echo "ERROR: auto-release job MUST use always() to ensure condition evaluation"
            echo "Found: $RELEASE_CONDITION"
            exit 1
          fi

          echo "OK: auto-release uses always() in condition."

  frontend-e2e:
    name: Frontend E2E (Playwright)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check if npm-based frontend exists
        id: check-npm
        run: |
          if [ -f "package-lock.json" ] && grep -q "playwright" package.json 2>/dev/null; then
            echo "has_playwright=true" >> $GITHUB_OUTPUT
          else
            echo "has_playwright=false" >> $GITHUB_OUTPUT
            echo "Skipping Playwright tests - Leptos/WASM frontend does not use npm"
          fi
      - name: Install dependencies
        if: steps.check-npm.outputs.has_playwright == 'true'
        run: npm ci
      - name: Install Playwright browsers
        if: steps.check-npm.outputs.has_playwright == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        if: steps.check-npm.outputs.has_playwright == 'true'
        run: npx playwright test
      - name: Upload test results
        if: always() && steps.check-npm.outputs.has_playwright == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: local-client-rs/playwright-report/
          if-no-files-found: ignore
      - name: Skip message for Leptos frontend
        if: steps.check-npm.outputs.has_playwright == 'false'
        run: echo "Frontend E2E tests skipped - using Leptos/WASM frontend"

  rust-ci-gate:
    name: Rust CI Gate
    if: always()
    needs:
      [
        changes,
        version-check,
        lint,
        test,
        coverage,
        security,
        build-tauri,
        file-size,
        test-integrity,
        frontend-e2e,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "changes:        ${{ needs.changes.result }}"
          echo "version-check:  ${{ needs.version-check.result }}"
          echo "lint:           ${{ needs.lint.result }}"
          echo "test:           ${{ needs.test.result }}"
          echo "coverage:       ${{ needs.coverage.result }}"
          echo "security:       ${{ needs.security.result }}"
          echo "build-tauri:    ${{ needs.build-tauri.result }}"
          echo "file-size:      ${{ needs.file-size.result }}"
          echo "test-integrity: ${{ needs.test-integrity.result }}"
          echo "frontend-e2e:   ${{ needs.frontend-e2e.result }}"

          # If no Rust changes, all skipped jobs are fine
          if [[ "${{ needs.changes.outputs.rust }}" != "true" ]]; then
            echo "No Rust changes detected — gate passes."
            exit 0
          fi

          # All must succeed when Rust files changed
          FAILED=0

          # version-check is only required on pull_request (skipped on push is OK)
          VERSION_RESULT="${{ needs.version-check.result }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "$VERSION_RESULT" != "success" ]]; then
              echo "FAIL: version-check did not succeed (result: $VERSION_RESULT)"
              FAILED=1
            fi
          else
            echo "version-check: $VERSION_RESULT (OK - only required on PRs)"
          fi

          # All other jobs must succeed
          for job_result in \
            "lint:${{ needs.lint.result }}" \
            "test:${{ needs.test.result }}" \
            "coverage:${{ needs.coverage.result }}" \
            "security:${{ needs.security.result }}" \
            "build-tauri:${{ needs.build-tauri.result }}" \
            "file-size:${{ needs.file-size.result }}" \
            "test-integrity:${{ needs.test-integrity.result }}" \
            "frontend-e2e:${{ needs.frontend-e2e.result }}"; do
            name="${job_result%%:*}"
            result="${job_result##*:}"
            if [[ "$result" != "success" ]]; then
              echo "FAIL: $name did not succeed (result: $result)"
              FAILED=1
            fi
          done

          if [[ "$FAILED" == "1" ]]; then
            exit 1
          fi

          echo "All Rust CI checks passed!"

  deploy-stream-lan:
    name: Deploy to stream.lan
    needs: [rust-ci-gate, build-tauri]
    if: always() && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.rust-ci-gate.result == 'success' && needs.build-tauri.result == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    steps:
      - name: Clean old artifacts
        shell: powershell
        run: |
          # Remove old artifacts to prevent version mix-ups on self-hosted runner
          Remove-Item -Path "artifacts" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned artifacts directory"

      - name: Download Tauri installer
        uses: actions/download-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: artifacts/tauri

      - name: List artifacts
        run: |
          Write-Host "=== Tauri installer (unified app with embedded service) ==="
          Get-ChildItem artifacts/tauri/
        shell: powershell

      - name: Deploy unified app
        shell: powershell
        run: |
          # Deploy unified Tauri app (contains embedded service - no separate service binary)
          $ErrorActionPreference = "Continue"

          $stagingDir = "C:\ProgramData\Restreamer\staging"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          $installer = Get-ChildItem "artifacts/tauri/*.exe" | Select-Object -First 1
          Copy-Item $installer.FullName "$stagingDir\Restreamer-Setup.exe" -Force
          Write-Host "Staged: $($installer.Name)"

          # Stop old processes (both old service and tray)
          Write-Host "=== Stopping old processes ==="
          net stop "restreamer-service" 2>&1 | Out-Null
          taskkill /F /IM "restreamer-service.exe" 2>&1 | Out-Null
          taskkill /F /IM "restreamer-tray.exe" 2>&1 | Out-Null
          taskkill /F /IM "Restreamer.exe" 2>&1 | Out-Null

          # CRITICAL: Stop and disable old Python NSSM services that block RTMP port 1234
          Write-Host "=== Disabling legacy Python services ==="
          foreach ($svc in @("inpoint_service", "endpoint_service")) {
            $service = Get-Service -Name $svc -ErrorAction SilentlyContinue
            if ($service) {
              Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
              Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
              Write-Host "Disabled: $svc"
            }
          }
          # Kill any ffmpeg processes spawned by old services (they hold RTMP port 1234)
          taskkill /F /IM "ffmpeg.exe" 2>&1 | Out-Null
          Start-Sleep -Seconds 2

          # Remove old service if it exists (unified app doesn't use Windows service)
          Write-Host "=== Removing old Windows service ==="
          sc.exe stop "restreamer-service" 2>&1 | Out-Null
          sc.exe delete "restreamer-service" 2>&1 | Out-Null

          # Clean up old files from previous two-binary architecture
          Write-Host "=== Cleaning up old files ==="
          $InstallDir = "C:\Program Files\Restreamer"
          Remove-Item "$InstallDir\restreamer-service.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$InstallDir\restreamer-tray.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$stagingDir\restreamer-service.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$stagingDir\deploy.ps1" -Force -ErrorAction SilentlyContinue

          # Run NSIS installer (installs unified Tauri app)
          Write-Host "=== Installing unified Tauri app ==="
          Start-Process -FilePath "$stagingDir\Restreamer-Setup.exe" -ArgumentList "/S" -Wait

          # Verify only Restreamer.exe exists (no old binaries)
          Write-Host "=== Verifying install ==="
          Get-ChildItem "$InstallDir\*.exe"

          Write-Host "=== Deployment complete ==="
          # Ensure success exit code (net stop/taskkill/sc.exe may have set non-zero)
          exit 0

      - name: Launch unified app via Task Scheduler
        shell: powershell
        run: |
          # The unified Tauri app runs as a tray application with embedded service
          # No separate Windows service - just the tray app
          $ErrorActionPreference = "SilentlyContinue"
          $TaskName = "Restreamer"
          $ExePath = "C:\Program Files\Restreamer\Restreamer.exe"
          $Username = "newlevel"

          Write-Host "=== Configuring unified app launch ==="

          # Remove old tray task if it exists
          Unregister-ScheduledTask -TaskName "RestreamerTray" -Confirm:$false -ErrorAction SilentlyContinue

          # Remove ALL existing Restreamer-related scheduled tasks
          Get-ScheduledTask | Where-Object { $_.TaskName -like "*estreamer*" } | ForEach-Object {
            Write-Host "Removing old task: $($_.TaskName)"
            Unregister-ScheduledTask -TaskName $_.TaskName -Confirm:$false -ErrorAction SilentlyContinue
          }

          # Create task for unified app with Interactive logon
          $action = New-ScheduledTaskAction -Execute $ExePath
          $trigger = New-ScheduledTaskTrigger -AtLogon -User $Username
          $principal = New-ScheduledTaskPrincipal -UserId $Username -LogonType Interactive -RunLevel Limited
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -ExecutionTimeLimit 0

          $null = Register-ScheduledTask -TaskName $TaskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force 2>&1
          Write-Host "Registered task: $TaskName"

          # Start the task
          $null = Start-ScheduledTask -TaskName $TaskName 2>&1
          Start-Sleep -Seconds 5

          # Verify app is running
          $app = Get-Process -Name "Restreamer" -ErrorAction SilentlyContinue
          if ($app) {
            Write-Host "=== Unified app launched (PID: $($app.Id), Session: $($app.SessionId)) ==="
          } else {
            Write-Host "WARNING: App not found - user may need to be logged in"
            Write-Host "The app will start on next user login via scheduled task"
          }
          exit 0

      - name: Verify deployment
        shell: powershell
        run: |
          # Wait for embedded service to start
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 10
            Write-Host "API Status: OK"
            Write-Host "Streaming event: $($response.streaming_event.name)"
          } catch {
            Write-Host "API check: FAILED - $_"
            Write-Host "The unified app may not be fully started yet"
            # Don't fail - app starts on user session
          }

  e2e-streaming-test:
    name: E2E Streaming Test
    needs: [deploy-stream-lan]
    if: always() && needs.deploy-stream-lan.result == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    timeout-minutes: 10
    env:
      MANAGER_SSH_HOST: 172.105.95.118
      MANAGER_SSH_USER: root
      CLIENT_UUID: "95da874e-6b06-41e5-99db-6f47a459c48b"
    steps:
      - name: Wait for services to initialize
        shell: powershell
        run: |
          Write-Host "Waiting for Restreamer services to fully start..."
          Start-Sleep -Seconds 10

      - name: Verify API is responding
        shell: powershell
        run: |
          $maxRetries = 5
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 10
              Write-Host "API responding on attempt $i"
              break
            } catch {
              Write-Host "Attempt $i failed: $_"
              if ($i -eq $maxRetries) { throw "API not responding after $maxRetries attempts" }
              Start-Sleep -Seconds 5
            }
          }

      - name: Activate streaming event on manager
        shell: powershell
        timeout-minutes: 2
        run: |
          # Check if streaming event is already activated via local API
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/streaming-event" -TimeoutSec 10
            if ($response -and $response.receiving_activated) {
              Write-Host "Streaming event already activated: $($response.identifier)"
              exit 0
            }
          } catch {
            Write-Host "Could not check local status: $_"
          }

          # Add manager host key to known_hosts
          $null = & ssh-keyscan -H 172.105.95.118 2>$null | Out-File -Append "$env:USERPROFILE\.ssh\known_hosts" -Encoding UTF8

          # Try SSH with BatchMode to fail fast if no key auth
          $sshCommand = "cd /root/kristian/manager-server/restreamer-manager && /root/.virtualenvs/venv/bin/python manage.py shell -c `"from restreamer.models import StreamingEvent; from accounts.models import RestreamerUser; user = RestreamerUser.objects.filter(api_key='$env:CLIENT_UUID').first(); event = StreamingEvent.objects.filter(user=user).first() if user else None; event and setattr(event, 'receiving_activated', True) or None; event and event.save(); print('ACTIVATED' if event else 'ERROR')`""

          $result = & ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no root@172.105.95.118 $sshCommand 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "SSH failed (no key auth): $result"
            Write-Host "Checking if event is already activated..."
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/streaming-event" -TimeoutSec 10
            if ($response -and $response.receiving_activated) {
              Write-Host "Event already activated - continuing"
              exit 0
            }
            throw "Cannot activate - SSH not configured and event not active"
          }
          Write-Host "Manager: $result"

      - name: Wait for poller to sync event
        shell: powershell
        run: |
          Write-Host "Waiting for poller to sync streaming event..."
          $maxRetries = 10
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/streaming-event" -TimeoutSec 10
              if ($response -and $response.receiving_activated) {
                Write-Host "Streaming event synced: $($response.identifier)"
                break
              }
            } catch {}
            Write-Host "Waiting for event sync (attempt $i/$maxRetries)..."
            Start-Sleep -Seconds 3
          }

      - name: Get initial chunk count
        id: initial-chunks
        shell: powershell
        run: |
          $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $initialCount = $stats.total_chunks
          Write-Host "Initial chunk count: $initialCount"
          "INITIAL_CHUNKS=$initialCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Send test RTMP stream via ffmpeg
        shell: powershell
        timeout-minutes: 2
        run: |
          # Send a 15-second test stream to Restreamer RTMP endpoint
          # Using ffmpeg with synthetic video/audio (reliable for CI testing)
          $ErrorActionPreference = 'Continue'
          $ffmpegPath = "C:\Users\newlevel\restreamer\local-client\ffmpeg.exe"

          Write-Host "Starting 15-second test RTMP stream..."

          # ffmpeg outputs to stderr, so use Start-Process to avoid PowerShell error handling
          $proc = Start-Process -FilePath $ffmpegPath -ArgumentList @(
            "-y", "-re",
            "-f", "lavfi", "-i", "testsrc=duration=15:size=320x240:rate=30",
            "-f", "lavfi", "-i", "sine=frequency=1000:duration=15",
            "-c:v", "libx264", "-preset", "ultrafast", "-c:a", "aac",
            "-f", "flv", "rtmp://127.0.0.1:1234/live/ci-e2e-test"
          ) -NoNewWindow -Wait -PassThru

          if ($proc.ExitCode -ne 0) {
            throw "ffmpeg failed with exit code $($proc.ExitCode)"
          }
          Write-Host "Test stream completed successfully"

      - name: Wait for chunk processing
        shell: powershell
        run: |
          Write-Host "Waiting for chunks to be processed and uploaded..."
          Start-Sleep -Seconds 10

      - name: Verify chunks created and uploaded
        shell: powershell
        run: |
          $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $initialCount = [int]$env:INITIAL_CHUNKS
          $newChunks = $stats.total_chunks - $initialCount
          $pendingChunks = $stats.pending_chunks

          Write-Host "=== E2E Test Results ==="
          Write-Host "Initial chunks: $initialCount"
          Write-Host "Current total:  $($stats.total_chunks)"
          Write-Host "New chunks:     $newChunks"
          Write-Host "Sent chunks:    $($stats.sent_chunks)"
          Write-Host "Pending:        $pendingChunks"
          Write-Host "Total bytes:    $($stats.total_bytes)"

          # Expect at least 8 chunks from 15-second stream (1 chunk per second, some tolerance)
          if ($newChunks -lt 8) {
            throw "Expected at least 8 new chunks, got $newChunks"
          }

          # All chunks should be uploaded (sent), none pending
          if ($pendingChunks -gt 2) {
            Write-Host "WARNING: $pendingChunks chunks still pending upload"
          }

          Write-Host "=== Local E2E Test PASSED ==="
        env:
          INITIAL_CHUNKS: ${{ steps.initial-chunks.outputs.INITIAL_CHUNKS }}

      - name: Verify chunks received by manager
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Verifying chunks were received by manager server..."

          # Add manager host key
          $null = & ssh-keyscan -H 172.105.95.118 2>$null | Out-File -Append "$env:USERPROFILE\.ssh\known_hosts" -Encoding UTF8

          # Check chunk count on manager (inline Python command)
          $pythonCmd = "from restreamer.models import ChunkRecord; from django.utils import timezone; from datetime import timedelta; recent = timezone.now() - timedelta(minutes=5); count = ChunkRecord.objects.filter(created_at__gte=recent).count(); print(f'CHUNKS_RECEIVED:{count}')"
          $sshCommand = "cd /root/kristian/manager-server/restreamer-manager && /root/.virtualenvs/venv/bin/python manage.py shell -c `"$pythonCmd`""

          $result = & ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no root@172.105.95.118 $sshCommand 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "SSH to manager failed: $result"
            Write-Host "Skipping manager verification (SSH not configured)"
            exit 0
          }

          Write-Host "Manager response: $result"

          # Parse chunk count from response
          $chunkLine = ($result | Select-String -Pattern "CHUNKS_RECEIVED:(\d+)").Matches[0].Groups[1].Value
          $receivedCount = [int]$chunkLine

          Write-Host "Chunks received by manager in last 5 minutes: $receivedCount"

          if ($receivedCount -lt 5) {
            throw "Expected at least 5 chunks on manager, got $receivedCount"
          }

          Write-Host "=== FULL E2E INTEGRATION TEST PASSED ==="
          Write-Host "Stream -> Restreamer -> S3 -> Manager: VERIFIED"

      - name: Deactivate streaming event
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          # Try to deactivate via SSH, but don't fail if SSH isn't available
          # Note: This step always succeeds - cleanup failure is non-critical
          $ErrorActionPreference = 'SilentlyContinue'

          $sshCommand = "cd /root/kristian/manager-server/restreamer-manager && /root/.virtualenvs/venv/bin/python manage.py shell -c `"from restreamer.models import StreamingEvent; from accounts.models import RestreamerUser; user = RestreamerUser.objects.filter(api_key='$env:CLIENT_UUID').first(); event = StreamingEvent.objects.filter(user=user).first() if user else None; event and setattr(event, 'receiving_activated', False) or None; event and event.save(); print('DEACTIVATED' if event else 'SKIPPED')`""

          $result = & ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no root@172.105.95.118 $sshCommand 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Cleanup: $result"
          } else {
            Write-Host "SSH cleanup skipped (no key auth configured)"
            Write-Host "Note: Event may remain activated until manually deactivated"
          }
          # Always exit successfully - cleanup is best-effort
          exit 0

  auto-release:
    name: Auto-release tag
    needs: [rust-ci-gate]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.rust-ci-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="local-client-rs-v${VERSION}"
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
