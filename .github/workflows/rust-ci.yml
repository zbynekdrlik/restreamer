name: Rust CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_stream_lan:
        description: "Deploy to stream.lan after CI passes"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Rust changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'local-client-rs/**'
              - '.github/workflows/rust-ci.yml'
              - '.github/workflows/rust-release.yml'

  version-check:
    name: Version check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Cargo.toml version is not already tagged
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="local-client-rs-v${VERSION}"
          echo "Version: $VERSION"
          echo "Tag: $TAG"
          if git tag -l | grep -qx "$TAG"; then
            echo "ERROR: Tag $TAG already exists. Bump the version in Cargo.toml."
            exit 1
          fi
          echo "OK: Tag $TAG does not exist yet."

  lint:
    name: Lint (fmt + clippy)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          # Find and add ffmpeg to PATH
          $ffmpegExe = Get-Command ffmpeg -ErrorAction SilentlyContinue
          if (-not $ffmpegExe) {
            # Search common install locations
            $searchPaths = @(
              "C:\ProgramData\chocolatey\bin",
              "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin",
              "C:\tools\ffmpeg\bin"
            )
            foreach ($path in $searchPaths) {
              if (Test-Path "$path\ffmpeg.exe") {
                echo "$path" >> $env:GITHUB_PATH
                Write-Host "Added $path to PATH"
                break
              }
            }
          }
      - name: Verify ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: ffmpeg -version
      - name: Run tests
        run: cargo test --workspace --verbose
        env:
          SQLX_OFFLINE: true

  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --workspace --exclude-files "src-tauri/*" --fail-under 55 --skip-clean --timeout 300

  security:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0134

  build:
    name: Build (${{ matrix.os }})
    needs: [changes, lint, test]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - name: Build release (service)
        run: cargo build --release -p rs-service
      - name: Upload service binary
        uses: actions/upload-artifact@v4
        with:
          name: restreamer-service-${{ matrix.os }}
          path: |
            local-client-rs/target/release/restreamer-service
            local-client-rs/target/release/restreamer-service.exe
          if-no-files-found: ignore
          retention-days: 7

  build-tauri:
    name: Build Tauri app
    needs: [changes, lint, test]
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri app
        run: npx tauri build
        env:
          SQLX_OFFLINE: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Tauri installer
        uses: actions/upload-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: local-client-rs/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

  file-size:
    name: File size check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no .rs file exceeds 1000 lines
        run: |
          OVERSIZED=$(find local-client-rs -name '*.rs' -exec sh -c 'lines=$(wc -l < "$1"); if [ "$lines" -gt 1000 ]; then echo "$1: $lines lines"; fi' _ {} \;)
          if [ -n "$OVERSIZED" ]; then
            echo "ERROR: The following Rust files exceed 1000 lines:"
            echo "$OVERSIZED"
            exit 1
          fi
          echo "OK: All Rust files are within the 1000-line limit."

  test-integrity:
    name: Test integrity check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev ffmpeg
      - name: Scan for #[ignore] on tests
        run: |
          IGNORED=$(grep -rn '#\[ignore\]' --include='*.rs' . || true)
          if [ -n "$IGNORED" ]; then
            echo "ERROR: Found #[ignore] attributes on tests. All tests must run."
            echo "$IGNORED"
            exit 1
          fi
          echo "OK: No #[ignore] attributes found."
      - name: Scan for assert!(true) false positives
        run: |
          FALSE_POS=$(grep -rn 'assert!(true)' --include='*.rs' . || true)
          if [ -n "$FALSE_POS" ]; then
            echo "ERROR: Found assert!(true) — tests must verify real behavior."
            echo "$FALSE_POS"
            exit 1
          fi
          echo "OK: No assert!(true) found."
      - name: Scan for empty test bodies
        run: |
          # Find test functions whose body is just {} or { } with nothing meaningful
          EMPTY=$(grep -Pzo '#\[test\]\s*\n\s*(async\s+)?fn\s+\w+\([^)]*\)[^{]*\{\s*\}' --include='*.rs' -rn . || true)
          if [ -n "$EMPTY" ]; then
            echo "ERROR: Found empty test bodies — tests must contain real assertions."
            echo "$EMPTY"
            exit 1
          fi
          echo "OK: No empty test bodies found."
      - name: Scan for assert_eq with trivial values
        run: |
          # Catch assert_eq!(1, 1), assert_eq!(true, true), etc.
          TRIVIAL=$(grep -rn 'assert_eq!(1,\s*1)\|assert_eq!(true,\s*true)\|assert_eq!("",\s*"")' --include='*.rs' . || true)
          if [ -n "$TRIVIAL" ]; then
            echo "ERROR: Found trivial assertions — tests must verify real behavior."
            echo "$TRIVIAL"
            exit 1
          fi
          echo "OK: No trivial assertions found."
      - name: Verify zero ignored tests in cargo test output
        run: |
          # Run tests and capture output
          OUTPUT=$(cargo test --workspace 2>&1)
          echo "$OUTPUT"

          # Check for any ignored tests
          IGNORED_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ ignored' | grep -v '0 ignored' || true)
          if [ -n "$IGNORED_COUNT" ]; then
            echo "ERROR: Some tests were ignored:"
            echo "$IGNORED_COUNT"
            exit 1
          fi

          # Check for any filtered tests
          FILTERED_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ filtered out' | grep -v '0 filtered out' || true)
          if [ -n "$FILTERED_COUNT" ]; then
            echo "ERROR: Some tests were filtered out:"
            echo "$FILTERED_COUNT"
            exit 1
          fi

          # Verify at least a minimum number of tests ran
          TOTAL_PASSED=$(echo "$OUTPUT" | grep -oP '(\d+) passed' | grep -oP '\d+' | paste -sd+ | bc)
          echo "Total tests passed: $TOTAL_PASSED"
          if [ "$TOTAL_PASSED" -lt 120 ]; then
            echo "ERROR: Expected at least 120 tests, but only $TOTAL_PASSED passed."
            echo "This may indicate tests were removed or are not being discovered."
            exit 1
          fi

          echo "OK: All $TOTAL_PASSED tests ran with 0 ignored and 0 filtered."

  frontend-e2e:
    name: Frontend E2E (Playwright)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: npx playwright test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: local-client-rs/playwright-report/
          if-no-files-found: ignore

  rust-ci-gate:
    name: Rust CI Gate
    if: always()
    needs:
      [
        changes,
        version-check,
        lint,
        test,
        coverage,
        security,
        build,
        build-tauri,
        file-size,
        test-integrity,
        frontend-e2e,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "changes:        ${{ needs.changes.result }}"
          echo "version-check:  ${{ needs.version-check.result }}"
          echo "lint:           ${{ needs.lint.result }}"
          echo "test:           ${{ needs.test.result }}"
          echo "coverage:       ${{ needs.coverage.result }}"
          echo "security:       ${{ needs.security.result }}"
          echo "build:          ${{ needs.build.result }}"
          echo "build-tauri:    ${{ needs.build-tauri.result }}"
          echo "file-size:      ${{ needs.file-size.result }}"
          echo "test-integrity: ${{ needs.test-integrity.result }}"
          echo "frontend-e2e:   ${{ needs.frontend-e2e.result }}"

          # If no Rust changes, all skipped jobs are fine
          if [[ "${{ needs.changes.outputs.rust }}" != "true" ]]; then
            echo "No Rust changes detected — gate passes."
            exit 0
          fi

          # All must succeed when Rust files changed
          FAILED=0
          for job_result in \
            "version-check:${{ needs.version-check.result }}" \
            "lint:${{ needs.lint.result }}" \
            "test:${{ needs.test.result }}" \
            "coverage:${{ needs.coverage.result }}" \
            "security:${{ needs.security.result }}" \
            "build:${{ needs.build.result }}" \
            "build-tauri:${{ needs.build-tauri.result }}" \
            "file-size:${{ needs.file-size.result }}" \
            "test-integrity:${{ needs.test-integrity.result }}" \
            "frontend-e2e:${{ needs.frontend-e2e.result }}"; do
            name="${job_result%%:*}"
            result="${job_result##*:}"
            if [[ "$result" != "success" ]]; then
              echo "FAIL: $name did not succeed (result: $result)"
              FAILED=1
            fi
          done

          if [[ "$FAILED" == "1" ]]; then
            exit 1
          fi

          echo "All Rust CI checks passed!"

  deploy-stream-lan:
    name: Deploy to stream.lan
    needs: [rust-ci-gate, build, build-tauri]
    if: github.ref == 'refs/heads/dev' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.rust-ci-gate.result == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    steps:
      - name: Download service binary
        uses: actions/download-artifact@v4
        with:
          name: restreamer-service-windows-latest
          path: artifacts/service

      - name: Download Tauri installer
        uses: actions/download-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: artifacts/tauri

      - name: List artifacts
        run: |
          Write-Host "=== Service binary ==="
          Get-ChildItem artifacts/service/
          Write-Host "=== Tauri installer ==="
          Get-ChildItem artifacts/tauri/
        shell: powershell

      - name: Deploy
        shell: powershell
        run: |
          # Stage artifacts for manual deployment
          # The runner doesn't have admin privileges to manage services directly
          # Copy artifacts to a staging location and call the existing install script pattern

          $stagingDir = "C:\ProgramData\Restreamer\staging"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          Write-Host "=== Staging artifacts ==="
          $serviceBin = Get-ChildItem "artifacts/service/*.exe" | Select-Object -First 1
          $installer = Get-ChildItem "artifacts/tauri/*.exe" | Select-Object -First 1

          Copy-Item $serviceBin.FullName "$stagingDir\restreamer-service.exe" -Force
          Copy-Item $installer.FullName "$stagingDir\Restreamer-Setup.exe" -Force

          Write-Host "Staged: $($serviceBin.Name)"
          Write-Host "Staged: $($installer.Name)"

          # Create a deployment script that can be run manually or by a task
          $deployScript = @'
          $ErrorActionPreference = "Continue"
          $InstallDir = "C:\Program Files\Restreamer"
          $stagingDir = "C:\ProgramData\Restreamer\staging"
          $ConfigFile = "C:\ProgramData\Restreamer\config.json"

          # Stop service and processes
          net stop "restreamer-service" 2>&1 | Out-Null
          Start-Sleep -Seconds 2
          taskkill /F /IM "restreamer-service.exe" 2>&1 | Out-Null
          taskkill /F /IM "Restreamer.exe" 2>&1 | Out-Null
          Start-Sleep -Seconds 1

          # Install service binary
          New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null
          Copy-Item "$stagingDir\restreamer-service.exe" "$InstallDir\restreamer-service.exe" -Force

          # Run NSIS installer silently
          $installer = Get-ChildItem "$stagingDir\Restreamer-Setup.exe" | Select-Object -First 1
          if ($installer) {
            Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          }

          # Register service if needed
          $svcQuery = sc.exe query "restreamer-service" 2>&1
          if ($LASTEXITCODE -ne 0) {
            sc.exe create "restreamer-service" binPath= "`"$InstallDir\restreamer-service.exe`" `"$ConfigFile`"" start= auto DisplayName= "Restreamer Service"
            sc.exe description "restreamer-service" "Restreamer local client service"
          }

          # Start service
          net start "restreamer-service"
          Start-Sleep -Seconds 3
          '@

          $deployScript | Out-File -FilePath "$stagingDir\deploy.ps1" -Encoding UTF8 -Force
          Write-Host "=== Deploy script created at $stagingDir\deploy.ps1 ==="

          # Try to run with psexec if available, otherwise use direct approach
          Write-Host "=== Attempting deployment ==="

          # Direct deployment attempt (may fail without admin)
          $ErrorActionPreference = "Continue"

          # Kill processes first (this usually works)
          taskkill /F /IM "restreamer-service.exe" 2>&1 | Out-Null
          taskkill /F /IM "Restreamer.exe" 2>&1 | Out-Null
          Start-Sleep -Seconds 2

          # Try to copy service binary
          $InstallDir = "C:\Program Files\Restreamer"
          New-Item -ItemType Directory -Path $InstallDir -Force 2>&1 | Out-Null
          Copy-Item "$stagingDir\restreamer-service.exe" "$InstallDir\restreamer-service.exe" -Force 2>&1

          # Run NSIS installer
          Write-Host "Running NSIS installer..."
          Start-Process -FilePath "$stagingDir\Restreamer-Setup.exe" -ArgumentList "/S" -Wait

          # Try to start service
          net start "restreamer-service" 2>&1

          Start-Sleep -Seconds 3

          # Check result
          $svcQuery = sc.exe query "restreamer-service" 2>&1
          if ($svcQuery -match "RUNNING") {
            Write-Host "=== Deployment SUCCESS - Service running ==="
          } else {
            Write-Host "=== Service not running after deployment ==="
            Write-Host "Service status: $svcQuery"
            Write-Host ""
            Write-Host "Manual deployment may be required. Run as admin:"
            Write-Host "  powershell -ExecutionPolicy Bypass -File C:\ProgramData\Restreamer\staging\deploy.ps1"
            # Don't fail - artifacts are staged for manual deployment
          }

      - name: Verify deployment
        shell: powershell
        run: |
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/health" -TimeoutSec 10
            Write-Host "API Health: OK"
          } catch {
            Write-Host "API Health: FAILED - $_"
            exit 1
          }

  auto-release:
    name: Auto-release tag
    needs: [rust-ci-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="local-client-rs-v${VERSION}"
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
