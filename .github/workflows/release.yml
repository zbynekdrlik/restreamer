name: Release

on:
  push:
    tags:
      - "restreamer-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. restreamer-v0.1.0)"
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Extract and validate version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#restreamer-v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:   $VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-delivery:
    name: Build delivery binary (Linux)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build delivery binary
        run: cargo build --release -p rs-delivery
        env:
          SQLX_OFFLINE: true
      - name: Rename artifact
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cp target/release/rs-delivery "rs-delivery-${VERSION}-linux-amd64"
      - name: Generate checksum
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sha256sum "rs-delivery-${VERSION}-linux-amd64" > "rs-delivery-${VERSION}-linux-amd64.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: delivery-binary
          path: |
            rs-delivery-*-linux-amd64
            rs-delivery-*-linux-amd64.sha256

  build-tauri:
    name: Build Tauri app (Windows)
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Trunk
        run: cargo install trunk
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Set build version and timestamp
        id: build-info
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $timestamp = Get-Date -Format "MMM dd HH:mm"
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
          echo "BUILD_TIMESTAMP=$timestamp" >> $env:GITHUB_ENV
          echo "Version: $version, Timestamp: $timestamp"
      - name: Build Leptos UI (WASM)
        run: |
          cd leptos-ui
          trunk build --release
        env:
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
      - name: Build Tauri app
        run: cargo tauri build
        env:
          SQLX_OFFLINE: true
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Create GitHub Release
    needs: [validate, build-delivery, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: restreamer-v${{ needs.validate.outputs.version }}
          name: Restreamer v${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/delivery-binary/*
            artifacts/tauri-installer/*
          body: |
            ## Restreamer v${{ needs.validate.outputs.version }}

            ### Assets
            - `Restreamer_*_x64-setup.exe` — Tauri NSIS installer (unified app with embedded service + tray icon)
            - `rs-delivery-*-linux-amd64` — Linux delivery VPS binary

            ### Installation
            ```powershell
            irm https://raw.githubusercontent.com/zbynekdrlik/restreamer/main/scripts/install.ps1 | iex
            ```
