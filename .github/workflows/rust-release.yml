name: Rust Release

on:
  push:
    tags:
      - "local-client-rs-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. local-client-rs-v0.1.0)"
        required: true

concurrency:
  group: rust-release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Extract and validate version
        id: version
        working-directory: local-client-rs
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#local-client-rs-v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:   $VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-service:
    name: Build service (Windows)
    needs: validate
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Build service binary
        run: cargo build --release -p rs-service
        env:
          SQLX_OFFLINE: true
      - name: Rename artifact
        run: |
          $VERSION = "${{ needs.validate.outputs.version }}"
          Copy-Item "target/release/restreamer-service.exe" "restreamer-service-${VERSION}-windows-x64.exe"
      - name: Generate checksum
        run: |
          $VERSION = "${{ needs.validate.outputs.version }}"
          $hash = Get-FileHash "restreamer-service-${VERSION}-windows-x64.exe" -Algorithm SHA256
          "$($hash.Hash.ToLower())  restreamer-service-${VERSION}-windows-x64.exe" | Out-File -Encoding ASCII "restreamer-service-${VERSION}-windows-x64.exe.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: service-binary
          path: |
            local-client-rs/restreamer-service-*-windows-x64.exe
            local-client-rs/restreamer-service-*-windows-x64.exe.sha256

  build-tauri:
    name: Build Tauri app (Windows)
    needs: validate
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
      - name: Build Tauri app
        run: npx tauri build
        env:
          SQLX_OFFLINE: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-installer
          path: local-client-rs/src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Create GitHub Release
    needs: [validate, build-service, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: local-client-rs-v${{ needs.validate.outputs.version }}
          name: Restreamer Local Client v${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/service-binary/*
            artifacts/tauri-installer/*
          body: |
            ## Restreamer Local Client v${{ needs.validate.outputs.version }}

            ### Assets
            - `restreamer-service-*-windows-x64.exe` — Headless Windows service binary
            - `Restreamer_*_x64-setup.exe` — Tauri NSIS installer (tray app + dashboard)

            ### Installation
            ```powershell
            irm https://raw.githubusercontent.com/zbynekdrlik/restreamer/main/local-client-rs/install.ps1 | iex
            ```

  deploy-stream-lan:
    name: Deploy to stream.lan
    needs: [release, build-service, build-tauri]
    runs-on: [self-hosted, windows, stream-lan]
    steps:
      - name: Clean old artifacts
        shell: powershell
        run: |
          # Remove old artifacts to prevent version mix-ups on self-hosted runner
          Remove-Item -Path "artifacts" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned artifacts directory"

      - name: Download service binary
        uses: actions/download-artifact@v4
        with:
          name: service-binary
          path: artifacts/service

      - name: Download Tauri installer
        uses: actions/download-artifact@v4
        with:
          name: tauri-installer
          path: artifacts/tauri

      - name: List artifacts
        run: |
          Write-Host "=== Service binary ==="
          Get-ChildItem artifacts/service/
          Write-Host "=== Tauri installer ==="
          Get-ChildItem artifacts/tauri/
        shell: powershell

      - name: Deploy
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $InstallDir = "C:\Program Files\Restreamer"
          $ConfigFile = "C:\ProgramData\Restreamer\config.json"

          Write-Host "=== Stopping service and processes ==="
          net stop "restreamer-service" 2>&1 | Out-Null
          Start-Sleep -Seconds 2
          $null = cmd /c "taskkill /F /IM restreamer-service.exe 2>nul"
          $null = cmd /c "taskkill /F /IM restreamer-tray.exe 2>nul"
          Start-Sleep -Seconds 1

          Write-Host "=== Installing service binary ==="
          New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null
          $serviceBin = Get-ChildItem "artifacts/service/*.exe" -Exclude "*.sha256" | Select-Object -First 1
          Copy-Item $serviceBin.FullName "$InstallDir\restreamer-service.exe" -Force
          Write-Host "Installed: $($serviceBin.Name)"

          Write-Host "=== Running NSIS installer ==="
          $installer = Get-ChildItem "artifacts/tauri/*setup*.exe" | Select-Object -First 1
          if ($installer) {
            Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
            Write-Host "Installed: $($installer.Name)"
          }

          Write-Host "=== Registering service ==="
          $svcQuery = sc.exe query "restreamer-service" 2>&1
          if ($LASTEXITCODE -ne 0) {
            sc.exe create "restreamer-service" binPath= "`"$InstallDir\restreamer-service.exe`" `"$ConfigFile`"" start= auto DisplayName= "Restreamer Service"
            sc.exe description "restreamer-service" "Restreamer local client service"
          }

          Write-Host "=== Starting service ==="
          net start "restreamer-service"
          Start-Sleep -Seconds 3

          $svcQuery = sc.exe query "restreamer-service" 2>&1
          if ($svcQuery -match "RUNNING") {
            Write-Host "=== Service started successfully ==="
          } else {
            Write-Host "WARNING: Service may not be running"
            Write-Host $svcQuery
          }

      - name: Launch tray app via Task Scheduler
        shell: powershell
        run: |
          $ErrorActionPreference = "SilentlyContinue"
          $TaskName = "RestreamerTray"
          $ExePath = "C:\Program Files\Restreamer\restreamer-tray.exe"
          $Username = "newlevel"

          Write-Host "=== Configuring tray app launch ==="

          $null = cmd /c "taskkill /F /IM restreamer-tray.exe 2>nul"
          Start-Sleep -Seconds 1

          Get-ScheduledTask | Where-Object { $_.TaskName -like "*estreamer*Tray*" } | ForEach-Object {
            Write-Host "Removing duplicate task: $($_.TaskName)"
            Unregister-ScheduledTask -TaskName $_.TaskName -Confirm:$false -ErrorAction SilentlyContinue
          }

          $action = New-ScheduledTaskAction -Execute $ExePath
          $trigger = New-ScheduledTaskTrigger -AtLogon -User $Username
          $principal = New-ScheduledTaskPrincipal -UserId $Username -LogonType Interactive -RunLevel Limited
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -ExecutionTimeLimit 0

          $null = Register-ScheduledTask -TaskName $TaskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force 2>&1
          Write-Host "Registered task: $TaskName"

          $null = Start-ScheduledTask -TaskName $TaskName 2>&1
          Start-Sleep -Seconds 2

          $tray = Get-Process -Name "restreamer-tray" -ErrorAction SilentlyContinue
          if ($tray) {
            Write-Host "=== Tray app launched (PID: $($tray.Id), Session: $($tray.SessionId)) ==="
          } else {
            Write-Host "WARNING: Tray process not found - will start on next user login"
          }

          exit 0

      - name: Verify deployment
        shell: powershell
        run: |
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/health" -TimeoutSec 10
            Write-Host "API Health: OK"
          } catch {
            Write-Host "API Health: FAILED - $_"
            exit 1
          }
