name: Rust Release

on:
  push:
    tags:
      - "restreamer-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. restreamer-v0.1.0)"
        required: true

concurrency:
  group: rust-release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Extract and validate version
        id: version
        working-directory: local-client-rs
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#restreamer-v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:   $VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-delivery:
    name: Build delivery binary (Linux)
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Build delivery binary
        run: cargo build --release -p rs-delivery
        env:
          SQLX_OFFLINE: true
      - name: Rename artifact
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cp target/release/rs-delivery "rs-delivery-${VERSION}-linux-amd64"
      - name: Generate checksum
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sha256sum "rs-delivery-${VERSION}-linux-amd64" > "rs-delivery-${VERSION}-linux-amd64.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: delivery-binary
          path: |
            local-client-rs/rs-delivery-*-linux-amd64
            local-client-rs/rs-delivery-*-linux-amd64.sha256

  build-tauri:
    name: Build Tauri app (Windows)
    needs: validate
    runs-on: windows-latest
    defaults:
      run:
        working-directory: local-client-rs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: local-client-rs
      - name: Install Trunk
        run: cargo install trunk
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Set build version and timestamp
        id: build-info
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $timestamp = Get-Date -Format "MMM dd HH:mm"
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
          echo "BUILD_TIMESTAMP=$timestamp" >> $env:GITHUB_ENV
          echo "Version: $version, Timestamp: $timestamp"
      - name: Build Leptos UI (WASM)
        run: |
          cd leptos-ui
          trunk build --release
        env:
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
      - name: Build Tauri app
        run: cargo tauri build
        env:
          SQLX_OFFLINE: true
          BUILD_VERSION: ${{ env.BUILD_VERSION }}
          BUILD_TIMESTAMP: ${{ env.BUILD_TIMESTAMP }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-installer
          path: local-client-rs/src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Create GitHub Release
    needs: [validate, build-delivery, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: restreamer-v${{ needs.validate.outputs.version }}
          name: Restreamer v${{ needs.validate.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/delivery-binary/*
            artifacts/tauri-installer/*
          body: |
            ## Restreamer v${{ needs.validate.outputs.version }}

            ### Assets
            - `Restreamer_*_x64-setup.exe` — Tauri NSIS installer (unified app with embedded service + tray icon)
            - `rs-delivery-*-linux-amd64` — Linux delivery VPS binary

            ### Installation
            ```powershell
            irm https://raw.githubusercontent.com/zbynekdrlik/restreamer/main/local-client-rs/install.ps1 | iex
            ```

  deploy-stream-lan:
    name: Deploy to stream.lan
    needs: [release, build-tauri]
    runs-on: [self-hosted, windows, stream-lan]
    steps:
      - name: Clean old artifacts
        shell: powershell
        run: |
          # Remove old artifacts to prevent version mix-ups on self-hosted runner
          Remove-Item -Path "artifacts" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleaned artifacts directory"

      - name: Download Tauri installer
        uses: actions/download-artifact@v4
        with:
          name: tauri-installer
          path: artifacts/tauri

      - name: List artifacts
        run: |
          Write-Host "=== Tauri installer ==="
          Get-ChildItem artifacts/tauri/
        shell: powershell

      - name: Deploy Tauri app
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $InstallDir = "C:\Program Files\Restreamer"

          Write-Host "=== Stopping old processes ==="
          taskkill /F /IM "Restreamer.exe" 2>&1 | Out-Null
          taskkill /F /IM "restreamer-service.exe" 2>&1 | Out-Null
          Start-Sleep -Seconds 1

          # Remove legacy Windows service if it exists
          Write-Host "=== Removing legacy Windows service ==="
          foreach ($name in @("RestreamerService", "restreamer-service")) {
            sc.exe stop $name 2>&1 | Out-Null
            sc.exe delete $name 2>&1 | Out-Null
          }

          # Clean up old service binary
          Remove-Item "$InstallDir\restreamer-service.exe" -Force -ErrorAction SilentlyContinue

          Write-Host "=== Running NSIS installer ==="
          $installer = Get-ChildItem "artifacts/tauri/*setup*.exe" | Select-Object -First 1
          if ($installer) {
            Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
            Write-Host "Installed: $($installer.Name)"
          }

      - name: Setup Restreamer auto-start
        shell: powershell
        run: |
          $TaskName = "RestreamerGUI"
          $ExePath = "C:\Program Files\Restreamer\Restreamer.exe"
          $Username = "newlevel"

          Write-Host "=== Setting up Restreamer auto-start ==="

          # Remove old scheduled tasks
          Get-ScheduledTask | Where-Object { $_.TaskName -like "*estreamer*" } | ForEach-Object {
            Write-Host "Removing old task: $($_.TaskName)"
            Unregister-ScheduledTask -TaskName $_.TaskName -Confirm:$false -ErrorAction SilentlyContinue
          }

          # Create scheduled task for GUI auto-start at user login (for interactive use)
          $action = New-ScheduledTaskAction -Execute $ExePath
          $trigger = New-ScheduledTaskTrigger -AtLogon -User $Username
          $principal = New-ScheduledTaskPrincipal -UserId $Username -LogonType Interactive -RunLevel Limited
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -ExecutionTimeLimit 0

          Register-ScheduledTask -TaskName $TaskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings | Out-Null
          Write-Host "Registered scheduled task: $TaskName (for interactive login)"

          # For CI: Start in headless mode (no GUI, just service)
          Write-Host "=== Starting Restreamer in headless mode ==="
          Start-Process -FilePath $ExePath -ArgumentList "--headless" -WindowStyle Hidden
          Start-Sleep -Seconds 5

          $proc = Get-Process -Name "Restreamer" -ErrorAction SilentlyContinue
          if ($proc) {
            Write-Host "=== Restreamer running (PID: $($proc.Id)) ==="
          } else {
            Write-Host "Restreamer process not started - will start on next user login"
          }

      - name: Verify deployment
        shell: powershell
        run: |
          $maxRetries = 6
          $success = $false
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/health" -TimeoutSec 10
              Write-Host "API Health: OK"
              $success = $true
              break
            } catch {
              Write-Host "Attempt $i/$maxRetries : $_"
              Start-Sleep -Seconds 5
            }
          }
          if (-not $success) {
            Write-Error "API Health: FAILED after $maxRetries attempts"
            exit 1
          }
