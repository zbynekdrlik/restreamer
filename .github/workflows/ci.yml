      - name: Save original OBS stream settings and switch to Restreamer
        id: obs-setup
        shell: powershell
        run: |
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)

          try {
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()
            Write-Host "Connected to OBS WebSocket"
          } catch {
            throw "FAILED: Cannot connect to OBS WebSocket at $uri - $_"
          }

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Receive Hello message
          $hello = Receive-OBSMessage $ws
          Write-Host "OBS WebSocket version: $($hello.d.obsWebSocketVersion)"

          # Build auth string
          $authRequired = $hello.d.authentication
          if ($authRequired) {
            $challenge = $authRequired.challenge
            $salt = $authRequired.salt

            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $salt)
            $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))

            $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $challenge)
            $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))

            $identify = @{
              op = 1
              d = @{
                rpcVersion = 1
                authentication = $authHash
              }
            } | ConvertTo-Json -Depth 5
          } else {
            $identify = @{
              op = 1
              d = @{
                rpcVersion = 1
              }
            } | ConvertTo-Json -Depth 5
          }

          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws
          Write-Host "OBS identified: op=$($identified.op)"

          # Get current stream service settings
          $getSettings = @{
            op = 6
            d = @{
              requestType = "GetStreamServiceSettings"
              requestId = "get-settings-1"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $getSettings
          $settingsResp = Receive-OBSMessage $ws
          $currentSettings = $settingsResp.d.responseData.streamServiceSettings
          $currentType = $settingsResp.d.responseData.streamServiceType

          Write-Host "Original stream type: $currentType"
          Write-Host "Original server: $($currentSettings.server)"

          # Save original settings for restoration
          $origServer = $currentSettings.server
          $origKey = $currentSettings.key
          "ORIG_SERVER=$origServer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ORIG_KEY=$origKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ORIG_TYPE=$currentType" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # Switch to local Restreamer RTMP
          $setSettings = @{
            op = 6
            d = @{
              requestType = "SetStreamServiceSettings"
              requestId = "set-settings-1"
              requestData = @{
                streamServiceType = "rtmp_custom"
                streamServiceSettings = @{
                  server = "rtmp://127.0.0.1:1234/live"
                  key = "obs-e2e-test"
                }
              }
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $setSettings
          $setResp = Receive-OBSMessage $ws
          Write-Host "Switched OBS to Restreamer RTMP: rtmp://127.0.0.1:1234/live/obs-e2e-test"

          try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }

      - name: "Pre-flight: verify no stale delivery instances"
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Checking for stale delivery instances..."
          # Step 1: Clean up via local API (uses DB state)
          try {
            $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances" -TimeoutSec 10
            if ($instances -and $instances.Count -gt 0) {
              Write-Host "WARNING: Found $($instances.Count) stale delivery instance(s), stopping..."
              foreach ($inst in $instances) {
                Write-Host "  Stopping instance: id=$($inst.id), event_id=$($inst.event_id), status=$($inst.status)"
                $body = @{ event_id = $inst.event_id } | ConvertTo-Json
                try {
                  Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/stop" `
                    -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30
                } catch {
                  Write-Host "  Stop failed for event_id=$($inst.event_id): $_"
                }
              }
              Start-Sleep -Seconds 5
            }
          } catch {
            Write-Host "Could not check delivery instances via API: $_"
          }

          # Step 2: Clean up orphaned Hetzner VPS directly (survives Restreamer restarts)
          # This catches VPS instances left behind by cancelled CI runs.
          if ($env:HETZNER_API_TOKEN) {
            Write-Host "Checking Hetzner API for orphaned rs-delivery VPS instances..."
            try {
              $headers = @{ Authorization = "Bearer $($env:HETZNER_API_TOKEN)" }
              $resp = Invoke-RestMethod -Uri "https://api.hetzner.cloud/v1/servers?label_selector=app=restreamer" `
                -Headers $headers -TimeoutSec 15
              if ($resp.servers -and $resp.servers.Count -gt 0) {
                foreach ($srv in $resp.servers) {
                  Write-Host "  Deleting orphaned Hetzner VPS: id=$($srv.id) name=$($srv.name) status=$($srv.status) ip=$($srv.public_net.ipv4.ip)"
                  try {
                    Invoke-RestMethod -Uri "https://api.hetzner.cloud/v1/servers/$($srv.id)" `
                      -Method DELETE -Headers $headers -TimeoutSec 15
                    Write-Host "  Deleted VPS $($srv.id)"
                  } catch {
                    Write-Host "  Failed to delete VPS $($srv.id): $_"
                  }
                }
                Start-Sleep -Seconds 3
              } else {
                Write-Host "  No orphaned Hetzner VPS found"
              }
            } catch {
              Write-Host "  Hetzner API check failed: $_"
            }
          }
          Write-Host "Pre-flight cleanup complete"

      - name: Start stream (activate + delivery VPS)
        shell: powershell
        run: |
          # Find or create the event, deactivate others, then call start-stream
          # which sets receiving_activated=true, delivering_activated=true,
          # clears stale chunks, and starts the Hetzner delivery VPS.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10

          # Deactivate ALL other events first so get_streaming_event() returns our event
          foreach ($ev in $events) {
            if ($ev.name -ne $env:EVENT_NAME -and ($ev.receiving_activated -or $ev.delivering_activated)) {
              Write-Host "Deactivating other event: id=$($ev.id) name=$($ev.name)"
              try {
                Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($ev.id)/deactivate" `
                  -Method POST -TimeoutSec 10
              } catch { Write-Host "  Deactivate failed: $_" }
            }
          }

          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          if (-not $targetEvent) {
            Write-Host "$($env:EVENT_NAME) event not found locally, creating it..."
            $body = @{ name = $env:EVENT_NAME } | ConvertTo-Json
            $targetEvent = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" `
              -Method POST -Body $body -ContentType "application/json" -TimeoutSec 10
          }
          Write-Host "Event id: $($targetEvent.id), name: $($targetEvent.name)"

          # Start stream: activates receiving + delivering, clears stale chunks, starts VPS
          Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)/start-stream" `
            -Method POST -TimeoutSec 300

          # Verify both flags are set
          $event = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)" -TimeoutSec 10
          if (-not $event.receiving_activated -or -not $event.delivering_activated) {
            throw "FAILED: Event not fully activated: receiving=$($event.receiving_activated) delivering=$($event.delivering_activated)"
          }
          Write-Host "Stream started: receiving=$($event.receiving_activated) delivering=$($event.delivering_activated)"

      - name: Start OBS stream
        shell: powershell
        run: |
          # Send StartStream via OBS WebSocket, then disconnect.
          # We verify stream status separately to avoid event message noise.
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)
          $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Receive Hello + Identify
          $hello = Receive-OBSMessage $ws
          $authRequired = $hello.d.authentication
          if ($authRequired) {
            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
            $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
            $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
            $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
            $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
          } else {
            $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
          }
          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws

          # Send StartStream request
          $startStream = @{
            op = 6
            d = @{
              requestType = "StartStream"
              requestId = "start-stream-1"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $startStream
          # Read response - skip any event messages (op=5) that arrive before the response (op=7)
          for ($r = 0; $r -lt 5; $r++) {
            $startResp = Receive-OBSMessage $ws
            Write-Host "Received message: op=$($startResp.op)"
            if ($startResp.op -eq 7) { break }
          }

          $ws.CloseOutputAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()
          $ws.Dispose()
          Write-Host "StartStream sent, waiting for OBS to connect to RTMP..."

      - name: Verify OBS is streaming
        shell: powershell
        run: |
          # Reconnect to check stream status (avoids event noise from StartStream)
          Start-Sleep -Seconds 5

          $maxRetries = 6
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $getStatus = @{
              op = 6
              d = @{
                requestType = "GetStreamStatus"
                requestId = "get-status-$attempt"
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $getStatus

            # Read responses, skip events (op=5)
            $statusResp = $null
            for ($r = 0; $r -lt 5; $r++) {
              $msg = Receive-OBSMessage $ws
              if ($msg.op -eq 7) {
                $statusResp = $msg
                break
              }
              Write-Host "Skipping event: op=$($msg.op)"
            }

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }

            if ($statusResp -and $statusResp.d.responseData.outputActive) {
              Write-Host "OBS is streaming (attempt ${attempt}/${maxRetries})"
              Write-Host "OBS is now streaming to Restreamer RTMP"
              return
            }

            Write-Host "OBS not streaming yet (attempt ${attempt}/${maxRetries}), waiting..."
            Start-Sleep -Seconds 5
          }

          throw "FAILED: OBS stream did not start after $maxRetries attempts"

      - name: Wait for chunks and verify upload
        shell: powershell
        timeout-minutes: 3
        run: |
          Write-Host "Waiting for chunks to be created and uploaded to S3..."

          $initialStats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $initialCount = $initialStats.total_chunks
          Write-Host "Initial chunk count: $initialCount"

          $maxRetries = 30
          for ($i = 1; $i -le $maxRetries; $i++) {
            $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
            $newChunks = $stats.total_chunks - $initialCount
            Write-Host "Attempt ${i}/${maxRetries}: new_chunks=$newChunks, pending=$($stats.pending_chunks)"

            if ($newChunks -ge 8 -and $stats.pending_chunks -eq 0) {
              Write-Host "=== Chunks verified: $newChunks new chunks, 0 pending ==="
              return
            }
            Start-Sleep -Seconds 3
          }

          $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $newChunks = $stats.total_chunks - $initialCount
          if ($newChunks -lt 8) {
            throw "FAILED: Only $newChunks new chunks created (need >= 8)"
          }
          if ($stats.pending_chunks -gt 0) {
            throw "FAILED: $($stats.pending_chunks) chunks still pending S3 upload"
          }

      - name: Verify YouTube is NOT receiving stream (baseline)
        shell: powershell
        timeout-minutes: 2
        run: |
          # BASELINE CHECK: Before delivery starts, verify YouTube is NOT
          # receiving stream data. Uses local Rust YouTube API (rs-youtube
          # with server-side OAuth, auto-refresh, no browser needed).
          # This proves the post-delivery check detects a real state change.
          Write-Host "Checking YouTube stream status via local API..."
          $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

          Write-Host "stream_receiving: $($response.stream_receiving)"
          Write-Host "stream_count: $($response.stream_count)"

          if ($response.error) {
            throw "BASELINE FAILED: YouTube API error: $($response.error)"
          }

          if ($response.streams) {
            foreach ($s in $response.streams) {
              Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status), cdn_resolution=$($s.cdn_resolution), cdn_frame_rate=$($s.cdn_frame_rate), cdn_ingestion=$($s.cdn_ingestion_type)"
            }
          }

          if ($response.stream_receiving) {
            throw "BASELINE FAILED: YouTube is already receiving stream data before delivery started. A stale stream from a previous run may still be active."
          }

          Write-Host "=== Baseline PASSED: YouTube is NOT receiving stream data ==="

      - name: Verify E2E event has endpoints configured
        shell: powershell
        run: |
          # The E2E event must have endpoints pre-configured on stream.lan.
          # CI does NOT create or manage endpoints — that's the user's job.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          $endpoints = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$eventId/endpoints" -TimeoutSec 10
          if (-not $endpoints -or $endpoints.Count -eq 0) {
            throw "FAILED: Event '$($env:EVENT_NAME)' has no endpoints configured. Configure endpoints on stream.lan first."
          }

          Write-Host "Event '$($env:EVENT_NAME)' has $($endpoints.Count) endpoint(s):"
          foreach ($ep in $endpoints) {
            Write-Host "  - $($ep.alias) ($($ep.service_type))"
          }

      - name: Wait for delivery server ready
        shell: powershell
        timeout-minutes: 5
        run: |
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          Write-Host "Waiting for delivery server to start ffmpeg endpoints..."
          # Cloud-init can take 5-7 minutes: apt update + install ffmpeg + download binary + start
          $maxRetries = 40
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30

              Write-Host "--- Attempt ${i}/${maxRetries} ---"
              Write-Host "  server_ip: $($response.server_ip)"
              Write-Host "  instance_status: $($response.instance_status)"
              Write-Host "  server_ready: $($response.server_ready)"
              Write-Host "  endpoints_alive: $($response.endpoints_alive)"

              if ($response.endpoint_details) {
                foreach ($ep in $response.endpoint_details) {
                  Write-Host "  Endpoint: $($ep.alias) | alive=$($ep.alive) | buffer=$($ep.buff_size_bytes)B | chunk=$($ep.current_chunk_id)"
                }
              }

              if ($response.instance_status -eq "failed") {
                Write-Host "  DIAGNOSTIC: Instance status is 'failed'"
                $chunkStats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats" -TimeoutSec 10
                Write-Host "  DIAGNOSTIC: total=$($chunkStats.total_chunks) pending=$($chunkStats.pending_chunks) sent=$($chunkStats.sent_chunks)"
                # Get last 5 chunks to see their event IDs
                try {
                  $chunks = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks?limit=5&offset=$([math]::Max(0, $chunkStats.total_chunks - 5))" -TimeoutSec 10
                  foreach ($c in $chunks) {
                    Write-Host "  DIAGNOSTIC chunk: id=$($c.id) event_id=$($c.streaming_event_id) size=$($c.data_size) sent=$($c.sent_to_s3)"
                  }
                } catch { Write-Host "  DIAGNOSTIC: chunk query failed: $_" }
              }

              if ($response.server_ready -and $response.endpoints_alive) {
                Write-Host "=== Delivery server fully operational with live endpoints ==="
                return
              }
            } catch {
              Write-Host "Request failed on attempt ${i}: $_"
            }
            Start-Sleep -Seconds 15
          }
          throw "FAILED: Delivery server not ready after $maxRetries attempts (~10 min)"

      - name: Verify delivery progression
        shell: powershell
        timeout-minutes: 3
        run: |
          # Delivering server sends to YouTube via the configured endpoint service type
          # Take 4 readings at 15s intervals to catch stalls that 2-reading check misses
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          Write-Host "Verifying delivery progression with 4 readings at 15s intervals..."

          $readings = @()
          for ($r = 1; $r -le 4; $r++) {
            if ($r -gt 1) { Start-Sleep -Seconds 15 }
            $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
            $chunkId = 0
            $alive = $false
            $stall = $null
            if ($resp.endpoint_details -and $resp.endpoint_details.Count -gt 0) {
              $chunkId = $resp.endpoint_details[0].current_chunk_id
              $alive = $resp.endpoint_details[0].alive
              $stall = $resp.endpoint_details[0].stall_reason
            }
            $readings += @{ chunk_id = $chunkId; alive = $alive; stall = $stall }
            Write-Host "Reading ${r}: chunk_id=$chunkId, alive=$alive, stall=$stall"
          }

          # Assert EVERY consecutive pair shows chunk advancement
          for ($i = 0; $i -lt ($readings.Count - 1); $i++) {
            $prev = $readings[$i].chunk_id
            $next = $readings[$i + 1].chunk_id
            if ($next -le $prev) {
              throw "FAILED: chunks did not advance between reading $($i+1) and $($i+2): $prev -> $next (stall: $($readings[$i+1].stall))"
            }
          }

          # Assert total advancement >= 10 chunks over 45s
          $totalAdvance = $readings[3].chunk_id - $readings[0].chunk_id
          if ($totalAdvance -lt 10) {
            throw "FAILED: total chunk advancement $totalAdvance < 10 over 45s ($($readings[0].chunk_id) -> $($readings[3].chunk_id))"
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  DELIVERY CONFIRMED: $totalAdvance chunks advanced over 45s"
          Write-Host "  All 4 readings showed continuous progression"
          Write-Host "  ffmpeg is alive and sending to YouTube"
          Write-Host "=========================================="

      - name: Verify cache delay meets target
        shell: powershell
        timeout-minutes: 5
        run: |
          # TDD assertion: After delivery is streaming, verify that the
          # chunk_delay_secs for non-fast endpoints is at least 80% of the
          # configured target (default 120s). This catches the 70s bug.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          # Get target delay from config (default 120s if not set on event)
          $targetDelay = 120
          if ($targetEvent.cache_delay_secs) {
            $targetDelay = $targetEvent.cache_delay_secs
          }
          $minAcceptable = [math]::Floor($targetDelay * 0.8)
          Write-Host "Target delay: ${targetDelay}s, minimum acceptable: ${minAcceptable}s"

          # Take 3 readings at 10s intervals to get stable delay measurement
          $delays = @()
          for ($r = 1; $r -le 3; $r++) {
            if ($r -gt 1) { Start-Sleep -Seconds 10 }
            $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30

            if ($resp.endpoint_details) {
              foreach ($ep in $resp.endpoint_details) {
                if (-not $ep.is_fast) {
                  $delays += $ep.chunk_delay_secs
                  Write-Host "Reading ${r}: endpoint=$($ep.alias) chunk_delay_secs=$($ep.chunk_delay_secs) chunk_id=$($ep.current_chunk_id)"
                }
              }
            }
          }

          if ($delays.Count -eq 0) {
            throw "FAILED: No non-fast endpoint delay readings found"
          }

          # Use the median delay reading
          $sorted = $delays | Sort-Object
          $median = $sorted[[math]::Floor($sorted.Count / 2)]
          Write-Host ""
          Write-Host "Delay readings: $($delays -join ', ')"
          Write-Host "Median delay: ${median}s (target: ${targetDelay}s, min: ${minAcceptable}s)"

          if ($median -lt $minAcceptable) {
            Write-Host ""
            Write-Host "=========================================="
            Write-Host "  FAIL: Cache delay ${median}s < minimum ${minAcceptable}s"
            Write-Host "  Target was ${targetDelay}s (80% = ${minAcceptable}s)"
            Write-Host "  This is the 70s cache delay bug!"
            Write-Host "=========================================="
            throw "FAILED: Cache delay ${median}s is below minimum acceptable ${minAcceptable}s (target: ${targetDelay}s)"
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  CACHE DELAY VERIFIED: ${median}s >= ${minAcceptable}s (target: ${targetDelay}s)"
          Write-Host "=========================================="

      - name: Verify cache delay is stable (not growing)
        shell: powershell
        timeout-minutes: 5
        run: |
          # TDD assertion: Cache delay should stabilize, not grow indefinitely.
          # Take two readings 2 minutes apart. If delta > 15s, delivery is
          # slower than real-time (the pacing bug).
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          # Reading 1
          $resp1 = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
          $delay1 = 0
          if ($resp1.endpoint_details) {
            foreach ($ep in $resp1.endpoint_details) {
              if (-not $ep.is_fast) {
                $delay1 = $ep.chunk_delay_secs
                Write-Host "Reading 1: endpoint=$($ep.alias) delay=${delay1}s chunk_id=$($ep.current_chunk_id)"
              }
            }
          }

          # Wait 2 minutes
          Write-Host "Waiting 2 minutes to check cache stability..."
          Start-Sleep -Seconds 120

          # Reading 2
          $resp2 = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
          $delay2 = 0
          if ($resp2.endpoint_details) {
            foreach ($ep in $resp2.endpoint_details) {
              if (-not $ep.is_fast) {
                $delay2 = $ep.chunk_delay_secs
                Write-Host "Reading 2: endpoint=$($ep.alias) delay=${delay2}s chunk_id=$($ep.current_chunk_id)"
              }
            }
          }

          $delta = [math]::Abs($delay2 - $delay1)
          Write-Host ""
          Write-Host "Cache delay: ${delay1}s -> ${delay2}s (delta: ${delta}s over 2 min)"

          if ($delta -gt 15) {
            Write-Host ""
            Write-Host "=========================================="
            Write-Host "  FAIL: Cache delay grew by ${delta}s in 2 minutes"
            Write-Host "  Expected stable (delta < 15s)"
            Write-Host "  Delivery is slower than real-time!"
            Write-Host "=========================================="
            throw "FAILED: Cache delay not stable - grew by ${delta}s in 2 minutes (${delay1}s -> ${delay2}s)"
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  CACHE STABILITY VERIFIED: delta ${delta}s < 15s"
          Write-Host "=========================================="

      - name: "GATE: Verify YouTube stream health is 'good'"
        id: verify_yt_receiving
        shell: powershell
        timeout-minutes: 7
        run: |
          # HARD GATE: YouTube health MUST be "good" (same as OBS direct).
          # "ok" = degraded quality (jittery delivery), "bad"/"noData" = broken.
          # Restreamer must be invisible middleman — no quality degradation.
          $maxRetries = 20
          $retryDelay = 15

          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "--- Attempt ${i}/${maxRetries}: checking YouTube status ---"
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

              Write-Host "  stream_receiving: $($response.stream_receiving)"

              if ($response.error) {
                Write-Host "  API error: $($response.error)"
              }

              # Log stream details
              $healthValue = ""
              if ($response.streams) {
                foreach ($s in $response.streams) {
                  Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status), cdn_resolution=$($s.cdn_resolution), cdn_frame_rate=$($s.cdn_frame_rate)"
                  if ($s.stream_status -eq "active") {
                    $healthValue = $s.health_status
                  }
                  if ($s.configuration_issues -and $s.configuration_issues.Count -gt 0) {
                    foreach ($issue in $s.configuration_issues) {
                      Write-Host "    ISSUE: $issue"
                    }
                  }
                }
              }

              if ($response.stream_receiving -and $healthValue -eq "good") {
                Write-Host ""
                Write-Host "=========================================="
                Write-Host "  YOUTUBE STREAM HEALTH: GOOD"
                Write-Host "  Matches OBS direct quality."
                Write-Host "=========================================="
                return
              }

              if ($response.stream_receiving -and $healthValue -and $healthValue -ne "good") {
                Write-Host "  Stream active but health='${healthValue}' (need 'good'). Waiting..."
                # Log configurationIssues to diagnose WHY health is not good
                if ($response.streams) {
                  foreach ($s in $response.streams) {
                    if ($s.configuration_issues -and $s.configuration_issues.Count -gt 0) {
                      Write-Host "  YouTube configurationIssues:"
                      foreach ($issue in $s.configuration_issues) {
                        Write-Host "    - $issue"
                      }
                    }
                  }
                }
              }
            } catch {
              Write-Host "  Request failed: $_"
            }

            if ($i -lt $maxRetries) {
              Start-Sleep -Seconds $retryDelay
            }
          }

          if ($healthValue) {
            throw "FAILED: YouTube stream health is '${healthValue}' - must be 'good'. Restreamer degrades stream quality. Check configurationIssues above."
          } else {
            throw "FAILED: YouTube is not receiving stream data after $maxRetries attempts."
          }

      - name: Stop OBS stream
        if: always()
        shell: powershell
        run: |
          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $stopStream = @{
              op = 6
              d = @{
                requestType = "StopStream"
                requestId = "stop-stream-1"
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $stopStream
            $stopResp = Receive-OBSMessage $ws
            Write-Host "OBS stream stopped"

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }
          } catch {
            Write-Host "Failed to stop OBS stream (may not have been streaming): $_"
          }

      - name: Verify RTMP disconnected after OBS stream stop
        if: always()
        shell: powershell
        run: |
          Write-Host "Verifying rtmp_connected is false after OBS stream stopped..."
          $maxRetries = 15
          $retryDelay = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $status = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 10
              $connected = $status.inpoint.details.rtmp_connected
              $state = $status.inpoint.state
              Write-Host "Attempt ${i}/${maxRetries}: state=$state, rtmp_connected=$connected"
              if ($connected -eq $false) {
                Write-Host "=== RTMP disconnect verified: rtmp_connected=false ==="
                return
              }
            } catch {
              Write-Host "Attempt ${i}/${maxRetries}: API request failed: $_"
            }
            if ($i -lt $maxRetries) {
              Start-Sleep -Seconds $retryDelay
            }
          }
          throw "FAILED: rtmp_connected is still true after OBS stream stopped ($maxRetries attempts, $($maxRetries * $retryDelay)s). The inpoint state did not reset after RTMP client disconnected."

      - name: Deactivate streaming event
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          # Stop delivery (Hetzner VPS)
          try {
            $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
            $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
            if ($targetEvent) {
              $body = @{ event_id = $targetEvent.id } | ConvertTo-Json
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/stop" `
                -Method POST -Body $body -ContentType "application/json" -TimeoutSec 60
              Write-Host "Delivery stopped for event_id=$($targetEvent.id)"
            }
          } catch {
            Write-Host "Delivery stop failed: $_"
          }

          # Deactivate event on local client
          try {
            $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
            $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
            if ($targetEvent) {
              Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)/deactivate" `
                -Method POST -TimeoutSec 10
              Write-Host "Deactivated $($env:EVENT_NAME) on local client (id=$($targetEvent.id))"
            }
          } catch {
            Write-Host "Local deactivation failed: $_"
          }
          # Always exit successfully - deactivation is best-effort cleanup
          exit 0

      - name: Verify delivery instances cleaned up
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Verifying all delivery instances have been cleaned up..."
          $maxRetries = 6
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances" -TimeoutSec 10

              if (-not $instances -or $instances.Count -eq 0) {
                Write-Host "All delivery instances cleaned up"
                exit 0
              }

              Write-Host "--- Attempt ${i}/${maxRetries} ---"
              foreach ($inst in $instances) {
                Write-Host "  Instance: id=$($inst.id), status=$($inst.status), event_id=$($inst.event_id)"
              }

              if ($i -lt $maxRetries) {
                Write-Host "  Waiting 10s for cleanup..."
                Start-Sleep -Seconds 10
              }
            } catch {
              Write-Host "Request failed: $_"
              if ($i -lt $maxRetries) { Start-Sleep -Seconds 10 }
            }
          }
          throw "FAIL: Delivery instances still exist after $maxRetries attempts"

      - name: Verify YouTube stopped receiving after deactivation
        if: always() && steps.verify_yt_receiving.outcome == 'success'
        shell: powershell
        timeout-minutes: 4
        run: |
          # Post-deactivation check: verify YouTube's ingest server is no longer
          # receiving stream data after the event was deactivated.
          # Completes the 3-phase lifecycle: not-receiving → receiving → not-receiving.
          $maxRetries = 12
          $retryDelay = 15

          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "--- Attempt ${i}/${maxRetries}: checking YouTube stopped receiving ---"
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

              Write-Host "  stream_receiving: $($response.stream_receiving)"
              Write-Host "  stream_count: $($response.stream_count)"

              if ($response.error) {
                Write-Host "  API error: $($response.error)"
                throw "YouTube API error: $($response.error)"
              }

              if ($response.streams) {
                foreach ($s in $response.streams) {
                  Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status), cdn_resolution=$($s.cdn_resolution), cdn_frame_rate=$($s.cdn_frame_rate), cdn_ingestion=$($s.cdn_ingestion_type)"
                }
              }

              if (-not $response.stream_receiving) {
                Write-Host "=========================================="
                Write-Host "  YOUTUBE CONFIRMED NOT RECEIVING (post-deactivation)"
                Write-Host "  3-phase lifecycle verified: inactive -> active -> inactive"
                Write-Host "=========================================="
                return
              }

              Write-Host "  YouTube still receiving stream data"
            } catch {
              Write-Host "  Request failed: $_"
            }

            if ($i -lt $maxRetries) {
              Write-Host "  Waiting ${retryDelay}s before retry..."
              Start-Sleep -Seconds $retryDelay
            }
          }

          throw "FAILED: YouTube is still receiving stream data after deactivation ($maxRetries attempts, ~$($maxRetries * $retryDelay)s). Deactivation did not stop delivery to YouTube."

      - name: Restore OBS stream settings
        if: always()
        shell: powershell
        run: |
          $origServer = "${{ steps.obs-setup.outputs.ORIG_SERVER }}"
          $origKey = "${{ steps.obs-setup.outputs.ORIG_KEY }}"
          $origType = "${{ steps.obs-setup.outputs.ORIG_TYPE }}"

          if (-not $origServer -or -not $origKey) {
            Write-Host "No original settings saved - skipping restore"
            exit 0
          }

          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            # Restore original settings
            $serviceType = if ($origType) { $origType } else { "rtmp_custom" }
            $setSettings = @{
              op = 6
              d = @{
                requestType = "SetStreamServiceSettings"
                requestId = "restore-settings-1"
                requestData = @{
                  streamServiceType = $serviceType
                  streamServiceSettings = @{
                    server = $origServer
                    key = $origKey
                  }
                }
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $setSettings
            $setResp = Receive-OBSMessage $ws
            Write-Host "Restored OBS to original destination"

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }
          } catch {
            Write-Host "WARNING: Failed to restore OBS settings: $_"
            Write-Host "You may need to manually restore OBS stream settings"
          }
          exit 0

      - name: Verify production config is intact
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "=== CHECK 7: Hetzner API token present ==="
          $configPath = "C:\ProgramData\Restreamer\config.json"
          if (-not (Test-Path $configPath)) {
            Write-Error "FAIL: Config file not found at $configPath"
            exit 1
          }

          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          if (-not $config.hetzner -or [string]::IsNullOrWhiteSpace($config.hetzner.api_token)) {
            Write-Error "FAIL: Hetzner API token is missing from production config"
            Write-Host "Delivery functionality will fail without this token"
            exit 1
          }
          Write-Host "OK: Hetzner API token present"

          Write-Host "=== CHECK 8: Delivery API accessible ==="
          try {
            $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances" -TimeoutSec 10
            Write-Host "OK: Delivery API accessible - instances: $($instances.Count)"
          } catch {
            Write-Error "FAIL: Delivery API not working - DeliveryOrchestrator may not be available"
            Write-Host "Error: $_"
            exit 1
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "PRODUCTION CONFIG VERIFIED"
          Write-Host "=========================================="

  e2e-gate:
    name: E2E Gate
    if: always()
    needs: [rust-ci-gate, e2e-streaming-test, e2e-obs-youtube-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "rust-ci-gate:          ${{ needs.rust-ci-gate.result }}"
          echo "e2e-streaming-test:    ${{ needs.e2e-streaming-test.result }}"
          echo "e2e-obs-youtube-test:  ${{ needs.e2e-obs-youtube-test.result }}"

          # Gate must always pass
          if [[ "${{ needs.rust-ci-gate.result }}" != "success" ]]; then
            echo "FAIL: rust-ci-gate did not succeed"
            exit 1
          fi

          # On push/workflow_dispatch to dev/main, E2E tests MUST succeed — no exceptions
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ needs.e2e-streaming-test.result }}" != "success" ]]; then
              echo "FAIL: E2E Streaming Test did not succeed (result: ${{ needs.e2e-streaming-test.result }})"
              echo "E2E tests must pass on every dev/main run."
              exit 1
            fi
            if [[ "${{ needs.e2e-obs-youtube-test.result }}" != "success" ]]; then
              echo "FAIL: E2E OBS-to-YouTube Test did not succeed (result: ${{ needs.e2e-obs-youtube-test.result }})"
              echo "E2E tests must pass on every dev/main run."
              exit 1
            fi
            echo "All E2E tests passed!"
          else
            # On PR events, E2E tests don't run here — but a push-triggered run
            # for the same commit DOES run E2E tests. We must check that run's
            # E2E Gate result to prevent a green PR when push E2E tests fail.
            echo "PR event: checking push-triggered E2E Gate for commit ${{ github.event.pull_request.head.sha }}..."
            SHA="${{ github.event.pull_request.head.sha }}"
            MAX_WAIT=60
            WAIT_INTERVAL=30
            for i in $(seq 1 $MAX_WAIT); do
              # Find E2E Gate check run from the push-triggered workflow on this commit.
              # Filter out check runs from the current workflow run by matching the run ID
              # in the details_url (check_run.id != github.run_id doesn't work because
              # they're different ID namespaces).
              PUSH_GATE=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs?check_name=E2E+Gate&per_page=100" \
                --jq "[.check_runs[] | select(.details_url | test(\"/${{ github.run_id }}/\") | not)] | sort_by(.started_at) | last")

              if [[ -z "$PUSH_GATE" || "$PUSH_GATE" == "null" ]]; then
                echo "Attempt $i/$MAX_WAIT: Push-triggered E2E Gate not found yet, waiting ${WAIT_INTERVAL}s..."
                sleep $WAIT_INTERVAL
                continue
              fi

              STATUS=$(echo "$PUSH_GATE" | jq -r '.status')
              CONCLUSION=$(echo "$PUSH_GATE" | jq -r '.conclusion')
              RUN_URL=$(echo "$PUSH_GATE" | jq -r '.html_url')

              echo "Push E2E Gate: status=$STATUS conclusion=$CONCLUSION"
              echo "Run: $RUN_URL"

              if [[ "$STATUS" == "completed" ]]; then
                if [[ "$CONCLUSION" == "success" ]]; then
                  echo "Push-triggered E2E Gate passed!"
                  break
                else
                  echo "FAIL: Push-triggered E2E Gate did not succeed (conclusion: $CONCLUSION)"
                  echo "PR cannot be green when push E2E tests fail."
                  exit 1
                fi
              fi

              echo "Attempt $i/$MAX_WAIT: Push E2E Gate still running ($STATUS), waiting ${WAIT_INTERVAL}s..."
              sleep $WAIT_INTERVAL
            done

            if [[ "$STATUS" != "completed" ]]; then
              echo "FAIL: Push-triggered E2E Gate did not complete after $((MAX_WAIT * WAIT_INTERVAL))s"
              exit 1
            fi
          fi

          echo "All CI checks passed!"

  auto-release:
    name: Auto-release tag
    needs: [e2e-gate]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.e2e-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="restreamer-v${VERSION}"
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
