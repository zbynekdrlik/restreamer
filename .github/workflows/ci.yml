      - name: Save original OBS stream settings and switch to Restreamer
        id: obs-setup
        shell: powershell
        run: |
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)

          try {
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()
            Write-Host "Connected to OBS WebSocket"
          } catch {
            throw "FAILED: Cannot connect to OBS WebSocket at $uri - $_"
          }

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Receive Hello message
          $hello = Receive-OBSMessage $ws
          Write-Host "OBS WebSocket version: $($hello.d.obsWebSocketVersion)"

          # Build auth string
          $authRequired = $hello.d.authentication
          if ($authRequired) {
            $challenge = $authRequired.challenge
            $salt = $authRequired.salt

            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $salt)
            $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))

            $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $challenge)
            $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))

            $identify = @{
              op = 1
              d = @{
                rpcVersion = 1
                authentication = $authHash
              }
            } | ConvertTo-Json -Depth 5
          } else {
            $identify = @{
              op = 1
              d = @{
                rpcVersion = 1
              }
            } | ConvertTo-Json -Depth 5
          }

          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws
          Write-Host "OBS identified: op=$($identified.op)"

          # Get current stream service settings
          $getSettings = @{
            op = 6
            d = @{
              requestType = "GetStreamServiceSettings"
              requestId = "get-settings-1"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $getSettings
          $settingsResp = Receive-OBSMessage $ws
          $currentSettings = $settingsResp.d.responseData.streamServiceSettings
          $currentType = $settingsResp.d.responseData.streamServiceType

          Write-Host "Original stream type: $currentType"
          Write-Host "Original server: $($currentSettings.server)"

          # Save original settings for restoration
          $origServer = $currentSettings.server
          $origKey = $currentSettings.key
          "ORIG_SERVER=$origServer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ORIG_KEY=$origKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "ORIG_TYPE=$currentType" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          # Switch to local Restreamer RTMP
          $setSettings = @{
            op = 6
            d = @{
              requestType = "SetStreamServiceSettings"
              requestId = "set-settings-1"
              requestData = @{
                streamServiceType = "rtmp_custom"
                streamServiceSettings = @{
                  server = "rtmp://127.0.0.1:1234/live"
                  key = "obs-e2e-test"
                }
              }
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $setSettings
          $setResp = Receive-OBSMessage $ws
          Write-Host "Switched OBS to Restreamer RTMP: rtmp://127.0.0.1:1234/live/obs-e2e-test"

          try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }

      - name: "Pre-flight: verify no stale delivery instances"
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Checking for stale delivery instances..."
          # Step 1: Clean up via local API (uses DB state)
          try {
            $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances" -TimeoutSec 10
            if ($instances -and $instances.Count -gt 0) {
              Write-Host "WARNING: Found $($instances.Count) stale delivery instance(s), stopping..."
              foreach ($inst in $instances) {
                Write-Host "  Stopping instance: id=$($inst.id), event_id=$($inst.event_id), status=$($inst.status)"
                $body = @{ event_id = $inst.event_id } | ConvertTo-Json
                try {
                  Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/stop" `
                    -Method POST -Body $body -ContentType "application/json" -TimeoutSec 30
                } catch {
                  Write-Host "  Stop failed for event_id=$($inst.event_id): $_"
                }
              }
              Start-Sleep -Seconds 5
            }
          } catch {
            Write-Host "Could not check delivery instances via API: $_"
          }

          # Step 2: Clean up orphaned Hetzner VPS directly (survives Restreamer restarts)
          # This catches VPS instances left behind by cancelled CI runs.
          if ($env:HETZNER_API_TOKEN) {
            Write-Host "Checking Hetzner API for orphaned rs-delivery VPS instances..."
            try {
              $headers = @{ Authorization = "Bearer $($env:HETZNER_API_TOKEN)" }
              $resp = Invoke-RestMethod -Uri "https://api.hetzner.cloud/v1/servers?label_selector=app=restreamer" `
                -Headers $headers -TimeoutSec 15
              if ($resp.servers -and $resp.servers.Count -gt 0) {
                foreach ($srv in $resp.servers) {
                  Write-Host "  Deleting orphaned Hetzner VPS: id=$($srv.id) name=$($srv.name) status=$($srv.status) ip=$($srv.public_net.ipv4.ip)"
                  try {
                    Invoke-RestMethod -Uri "https://api.hetzner.cloud/v1/servers/$($srv.id)" `
                      -Method DELETE -Headers $headers -TimeoutSec 15
                    Write-Host "  Deleted VPS $($srv.id)"
                  } catch {
                    Write-Host "  Failed to delete VPS $($srv.id): $_"
                  }
                }
                Start-Sleep -Seconds 3
              } else {
                Write-Host "  No orphaned Hetzner VPS found"
              }
            } catch {
              Write-Host "  Hetzner API check failed: $_"
            }
          }
          Write-Host "Pre-flight cleanup complete"

      - name: Start stream (activate + delivery VPS)
        shell: powershell
        run: |
          # Find or create the event, deactivate others, then call start-stream
          # which sets receiving_activated=true, delivering_activated=true,
          # clears stale chunks, and starts the Hetzner delivery VPS.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10

          # Deactivate ALL other events first so get_streaming_event() returns our event
          foreach ($ev in $events) {
            if ($ev.name -ne $env:EVENT_NAME -and ($ev.receiving_activated -or $ev.delivering_activated)) {
              Write-Host "Deactivating other event: id=$($ev.id) name=$($ev.name)"
              try {
                Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($ev.id)/deactivate" `
                  -Method POST -TimeoutSec 10
              } catch { Write-Host "  Deactivate failed: $_" }
            }
          }

          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          if (-not $targetEvent) {
            Write-Host "$($env:EVENT_NAME) event not found locally, creating it..."
            $body = @{ name = $env:EVENT_NAME } | ConvertTo-Json
            $targetEvent = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" `
              -Method POST -Body $body -ContentType "application/json" -TimeoutSec 10
          }
          Write-Host "Event id: $($targetEvent.id), name: $($targetEvent.name)"

          # Ensure 'e2e rtmp' and 'e2e hls' endpoints are attached. The
          # event row may exist but have zero attachments if it was
          # recreated after the original was deleted (the OBS-to-YouTube
          # buffering test depends on these two endpoints showing up in
          # the dashboard).
          $allEndpoints = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/endpoints" -TimeoutSec 10
          $needAttach = @("e2e rtmp", "e2e hls")
          $eventEndpoints = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)/endpoints" -TimeoutSec 10
          $attachedAliases = @($eventEndpoints | ForEach-Object { $_.alias })
          foreach ($alias in $needAttach) {
            if ($attachedAliases -notcontains $alias) {
              $ep = $allEndpoints | Where-Object { $_.alias -eq $alias }
              if ($ep) {
                try {
                  Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)/endpoints/$($ep.id)" `
                    -Method POST -TimeoutSec 10
                  Write-Host "Attached endpoint '$alias' (id=$($ep.id)) to event $($targetEvent.id)"
                } catch {
                  Write-Host "WARNING: Failed to attach $alias`: $_"
                }
              } else {
                Write-Host "WARNING: Endpoint config '$alias' not found in /endpoints list"
              }
            }
          }

          # Use the event's REAL cache_delay_secs (120s from production config).
          # Previously this was patched down to 60s "for test speed" which made
          # the 80% threshold = 48s — so weak it passed even when cache was
          # broken at 50-80s. That hid the cache regression for weeks.
          Write-Host "Using event's real cache_delay_secs: $($targetEvent.cache_delay_secs)"

          # Start stream: activates receiving + delivering, clears stale chunks, starts VPS
          Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)/start-stream" `
            -Method POST -TimeoutSec 300

          # Verify both flags are set
          $event = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)" -TimeoutSec 10
          if (-not $event.receiving_activated -or -not $event.delivering_activated) {
            throw "FAILED: Event not fully activated: receiving=$($event.receiving_activated) delivering=$($event.delivering_activated)"
          }
          Write-Host "Stream started: receiving=$($event.receiving_activated) delivering=$($event.delivering_activated)"

      - name: Start OBS stream
        shell: powershell
        run: |
          # Send StartStream via OBS WebSocket, then disconnect.
          # We verify stream status separately to avoid event message noise.
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)
          $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Receive Hello + Identify
          $hello = Receive-OBSMessage $ws
          $authRequired = $hello.d.authentication
          if ($authRequired) {
            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
            $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
            $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
            $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
            $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
          } else {
            $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
          }
          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws

          # Send StartStream request
          $startStream = @{
            op = 6
            d = @{
              requestType = "StartStream"
              requestId = "start-stream-1"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $startStream
          # Read response - skip any event messages (op=5) that arrive before the response (op=7)
          for ($r = 0; $r -lt 5; $r++) {
            $startResp = Receive-OBSMessage $ws
            Write-Host "Received message: op=$($startResp.op)"
            if ($startResp.op -eq 7) { break }
          }

          $ws.CloseOutputAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult()
          $ws.Dispose()
          Write-Host "StartStream sent, waiting for OBS to connect to RTMP..."

      - name: Verify OBS is streaming
        shell: powershell
        run: |
          # Reconnect to check stream status (avoids event noise from StartStream)
          Start-Sleep -Seconds 5

          $maxRetries = 6
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $getStatus = @{
              op = 6
              d = @{
                requestType = "GetStreamStatus"
                requestId = "get-status-$attempt"
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $getStatus

            # Read responses, skip events (op=5)
            $statusResp = $null
            for ($r = 0; $r -lt 5; $r++) {
              $msg = Receive-OBSMessage $ws
              if ($msg.op -eq 7) {
                $statusResp = $msg
                break
              }
              Write-Host "Skipping event: op=$($msg.op)"
            }

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }

            if ($statusResp -and $statusResp.d.responseData.outputActive) {
              Write-Host "OBS is streaming (attempt ${attempt}/${maxRetries})"
              Write-Host "OBS is now streaming to Restreamer RTMP"
              return
            }

            Write-Host "OBS not streaming yet (attempt ${attempt}/${maxRetries}), waiting..."
            Start-Sleep -Seconds 5
          }

          throw "FAILED: OBS stream did not start after $maxRetries attempts"

      - name: Wait for chunks and verify upload
        shell: powershell
        timeout-minutes: 3
        run: |
          Write-Host "Waiting for chunks to be created and uploaded to S3..."

          $initialStats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $initialCount = $initialStats.total_chunks
          Write-Host "Initial chunk count: $initialCount"

          $maxRetries = 30
          for ($i = 1; $i -le $maxRetries; $i++) {
            $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
            $newChunks = $stats.total_chunks - $initialCount
            Write-Host "Attempt ${i}/${maxRetries}: new_chunks=$newChunks, pending=$($stats.pending_chunks)"

            if ($newChunks -ge 8 -and $stats.pending_chunks -eq 0) {
              Write-Host "=== Chunks verified: $newChunks new chunks, 0 pending ==="
              return
            }
            Start-Sleep -Seconds 3
          }

          $stats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          $newChunks = $stats.total_chunks - $initialCount
          if ($newChunks -lt 8) {
            throw "FAILED: Only $newChunks new chunks created (need >= 8)"
          }
          if ($stats.pending_chunks -gt 0) {
            throw "FAILED: $($stats.pending_chunks) chunks still pending S3 upload"
          }

      - name: Verify cache bar grows during buffering phase (Playwright)
        shell: powershell
        timeout-minutes: 5
        run: |
          Write-Host "Verifying cache bar grows during initial buffering phase..."
          Set-Location "$env:GITHUB_WORKSPACE\e2e"
          cmd /c "npm install playwright 2>&1" | Out-Null
          cmd /c "npx playwright install chromium 2>&1" | Out-Null

          $testScript = @'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            const consoleErrors = [];
            page.on('console', msg => {
              if (msg.type() === 'error' || msg.type() === 'warning') {
                consoleErrors.push(`[${msg.type()}] ${msg.text()}`);
              }
            });

            await page.goto('http://127.0.0.1:8910/', { waitUntil: 'networkidle', timeout: 30000 });

            // Wait for at least one endpoint cache label to appear. The
            // dashboard renders endpoint cards from the DeliveryStatus
            // WebSocket broadcast which is fired by the orchestrator on a
            // poll loop. networkidle does not wait for WebSocket frames,
            // so we have to wait for the actual UI element. Up to 30s
            // because the orchestrator first poll plus VPS HTTP round-trip
            // can take longer than the 5s the previous fixed wait used.
            try {
              await page.locator('.endpoint-cache-label').first().waitFor({
                state: 'attached',
                timeout: 30000,
              });
            } catch (e) {
              console.error('FAILED: No endpoint cache labels appeared within 30s');
              // Diagnostic: dump dashboard state to find why endpoints
              // are not in store.delivery.endpoints.
              try {
                const apiStatus = await fetch('http://127.0.0.1:8910/api/v1/status').then(r => r.json());
                console.error('API status:', JSON.stringify(apiStatus.streaming_event));
                const cached = await fetch('http://127.0.0.1:8910/api/v1/delivery/status/cached').then(r => r.json()).catch(() => null);
                console.error('Cached delivery:', JSON.stringify(cached));
                const eventId = apiStatus.streaming_event && apiStatus.streaming_event.id;
                if (eventId) {
                  const live = await fetch(`http://127.0.0.1:8910/api/v1/delivery/status?event_id=${eventId}`).then(r => r.json()).catch(() => null);
                  console.error('Live delivery status:', JSON.stringify(live));
                }
                const pipelineNodes = await page.locator('.pipeline-node-metric').allTextContents().catch(() => []);
                console.error('Pipeline node metrics:', pipelineNodes);
                const allClasses = await page.locator('.endpoint-tree').count().catch(() => 0);
                console.error('Endpoint tree count:', allClasses);
              } catch (diagErr) {
                console.error('Diagnostic dump failed:', diagErr.message);
              }
              process.exit(1);
            }

            // During buffering phase: endpoints exist but are pending, cache bar should show
            // the backend-computed cache_duration_secs value (real measured chunk duration sum)
            const cacheLabels = await page.locator('.endpoint-cache-label').allTextContents().catch(() => []);
            console.log('Cache labels during buffering:', cacheLabels);

            if (cacheLabels.length === 0) {
              console.error('FAILED: No cache bar labels found during buffering phase');
              console.error('Expected per-endpoint cache bars showing S3 buffer accumulation');
              process.exit(1);
            }

            // Parse the first cache label (e.g., "45s / 60s cache")
            const match = cacheLabels[0].match(/(\d+)s\s*\/\s*(\d+)s/);
            if (!match) {
              console.error('FAILED: Could not parse cache label:', cacheLabels[0]);
              process.exit(1);
            }

            const cacheSecs = parseInt(match[1]);
            const targetSecs = parseInt(match[2]);
            console.log('Cache during buffering:', cacheSecs, 's /', targetSecs, 's');

            // Cache MUST be > 0 during buffering (chunks are on S3)
            if (cacheSecs === 0) {
              console.error('FAILED: Cache bar shows 0s during buffering phase.');
              console.error('This is the exact bug from issue #80 - cache bar not growing.');
              process.exit(1);
            }

            // Cache bar fill should be visible
            const fillEl = await page.locator('.endpoint-node .buffer-bar-fill').first();
            const fillClass = await fillEl.getAttribute('class').catch(() => null);
            console.log('Bar fill class:', fillClass);

            if (!fillClass) {
              console.error('FAILED: Cache bar fill element not found');
              process.exit(1);
            }

            // Take second reading after 10s to verify growth
            await page.waitForTimeout(10000);
            const cacheLabels2 = await page.locator('.endpoint-cache-label').allTextContents().catch(() => []);
            const match2 = cacheLabels2[0].match(/(\d+)s\s*\/\s*(\d+)s/);
            const cacheSecs2 = match2 ? parseInt(match2[1]) : 0;
            console.log('Cache after 10s:', cacheSecs2, 's');

            if (cacheSecs2 < cacheSecs) {
              console.error('FAILED: Cache decreased from', cacheSecs, 'to', cacheSecs2, '(should be growing)');
              process.exit(1);
            }

            // Cache growth should roughly match wall time (10s wait = ~10s growth)
            // Allow 50% tolerance for timing variance, but reject 2x growth (broken duration)
            const growth = cacheSecs2 - cacheSecs;
            console.log('Cache growth in 10s:', growth, 's');
            if (growth > 16) {
              console.error('FAILED: Cache grew', growth, 's in 10s wall time. Duration measurement is broken (> 1.6x real time).');
              process.exit(1);
            }

            const allowed = [/favicon/i, /Autofill/i, /integrity.*preload/i, /subresource integrity/i];
            const real = consoleErrors.filter(e => !allowed.some(r => r.test(e)));
            if (real.length > 0) {
              console.error('FAILED: Browser console errors:', real);
              process.exit(1);
            }

            console.log('PASSED: Cache bar growing during buffering:', cacheSecs, 's ->', cacheSecs2, 's', '(growth:', growth, 's in 10s)');
            await browser.close();
          })();
          '@

          $testScript | Out-File -FilePath "buffering-cache-check.cjs" -Encoding UTF8
          node buffering-cache-check.cjs
          if ($LASTEXITCODE -ne 0) {
            throw "FAILED: Cache bar buffering phase verification failed"
          }
          Remove-Item "buffering-cache-check.cjs" -ErrorAction SilentlyContinue

      - name: Verify YouTube is NOT receiving stream (baseline)
        shell: powershell
        timeout-minutes: 2
        run: |
          # BASELINE CHECK: Before delivery starts, verify YouTube is NOT
          # receiving stream data. Uses local Rust YouTube API (rs-youtube
          # with server-side OAuth, auto-refresh, no browser needed).
          # This proves the post-delivery check detects a real state change.
          Write-Host "Checking YouTube stream status via local API..."
          $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

          Write-Host "stream_receiving: $($response.stream_receiving)"
          Write-Host "stream_count: $($response.stream_count)"

          if ($response.error) {
            throw "BASELINE FAILED: YouTube API error: $($response.error)"
          }

          if ($response.streams) {
            foreach ($s in $response.streams) {
              Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status), cdn_resolution=$($s.cdn_resolution), cdn_frame_rate=$($s.cdn_frame_rate), cdn_ingestion=$($s.cdn_ingestion_type)"
            }
          }

          if ($response.stream_receiving) {
            throw "BASELINE FAILED: YouTube is already receiving stream data before delivery started. A stale stream from a previous run may still be active."
          }

          Write-Host "=== Baseline PASSED: YouTube is NOT receiving stream data ==="

      - name: Verify E2E event has endpoints configured
        shell: powershell
        run: |
          # The E2E event must have endpoints pre-configured on stream.lan.
          # CI does NOT create or manage endpoints -- that's the user's job.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          $endpoints = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$eventId/endpoints" -TimeoutSec 10
          if (-not $endpoints -or $endpoints.Count -eq 0) {
            throw "FAILED: Event '$($env:EVENT_NAME)' has no endpoints configured. Configure endpoints on stream.lan first."
          }

          Write-Host "Event '$($env:EVENT_NAME)' has $($endpoints.Count) endpoint(s):"
          foreach ($ep in $endpoints) {
            Write-Host "  - $($ep.alias) ($($ep.service_type))"
          }

      - name: Wait for delivery server ready
        shell: powershell
        timeout-minutes: 15
        run: |
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          Write-Host "Waiting for delivery server to start ffmpeg endpoints..."
          # Cloud-init ~3 min + buffer fill (300 chunks x 2s = ~10 min) = ~13 min total
          $maxRetries = 60
          # Track S3 buffer fill progress (monotonic check)
          $fillReadings = @()
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30

              Write-Host "--- Attempt ${i}/${maxRetries} ---"
              Write-Host "  server_ip: $($response.server_ip)"
              Write-Host "  instance_status: $($response.instance_status)"
              Write-Host "  server_ready: $($response.server_ready)"
              Write-Host "  endpoints_alive: $($response.endpoints_alive)"

              if ($response.endpoint_details) {
                foreach ($ep in $response.endpoint_details) {
                  Write-Host "  Endpoint: $($ep.alias) | alive=$($ep.alive) | buffer=$($ep.buff_size_bytes)B | chunk=$($ep.current_chunk_id)"
                }
              }

              if ($response.instance_status -eq "failed") {
                Write-Host "  DIAGNOSTIC: Instance status is 'failed'"
                $chunkStats = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats" -TimeoutSec 10
                Write-Host "  DIAGNOSTIC: total=$($chunkStats.total_chunks) pending=$($chunkStats.pending_chunks) sent=$($chunkStats.sent_chunks)"
                # Get last 5 chunks to see their event IDs
                try {
                  $chunks = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks?limit=5&offset=$([math]::Max(0, $chunkStats.total_chunks - 5))" -TimeoutSec 10
                  foreach ($c in $chunks) {
                    Write-Host "  DIAGNOSTIC chunk: id=$($c.id) event_id=$($c.streaming_event_id) size=$($c.data_size) sent=$($c.sent_to_s3)"
                  }
                } catch { Write-Host "  DIAGNOSTIC: chunk query failed: $_" }
              }

              # Track buffer fill progress during wait (before endpoints are alive)
              if (-not $response.endpoint_details -or $response.endpoint_details.Count -eq 0) {
                # No endpoints yet - track S3 buffer via chunk stats
                try {
                  $cs = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats" -TimeoutSec 5
                  $fillReadings += $cs.sent_chunks
                  Write-Host "  Buffer fill: $($cs.sent_chunks) sent, $($cs.pending_chunks) pending"
                } catch {}
              }

              # Check ALL endpoints are alive (not just the aggregate flag)
              $allAlive = $true
              if ($response.endpoint_details -and $response.endpoint_details.Count -gt 0) {
                foreach ($ep in $response.endpoint_details) {
                  if (-not $ep.alive) { $allAlive = $false }
                }
              } else {
                $allAlive = $false
              }

              if ($response.server_ready -and $allAlive) {
                # Log buffer fill info if available (informational, not gating)
                if ($fillReadings.Count -gt 0) {
                  Write-Host "Buffer fill readings: $($fillReadings[0]) -> $($fillReadings[-1]) sent chunks over $($fillReadings.Count) readings"
                }
                Write-Host "=== Delivery server fully operational: ALL $($response.endpoint_details.Count) endpoints alive ==="
                return
              }
            } catch {
              Write-Host "Request failed on attempt ${i}: $_"
            }
            Start-Sleep -Seconds 15
          }
          throw "FAILED: Delivery server not ready after $maxRetries attempts (~10 min)"

      - name: Verify delivery progression
        shell: powershell
        timeout-minutes: 10
        run: |
          # Delivering server sends to YouTube via the configured endpoint service type
          # The VPS-side buffer fill (probing S3 for delivery_delay_ms worth of chunks)
          # must complete before endpoints start advancing. Wait for chunk_id > 1 first.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          # Phase 1: Wait for VPS warmup to complete (delivery_mode == "normal").
          # After the start_chunk_id=live-edge fix (#118), current_chunk_id is set
          # to max_seq+1 BEFORE warmup runs, so "chunk_id > 1" is no longer a
          # reliable "warmup done" signal. Gate instead on delivery_mode flipping
          # from "warmup" to "normal" on all non-fast endpoints.
          Write-Host "Waiting for VPS warmup to finish (delivery_mode == 'normal')..."
          $maxWait = 60
          $bufferReady = $false
          for ($i = 1; $i -le $maxWait; $i++) {
            $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
            $foundEndpoint = $false
            $allNormal = $true
            $modes = @()
            if ($resp.endpoint_details) {
              foreach ($ep in $resp.endpoint_details) {
                if (-not $ep.is_fast) {
                  $foundEndpoint = $true
                  $modes += "$($ep.alias)=$($ep.delivery_mode)"
                  if ($ep.delivery_mode -ne "normal") { $allNormal = $false }
                }
              }
            }
            if ($foundEndpoint -and $allNormal) {
              Write-Host "VPS warmup complete at attempt $i ($($modes -join ', '))"
              $bufferReady = $true
              break
            }
            if ($i % 5 -eq 0) {
              Write-Host "  Attempt $($i)/$($maxWait): $($modes -join ', ') (waiting for all normal)"
            }
            Start-Sleep -Seconds 5
          }
          if (-not $bufferReady) {
            throw "FAILED: VPS warmup did not complete within $($maxWait * 5)s"
          }

          # Phase 2: Initialization-phase overshoot + jump detection.
          # The 172s->120s jump bug happens in the FIRST 60s after warmup ends.
          # Take rapid samples (every 5s for 60s) and fail on:
          #   - overshoot: any reading > target * 1.3 (= 156s for 120s target)
          #   - impossible jump: drop > 20s between 5s-apart readings
          $targetDelay = if ($targetEvent.cache_delay_secs) { $targetEvent.cache_delay_secs } else { 120 }
          $maxInitCache = [math]::Round($targetDelay * 1.3)
          Write-Host "INIT-PHASE CHECK: 12 samples, 5s apart (max cache=${maxInitCache}s, max drop=20s)"
          $initSeries = @{}
          for ($s = 1; $s -le 12; $s++) {
            Start-Sleep -Seconds 5
            $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
            if ($resp.endpoint_details) {
              foreach ($ep in $resp.endpoint_details) {
                if ($ep.is_fast) { continue }
                $alias = $ep.alias
                $delay = [math]::Round($ep.chunk_delay_secs, 1)
                if (-not $initSeries.ContainsKey($alias)) { $initSeries[$alias] = @() }
                $initSeries[$alias] += $delay
                Write-Host "  Init $s/12 [$alias]: cache=${delay}s chunk=$($ep.current_chunk_id) mode=$($ep.delivery_mode)"

                # Overshoot check
                if ($delay -gt $maxInitCache) {
                  throw "FAILED: [$alias] cache ${delay}s exceeds init max ${maxInitCache}s (target=${targetDelay}s) -- overshoot during initialization"
                }

                # Impossible jump check (drop > 20s in 5s interval)
                $series = $initSeries[$alias]
                if ($series.Count -ge 2) {
                  $prev = $series[$series.Count - 2]
                  $drop = $prev - $delay
                  if ($drop -gt 20) {
                    throw "FAILED: [$alias] cache JUMPED from ${prev}s to ${delay}s (drop=${drop}s in 5s) -- physically impossible at real-time playback"
                  }
                }
              }
            }
          }
          Write-Host "INIT-PHASE CHECK PASSED: no overshoot, no impossible jumps"

          # Phase 3: Take 4 readings at 15s intervals to verify progression
          Write-Host "Verifying delivery progression for ALL endpoints (4 readings, 15s apart)..."

          # Track per-endpoint chunk progression across 4 readings
          $epReadings = @{}  # alias -> array of chunk_ids
          for ($r = 1; $r -le 4; $r++) {
            if ($r -gt 1) { Start-Sleep -Seconds 15 }
            $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30

            if ($resp.endpoint_details) {
              foreach ($ep in $resp.endpoint_details) {
                if (-not $ep.is_fast) {
                  $alias = $ep.alias
                  if (-not $epReadings.ContainsKey($alias)) {
                    $epReadings[$alias] = @()
                  }
                  $epReadings[$alias] += $ep.current_chunk_id
                  Write-Host "Reading ${r}: [$alias] chunk=$($ep.current_chunk_id), alive=$($ep.alive), stall=$($ep.stall_reason)"
                }
              }
            }
          }

          if ($epReadings.Count -eq 0) {
            throw "FAILED: No non-fast endpoints found in delivery status"
          }

          # Assert EACH endpoint advanced >= 3 chunks over 45s
          $allPassed = $true
          foreach ($alias in $epReadings.Keys) {
            $chunks = $epReadings[$alias]
            if ($chunks.Count -lt 4) {
              Write-Host "WARNING: endpoint '$alias' only had $($chunks.Count) readings"
              continue
            }
            $advance = $chunks[3] - $chunks[0]
            Write-Host "  [$alias] advancement: $($chunks[0]) -> $($chunks[3]) = $advance chunks"
            if ($advance -lt 3) {
              Write-Host "  FAIL: endpoint '$alias' advanced only $advance chunks (need >= 3)"
              $allPassed = $false
            }
          }

          if (-not $allPassed) {
            throw "FAILED: One or more endpoints did not advance enough chunks in 45s"
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  DELIVERY CONFIRMED: All $($epReadings.Count) endpoints progressing"
          Write-Host "=========================================="

      - name: Verify dashboard per-endpoint cache bar via Playwright
        shell: powershell
        timeout-minutes: 5
        run: |
          Write-Host "Installing Playwright and verifying dashboard..."
          Set-Location "$env:GITHUB_WORKSPACE\e2e"
          # Install playwright package and browser
          cmd /c "npm install playwright 2>&1" | Out-Null
          cmd /c "npx playwright install chromium 2>&1" | Out-Null

          # Write inline Playwright test
          $testScript = @'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            // Collect console errors
            const consoleErrors = [];
            page.on('console', msg => {
              if (msg.type() === 'error' || msg.type() === 'warning') {
                consoleErrors.push(`[${msg.type()}] ${msg.text()}`);
              }
            });

            await page.goto('http://127.0.0.1:8910/', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(5000); // Wait for WebSocket data

            // Check per-endpoint cache bar is visible
            const cacheLabel = await page.locator('.endpoint-cache-label').first().textContent().catch(() => null);
            console.log('Endpoint cache label:', cacheLabel);

            if (!cacheLabel) {
              console.error('FAILED: Per-endpoint cache label not found on dashboard');
              process.exit(1);
            }

            // Extract delay value from label (e.g., "90s / 120s cache")
            const match = cacheLabel.match(/(\d+)s\s*\/\s*(\d+)s/);
            if (!match) {
              console.error('FAILED: Could not parse delay from cache label:', cacheLabel);
              process.exit(1);
            }

            const delayValue = parseInt(match[1]);
            const targetValue = parseInt(match[2]);
            console.log('Endpoint cache:', delayValue, 's /', targetValue, 's');

            // Check cache bar fill element exists inside endpoint node
            const fillClass = await page.locator('.endpoint-node .buffer-bar-fill').first().getAttribute('class').catch(() => null);
            console.log('Cache bar fill class:', fillClass);

            if (!fillClass) {
              console.error('FAILED: Per-endpoint cache bar fill not found');
              process.exit(1);
            }

            // Stability check: take 3 readings over 10s, cache must not jump backward > 20%
            const readings = [delayValue];
            for (let i = 0; i < 2; i++) {
              await page.waitForTimeout(5000);
              const label = await page.locator('.endpoint-cache-label').first().textContent().catch(() => '');
              const m = label.match(/(\d+)s/);
              if (m) readings.push(parseInt(m[1]));
            }
            console.log('Cache stability readings:', readings);
            for (let i = 1; i < readings.length; i++) {
              if (readings[i] < readings[i-1] * 0.8) {
                console.error('FAILED: Cache jumped backward:', readings[i-1], '->', readings[i], '(> 20% drop). Transition jump bug.');
                process.exit(1);
              }
            }

            // Check for console errors (filter allowed ones)
            const allowed = [/favicon/i, /Autofill/i, /integrity.*preload/i, /subresource integrity/i];
            const real = consoleErrors.filter(e => !allowed.some(r => r.test(e)));
            if (real.length > 0) {
              console.error('FAILED: Browser console errors:', real);
              process.exit(1);
            }

            console.log('Dashboard verification PASSED: endpoint cache shows', delayValue, 's, class:', fillClass, ', stability:', readings);
            await browser.close();
          })();
          '@

          $testScript | Out-File -FilePath "dashboard-check.cjs" -Encoding UTF8
          node dashboard-check.cjs
          if ($LASTEXITCODE -ne 0) {
            throw "FAILED: Dashboard per-endpoint cache bar verification failed"
          }
          Remove-Item "dashboard-check.cjs" -ErrorAction SilentlyContinue

      - name: Verify cache delay meets target
        shell: powershell
        timeout-minutes: 5
        run: |
          # TDD assertion: After delivery is streaming, verify that the
          # chunk_delay_secs for non-fast endpoints is at least 80% of the
          # configured target (default 120s). This catches the 70s bug.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id

          # Get target delay from config (default 120s if not set on event)
          $targetDelay = 120
          if ($targetEvent.cache_delay_secs) {
            $targetDelay = $targetEvent.cache_delay_secs
          }
          $minAcceptable = [math]::Floor($targetDelay * 0.8)
          Write-Host "Target delay: ${targetDelay}s, minimum acceptable: ${minAcceptable}s"

          # Take 3 readings at 10s intervals, check EACH endpoint independently
          $epDelays = @{}  # alias -> array of delay readings
          for ($r = 1; $r -le 3; $r++) {
            if ($r -gt 1) { Start-Sleep -Seconds 10 }
            $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30

            if ($resp.endpoint_details) {
              foreach ($ep in $resp.endpoint_details) {
                if (-not $ep.is_fast) {
                  $alias = $ep.alias
                  if (-not $epDelays.ContainsKey($alias)) {
                    $epDelays[$alias] = @()
                  }
                  $epDelays[$alias] += $ep.chunk_delay_secs
                  Write-Host "Reading ${r}: [$alias] delay=$($ep.chunk_delay_secs)s chunk=$($ep.current_chunk_id)"
                }
              }
            }
          }

          if ($epDelays.Count -eq 0) {
            throw "FAILED: No non-fast endpoint delay readings found"
          }

          # Check EACH endpoint's median delay meets target
          $allPassed = $true
          foreach ($alias in $epDelays.Keys) {
            $sorted = $epDelays[$alias] | Sort-Object
            $median = $sorted[[math]::Floor($sorted.Count / 2)]
            Write-Host "  [$alias] median delay: ${median}s (min: ${minAcceptable}s)"
            if ($median -lt $minAcceptable) {
              Write-Host "  FAIL: [$alias] cache delay ${median}s < minimum ${minAcceptable}s"
              $allPassed = $false
            }
          }

          if (-not $allPassed) {
            throw "FAILED: One or more endpoints have cache delay below ${minAcceptable}s (target: ${targetDelay}s)"
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  CACHE DELAY VERIFIED: All $($epDelays.Count) endpoints >= ${minAcceptable}s"
          Write-Host "=========================================="

      - name: "STRICT: Steady-state delivery verification (3min sustained)"
        shell: powershell
        timeout-minutes: 5
        run: |
          # Sustained verification of delivery health during steady-state
          # streaming. The whole point of the restreamer is that once OBS
          # is streaming and the VPS buffer is filled, EVERYTHING should
          # be rock-solid:
          #   - Cache delay stays AT target (not growing, not oscillating)
          #   - Zero ffmpeg restarts (VPS reads from S3 -- nothing should
          #     cause ffmpeg to die during normal operation)
          #   - Endpoints remain alive
          #
          # Historical gap: previous "stable" check only compared two
          # samples 2 min apart with 15s tolerance -- hiding crash loops
          # that happened once per minute.
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          $eventId = $targetEvent.id
          $targetDelay = if ($targetEvent.cache_delay_secs) { $targetEvent.cache_delay_secs } else { 60 }
          $maxAllowed = [math]::Round($targetDelay * 1.5)  # 50% tolerance above target
          # Lower bound catches cache drain (VPS consumes faster than stream.lan
          # uploads). stream.lan at 60s when target is 120s is ALREADY a bug
          # (not a future one) because issue #118 shows S3 upload ~0.5 ch/s
          # while VPS consumes at real-time. Without this check the strict gate
          # reports green while operators see cache collapsing to zero.
          $minAllowed = [math]::Round($targetDelay * 0.7)
          Write-Host "Target cache delay: ${targetDelay}s (fail if > ${maxAllowed}s OR < ${minAllowed}s)"

          # Capture baseline restart counts -- no new restarts allowed during window
          $baselineResp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
          $baselineRestarts = @{}
          if ($baselineResp.endpoint_details) {
            foreach ($ep in $baselineResp.endpoint_details) {
              if (-not $ep.is_fast) {
                $baselineRestarts[$ep.alias] = [int]$ep.ffmpeg_restart_count
                Write-Host "Baseline: [$($ep.alias)] restarts=$($ep.ffmpeg_restart_count) delay=$($ep.chunk_delay_secs)s"
              }
            }
          }
          if ($baselineRestarts.Count -eq 0) {
            throw "FAILED: No non-fast endpoints found in delivery status -- cannot run steady-state check"
          }

          $samples = 12
          $intervalSecs = 15  # 12 * 15s = 180s = 3min
          $failures = @()
          # Per-alias time-series of cache delay, printed at end as a table
          # for operator post-mortem. Also used to detect drain trend.
          $trend = @{}
          # Tolerate up to 2 transient "endpoints_alive=false" samples (e.g.
          # stream.lan momentarily cannot reach the VPS between healthchecks).
          # Fail only if 3+ samples, or if a specific endpoint goes alive=false.
          $transientAliveFalse = 0

          for ($i = 1; $i -le $samples; $i++) {
            Start-Sleep -Seconds $intervalSecs
            try {
              $resp = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 30
            } catch {
              $failures += "Sample ${i}: delivery/status request failed: $_"
              continue
            }

            if (-not $resp.endpoints_alive) {
              $transientAliveFalse++
              Write-Host "Sample ${i}: endpoints_alive=false (transient count: ${transientAliveFalse}/2)"
              if ($transientAliveFalse -gt 2) {
                $failures += "Sample ${i}: endpoints_alive=false on ${transientAliveFalse} samples (not transient)"
              }
            }

            foreach ($ep in $resp.endpoint_details) {
              if ($ep.is_fast) { continue }
              $alias = $ep.alias
              $delay = [int]$ep.chunk_delay_secs
              $restarts = [int]$ep.ffmpeg_restart_count
              $baseRestarts = [int]$baselineRestarts[$alias]
              $delta = $restarts - $baseRestarts
              Write-Host "Sample ${i}/${samples} [$alias]: delay=${delay}s restarts=${restarts} (delta=${delta}) alive=$($ep.alive) stall=$($ep.stall_reason)"

              # Record for trend analysis and audit dump at end
              if (-not $trend.ContainsKey($alias)) { $trend[$alias] = @() }
              $trend[$alias] += $delay

              if (-not $ep.alive) {
                $failures += "Sample ${i}: [$alias] endpoint went alive=false (stall=$($ep.stall_reason))"
              }
              if ($delta -gt 0) {
                $tail = if ($ep.ffmpeg_last_stderr) { $ep.ffmpeg_last_stderr } else { '<empty>' }
                $failures += "Sample ${i}: [$alias] NEW ffmpeg restart (delta=${delta}). stderr_tail:`n${tail}"
              }
              if ($delay -gt $maxAllowed) {
                $failures += "Sample ${i}: [$alias] cache delay ${delay}s exceeds max ${maxAllowed}s (target=${targetDelay}s) -- overshoot: orchestrator/warmup let cache grow past target"
              }
              # Cache-drain detection (catches issue #118: stream.lan uploads
              # slower than VPS consumes, so cache shrinks toward zero). A
              # sustained cache below target*0.7 is a real bug, not noise.
              if ($delay -lt $minAllowed) {
                $failures += "Sample ${i}: [$alias] cache delay ${delay}s below min ${minAllowed}s (target=${targetDelay}s) -- stream.lan uploads too slow, VPS catching up"
              }
              # Impossible-jump detection: cache can only shrink by ~15s between
              # 15s-apart samples (VPS consumes at 1x real-time, stream.lan
              # produces at 1x, so net drain is ~0). A drop > 30s in one
              # interval means the metric jumped -- either current_chunk_id
              # skipped ahead (measurement bug) or VPS burst-consumed (bug).
              if ($trend[$alias].Count -ge 2) {
                $prev = $trend[$alias][$trend[$alias].Count - 2]
                $drop = $prev - $delay
                if ($drop -gt 30) {
                  $failures += "Sample ${i}: [$alias] cache JUMPED from ${prev}s to ${delay}s (drop=${drop}s in ${intervalSecs}s) -- physically impossible at real-time playback"
                }
              }
            }
          }

          # Drain-trend detection: if the AVERAGE of the last 3 samples is
          # more than 20% below the average of the first 3, cache is
          # collapsing even if every individual sample was within bounds.
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  CACHE-DELAY AUDIT (per-alias time series)"
          Write-Host "=========================================="
          foreach ($alias in $trend.Keys) {
            $arr = $trend[$alias]
            Write-Host "[${alias}]: $($arr -join ' -> ') seconds"
            if ($arr.Count -ge 6) {
              $firstAvg = ($arr[0..2] | Measure-Object -Average).Average
              $lastAvg  = ($arr[-3..-1] | Measure-Object -Average).Average
              if ($firstAvg -gt 0) {
                $pctDrop = [math]::Round(100 * ($firstAvg - $lastAvg) / $firstAvg, 1)
                Write-Host "  first3_avg=${firstAvg}s last3_avg=${lastAvg}s drop=${pctDrop}%"
                if ($pctDrop -gt 20) {
                  $failures += "[$alias] cache drain trend: first3_avg=${firstAvg}s -> last3_avg=${lastAvg}s (${pctDrop}% drop). Check stream.lan S3 upload throughput (issue #118)."
                }
              }
            }
          }

          if ($failures.Count -gt 0) {
            Write-Host ""
            Write-Host "=========================================="
            Write-Host "  STEADY-STATE VERIFICATION FAILED"
            Write-Host "=========================================="
            foreach ($f in $failures) {
              Write-Host "FAIL: $f"
            }
            # Dump restart history for forensics
            try {
              $status = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 10
              foreach ($ep in $status.endpoint_details) {
                if ($ep.restart_history) {
                  Write-Host ""
                  Write-Host "Restart history [$($ep.alias)]:"
                  foreach ($r in $ep.restart_history) {
                    Write-Host "  lifetime=$($r.lifetime_secs)s reason=$($r.reason) backoff=$($r.backoff_secs)s"
                    if ($r.stderr_tail) { Write-Host "    stderr_tail:`n$($r.stderr_tail)" }
                  }
                }
              }
            } catch { Write-Host "Could not fetch restart history: $_" }
            throw "FAILED: $($failures.Count) steady-state violation(s) over 3 minutes of streaming"
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  STEADY-STATE VERIFIED: 3min, 0 restarts, cache <= ${maxAllowed}s"
          Write-Host "=========================================="

      - name: "GATE: Verify YouTube stream health is 'good'"
        id: verify_yt_receiving
        shell: powershell
        timeout-minutes: 7
        run: |
          # HARD GATE: YouTube health MUST be "good" (same as OBS direct).
          # "ok" = degraded quality (jittery delivery), "bad"/"noData" = broken.
          # Restreamer must be invisible middleman -- no quality degradation.
          $maxRetries = 20
          $retryDelay = 15

          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "--- Attempt ${i}/${maxRetries}: checking YouTube status ---"
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

              Write-Host "  stream_receiving: $($response.stream_receiving)"

              if ($response.error) {
                Write-Host "  API error: $($response.error)"
              }

              # Log stream details
              $healthValue = ""
              if ($response.streams) {
                foreach ($s in $response.streams) {
                  Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status), cdn_resolution=$($s.cdn_resolution), cdn_frame_rate=$($s.cdn_frame_rate)"
                  if ($s.stream_status -eq "active") {
                    $healthValue = $s.health_status
                  }
                  if ($s.configuration_issues -and $s.configuration_issues.Count -gt 0) {
                    foreach ($issue in $s.configuration_issues) {
                      Write-Host "    ISSUE: $issue"
                    }
                  }
                }
              }

              if ($response.stream_receiving -and $healthValue -eq "good") {
                # Check for bitrateLow in configuration_issues even when health is "good"
                $hasBitrateLow = $false
                if ($response.streams) {
                  foreach ($s in $response.streams) {
                    if ($s.configuration_issues -and $s.configuration_issues -contains "bitrateLow") {
                      $hasBitrateLow = $true
                      Write-Host "  WARNING: bitrateLow detected on stream '$($s.title)' despite 'good' health"
                    }
                  }
                }
                if ($hasBitrateLow) {
                  throw "FAILED: YouTube reports 'good' health but bitrateLow is present in configuration_issues. Stream bitrate is insufficient."
                }

                Write-Host ""
                Write-Host "=========================================="
                Write-Host "  YOUTUBE STREAM HEALTH: GOOD"
                Write-Host "  Matches OBS direct quality."
                Write-Host "  No bitrateLow issues detected."
                Write-Host "=========================================="
                return
              }

              if ($response.stream_receiving -and $healthValue -and $healthValue -ne "good") {
                Write-Host "  Stream active but health='${healthValue}' (need 'good'). Waiting..."
                # Log configurationIssues to diagnose WHY health is not good
                if ($response.streams) {
                  foreach ($s in $response.streams) {
                    if ($s.configuration_issues -and $s.configuration_issues.Count -gt 0) {
                      Write-Host "  YouTube configurationIssues:"
                      foreach ($issue in $s.configuration_issues) {
                        Write-Host "    - $issue"
                      }
                    }
                  }
                }
              }
            } catch {
              Write-Host "  Request failed: $_"
            }

            if ($i -lt $maxRetries) {
              Start-Sleep -Seconds $retryDelay
            }
          }

          if ($healthValue) {
            throw "FAILED: YouTube stream health is '${healthValue}' - must be 'good'. Restreamer degrades stream quality. Check configurationIssues above."
          } else {
            throw "FAILED: YouTube is not receiving stream data after $maxRetries attempts."
          }

      - name: OBS disconnect/reconnect resilience test
        if: success()
        shell: powershell
        run: |
          Write-Host "=== OBS Disconnect/Reconnect Resilience Test ==="
          # Get active event ID and VPS instance from status API
          $appStatus = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
          $eventId = $appStatus.streaming_event.id
          $instancesBefore = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances"
          $beforeHetznerId = $instancesBefore[0].hetzner_id
          Write-Host "VPS instance before disconnect: hetzner_id=$beforeHetznerId"
          Write-Host "Active event ID: $eventId"
          # Record delivery status before disconnect
          $statusBefore = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId"
          Write-Host "Before disconnect: endpoints=$($statusBefore.endpoints.Count)"

          # Connect to OBS WebSocket
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $ws.Options.KeepAliveInterval = [TimeSpan]::FromSeconds(5)
          $cts = New-Object System.Threading.CancellationTokenSource(30000)
          $ws.ConnectAsync("ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)", $cts.Token).Wait()
          $buf = [byte[]]::new(8192)
          $seg = [ArraySegment[byte]]$buf
          $recv = $ws.ReceiveAsync($seg, $cts.Token).Result
          $hello = [System.Text.Encoding]::UTF8.GetString($buf, 0, $recv.Count) | ConvertFrom-Json
          if ($hello.d.authentication) {
            $salt = $hello.d.authentication.salt
            $challenge = $hello.d.authentication.challenge
            $sha = [System.Security.Cryptography.SHA256]::Create()
            $b64secret = [Convert]::ToBase64String($sha.ComputeHash([System.Text.Encoding]::UTF8.GetBytes("$($env:OBS_WS_PASSWORD)$salt")))
            $auth = [Convert]::ToBase64String($sha.ComputeHash([System.Text.Encoding]::UTF8.GetBytes("$b64secret$challenge")))
            $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $auth } } | ConvertTo-Json -Depth 5
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($identify)
            $ws.SendAsync([ArraySegment[byte]]$bytes, 'Text', $true, $cts.Token).Wait()
            $recv = $ws.ReceiveAsync($seg, $cts.Token).Result
          }

          # Stop OBS stream
          Write-Host "Stopping OBS stream..."
          $stop = @{ op = 6; d = @{ requestType = "StopStream"; requestId = "disconnect-test-stop" } } | ConvertTo-Json -Depth 5
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($stop)
          $ws.SendAsync([ArraySegment[byte]]$bytes, 'Text', $true, $cts.Token).Wait()
          $recv = $ws.ReceiveAsync($seg, $cts.Token).Result
          Write-Host "OBS stream stopped"

          # Wait 10 seconds (simulate brief outage)
          Write-Host "Waiting 10 seconds with OBS disconnected..."
          Start-Sleep -Seconds 10

          # Restart OBS stream
          Write-Host "Restarting OBS stream..."
          $start = @{ op = 6; d = @{ requestType = "StartStream"; requestId = "disconnect-test-start" } } | ConvertTo-Json -Depth 5
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($start)
          $ws.SendAsync([ArraySegment[byte]]$bytes, 'Text', $true, $cts.Token).Wait()
          $recv = $ws.ReceiveAsync($seg, $cts.Token).Result
          Write-Host "OBS stream restarted"
          $ws.CloseAsync('NormalClosure', '', [System.Threading.CancellationToken]::None).Wait()

          # Wait for RTMP to reconnect
          Write-Host "Waiting for RTMP reconnect..."
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 2
            $status = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
            if ($status.inpoint.details.rtmp_connected) {
              Write-Host "RTMP reconnected after $($i * 2) seconds"
              break
            }
          }
          if (-not $status.inpoint.details.rtmp_connected) {
            throw "FAILED: RTMP did not reconnect within 30 seconds"
          }

          # Wait 60 seconds for pipeline to stabilize
          Write-Host "Waiting 60s for chunk pipeline to stabilize..."
          Start-Sleep -Seconds 60

          # Verify delivery endpoints are advancing AND zero ffmpeg restarts.
          # VPS reads from S3 (not OBS) -- OBS disconnect must not cause any
          # ffmpeg restarts on the VPS. Any restart indicates a bug.
          $statusAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId"
          foreach ($ep in $statusAfter.endpoints) {
            Write-Host "Endpoint '$($ep.alias)': chunks=$($ep.chunks_processed), delay=$($ep.chunk_delay_secs)s, restarts=$($ep.ffmpeg_restart_count)"
            if ($ep.ffmpeg_restart_count -gt 0) {
              $tail = if ($ep.ffmpeg_last_stderr) { $ep.ffmpeg_last_stderr } else { '<empty>' }
              throw "FAILED: Endpoint '$($ep.alias)' has $($ep.ffmpeg_restart_count) ffmpeg restart(s) after OBS disconnect. VPS reads from S3 and should be unaffected. stderr_tail:`n$tail"
            }
          }

          # Verify VPS was NOT restarted (same instance)
          $instancesAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances"
          if ($instancesAfter.Count -gt 0) {
            $afterId = $instancesAfter[0].hetzner_id
            Write-Host "Instance before: $beforeHetznerId, after: $afterId"
            if ($afterId -ne $beforeHetznerId) {
              throw "FAILED: VPS was restarted during OBS disconnect (before=$beforeHetznerId, after=$afterId)"
            }
          }
          Write-Host "=== OBS Disconnect/Reconnect Test PASSED ==="

      - name: Simulated network disconnect - cache drain and recovery
        if: success()
        shell: powershell
        timeout-minutes: 6
        run: |
          Write-Host "=== Network Disconnect Simulation ==="
          $appStatus = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
          $eventId = $appStatus.streaming_event.id

          # Get VPS IP and current state
          $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances"
          $vpsIp = $instances[0].ipv4
          $vpsHetznerId = $instances[0].hetzner_id
          Write-Host "VPS IP: $vpsIp, Hetzner ID: $vpsHetznerId"

          # Record EXACT state before disconnect
          $deliveryBefore = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId"
          $restartsBefore = @{}
          $chunksBefore = @{}
          foreach ($ep in $deliveryBefore.endpoint_details) {
            $restartsBefore[$ep.alias] = $ep.ffmpeg_restart_count
            $chunksBefore[$ep.alias] = $ep.chunks_processed
            Write-Host "BEFORE: [$($ep.alias)] chunks=$($ep.chunks_processed) delay=$($ep.chunk_delay_secs)s restarts=$($ep.ffmpeg_restart_count) stall=$($ep.stall_reason)"
          }
          $delayBefore = ($deliveryBefore.endpoint_details | Where-Object { -not $_.is_fast } | Select-Object -First 1).chunk_delay_secs
          Write-Host "Cache delay before disconnect: ${delayBefore}s"

          if ($delayBefore -lt 30) {
            throw "FAILED: Cache delay too low before test (${delayBefore}s < 30s) - not enough buffer for meaningful test"
          }

          # Block S3 uploads via test API (application-level, no firewall needed)
          Write-Host "Blocking S3 uploads via API..."
          Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/_test/s3-block" -Method POST -TimeoutSec 5
          Write-Host "S3 uploads blocked"

          try {
            # Wait 5s for block to take effect
            Start-Sleep -Seconds 5

            # Take first readings
            $delivery1 = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 10
            $delay1 = ($delivery1.endpoint_details | Where-Object { -not $_.is_fast } | Select-Object -First 1).chunk_delay_secs
            $chunks1 = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats" -TimeoutSec 5
            Write-Host "T+5s: delay=${delay1}s pending=$($chunks1.pending_chunks)"

            # Wait 10 more seconds
            Start-Sleep -Seconds 10

            # Take second readings
            $delivery2 = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -TimeoutSec 10
            $delay2 = ($delivery2.endpoint_details | Where-Object { -not $_.is_fast } | Select-Object -First 1).chunk_delay_secs
            $chunks2 = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats" -TimeoutSec 5
            Write-Host "T+15s: delay=${delay2}s pending=$($chunks2.pending_chunks)"

            # STRICT: Cache delay must NOT increase during S3 block
            # VPS consumes from S3 cache, delay should decrease as VPS catches up
            if ($delay2 -gt ($delay1 + 5)) {
              throw "FAILED: Cache delay INCREASED during S3 block (${delay1}s -> ${delay2}s). Must decrease or stay stable."
            }

            # STRICT: Pending chunks must increase (uploads blocked, chunks piling up)
            if ($chunks2.pending_chunks -le $chunks1.pending_chunks) {
              throw "FAILED: Pending chunks did not increase during S3 block ($($chunks1.pending_chunks) -> $($chunks2.pending_chunks)). Block not effective."
            }

            # Verify delivering still active
            $statusMid = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
            if (-not $statusMid.streaming_event.delivering_activated) {
              throw "FAILED: delivering_activated went false during S3 block"
            }

            $pendingDuringBlock = $chunks2.pending_chunks
            Write-Host "Pending chunks during block: $pendingDuringBlock"
          } finally {
            # ALWAYS unblock S3 uploads
            Write-Host "Unblocking S3 uploads..."
            Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/_test/s3-unblock" -Method POST -TimeoutSec 5
            Write-Host "S3 uploads unblocked"
          }

          # Wait for recovery - S3 uploads resume, VPS status polls resume
          Write-Host "Waiting 60s for pipeline recovery..."
          Start-Sleep -Seconds 60

          # === STRICT POST-RECOVERY ASSERTIONS ===
          $deliveryAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId"
          if (-not $deliveryAfter.endpoint_details -or $deliveryAfter.endpoint_details.Count -eq 0) {
            throw "FAILED: No endpoint data after recovery"
          }

          foreach ($ep in $deliveryAfter.endpoint_details) {
            $alias = $ep.alias
            $restartsAfter = $ep.ffmpeg_restart_count
            $restartsDelta = $restartsAfter - $restartsBefore[$alias]
            $chunksAfter = $ep.chunks_processed
            $chunksDelta = $chunksAfter - $chunksBefore[$alias]

            Write-Host "AFTER: [$alias] chunks=$chunksAfter (+$chunksDelta) delay=$($ep.chunk_delay_secs)s restarts=$restartsAfter (+$restartsDelta) stall=$($ep.stall_reason)"

            # STRICT: VPS had cache - 15s outage on stream.lan should cause ZERO ffmpeg restarts on VPS
            if ($restartsDelta -gt 0) {
              throw "FAILED: [$alias] had $restartsDelta NEW ffmpeg restarts during 15s S3 block. VPS had cache and should have been completely unaffected."
            }

            # STRICT: Endpoint must have processed new chunks since before the test
            if ($chunksDelta -lt 5) {
              throw "FAILED: [$alias] only processed $chunksDelta new chunks. VPS should keep processing from S3 cache."
            }

            # STRICT: No stall_reason should be set from a 15s outage
            if ($ep.stall_reason) {
              throw "FAILED: [$alias] has stall_reason='$($ep.stall_reason)' after 15s S3 block. VPS should be unaffected."
            }
          }

          # Verify pending chunks drained (S3 uploads resumed)
          # STRICT: Pending chunks must have DECREASED from during-block level
          $chunksRecovery = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats" -TimeoutSec 5
          Write-Host "Recovery chunks: pending=$($chunksRecovery.pending_chunks) sent=$($chunksRecovery.sent_chunks) (was $pendingDuringBlock during block)"
          # STRICT (#118): after 60s recovery window pending must be <=5.
          # Previous bar was 10; with row-level retry + adaptive concurrency
          # the uploader should now drain promptly once S3 is reachable.
          if ($chunksRecovery.pending_chunks -gt 5) {
            throw "FAILED: $($chunksRecovery.pending_chunks) chunks still pending after 60s recovery - S3 upload not draining fast enough (issue #118)"
          }
          if ($chunksRecovery.pending_chunks -ge $pendingDuringBlock) {
            throw "FAILED: Pending chunks did not decrease after S3 unblock ($pendingDuringBlock -> $($chunksRecovery.pending_chunks)) - chunks not draining to S3"
          }

          # Verify VPS was NOT restarted
          $instancesAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances"
          $afterId = $instancesAfter[0].hetzner_id
          Write-Host "VPS instance: before=$vpsHetznerId after=$afterId"
          if ($afterId -ne $vpsHetznerId) {
            throw "FAILED: VPS was destructively restarted (before=$vpsHetznerId, after=$afterId)"
          }

          # Verify delivery still active
          $finalStatus = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
          if (-not $finalStatus.streaming_event.delivering_activated) {
            throw "FAILED: delivering_activated is false after recovery"
          }

          Write-Host "=== Network Disconnect Simulation PASSED ==="

      - name: Restreamer crash recovery test
        if: success()
        shell: powershell
        timeout-minutes: 5
        run: |
          Write-Host "=== Restreamer Crash Recovery Test ==="
          # Verify current state: OBS streaming, delivery active
          $statusBefore = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
          $eventId = $statusBefore.streaming_event.id
          Write-Host "Before crash: event=$eventId delivering=$($statusBefore.streaming_event.delivering_activated)"

          # Record delivery instance
          $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances"
          $vpsId = $instances[0].hetzner_id
          Write-Host "VPS hetzner_id: $vpsId"

          # CRASH: kill Restreamer process
          Write-Host "Killing Restreamer process (simulating crash)..."
          taskkill /F /IM "Restreamer.exe" 2>&1 | Out-Null
          Start-Sleep -Seconds 3

          # Verify Restreamer is dead
          $proc = Get-Process -Name "Restreamer" -ErrorAction SilentlyContinue
          if ($proc) { throw "FAILED: Restreamer still running after taskkill" }
          Write-Host "Restreamer killed successfully"

          # RESTART: via scheduled task (same as CI deploy)
          Write-Host "Restarting Restreamer via scheduled task..."
          Start-ScheduledTask -TaskName "RestreamerGUI"
          Start-Sleep -Seconds 10

          # Wait for API to respond
          $apiUp = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $status = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 3
              $apiUp = $true
              break
            } catch {
              Write-Host "Waiting for API... ($i)"
              Start-Sleep -Seconds 2
            }
          }
          if (-not $apiUp) { throw "FAILED: Restreamer API not responding after restart" }

          # Verify event still active (persisted in SQLite)
          $statusAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
          Write-Host "After restart: delivering=$($statusAfter.streaming_event.delivering_activated) receiving=$($statusAfter.streaming_event.receiving_activated)"
          if (-not $statusAfter.streaming_event.delivering_activated) {
            throw "FAILED: delivering_activated is false after restart"
          }
          if (-not $statusAfter.streaming_event.receiving_activated) {
            throw "FAILED: receiving_activated is false after restart"
          }

          # Wait for OBS to reconnect (OBS auto-reconnects)
          Write-Host "Waiting for OBS RTMP reconnect..."
          $reconnected = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 2
            $status = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status"
            if ($status.inpoint.details.rtmp_connected) {
              Write-Host "OBS reconnected after $($i * 2) seconds"
              $reconnected = $true
              break
            }
          }
          if (-not $reconnected) {
            throw "FAILED: OBS did not reconnect within 60 seconds"
          }

          # Baseline AFTER restart: cleanup has already pruned any chunks
          # >1hr old (see db/mod.rs startup cleanup), so this baseline reflects
          # the post-cleanup state. Comparing chunksAfter to this baseline
          # measures only the chunks created in the 30s window below.
          $chunksBaseline = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          Write-Host "Chunks baseline (post-restart): total=$($chunksBaseline.total_chunks) sent=$($chunksBaseline.sent_chunks)"

          # Wait for chunks to flow
          Write-Host "Waiting 30s for chunks to flow after restart..."
          Start-Sleep -Seconds 30

          $chunksAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/chunks/stats"
          Write-Host "Chunks after: total=$($chunksAfter.total_chunks) sent=$($chunksAfter.sent_chunks)"
          $newChunks = $chunksAfter.total_chunks - $chunksBaseline.total_chunks
          Write-Host "New chunks since restart: $newChunks"
          if ($newChunks -lt 5) {
            throw "FAILED: Only $newChunks new chunks after restart (expected >= 5)"
          }

          # Verify VPS instance unchanged (not recreated)
          $instancesAfter = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances"
          if ($instancesAfter.Count -gt 0) {
            $vpsIdAfter = $instancesAfter[0].hetzner_id
            Write-Host "VPS after restart: $vpsIdAfter (before: $vpsId)"
            if ($vpsIdAfter -ne $vpsId) {
              throw "FAILED: VPS was recreated after crash (before=$vpsId, after=$vpsIdAfter)"
            }
          }

          # Verify delivery broadcast loop picks up the VPS
          $delivery = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/status?event_id=$eventId" -ErrorAction SilentlyContinue
          if ($delivery -and $delivery.instance) {
            Write-Host "Delivery instance found: $($delivery.instance.name) status=$($delivery.instance.status)"
          } else {
            Write-Host "WARNING: Delivery instance not found in status (broadcast loop may not have polled yet)"
          }

          Write-Host "=== Restreamer Crash Recovery Test PASSED ==="

      - name: "GATE: Second YouTube health check after resilience tests"
        if: success()
        shell: powershell
        timeout-minutes: 2
        run: |
          # Second health gate: verify YouTube stream is still healthy after
          # resilience tests (OBS disconnect, network disconnect, crash recovery).
          # By now the stream has been running 10+ minutes -- any degradation
          # would be visible.
          $maxRetries = 5
          $retryDelay = 10

          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "--- Second health check ${i}/${maxRetries} ---"
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

              Write-Host "  stream_receiving: $($response.stream_receiving)"

              $healthValue = ""
              if ($response.streams) {
                foreach ($s in $response.streams) {
                  Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status)"
                  if ($s.stream_status -eq "active") {
                    $healthValue = $s.health_status
                  }
                  if ($s.configuration_issues -and $s.configuration_issues.Count -gt 0) {
                    foreach ($issue in $s.configuration_issues) {
                      Write-Host "    ISSUE: $issue"
                    }
                  }
                }
              }

              if ($response.stream_receiving -and $healthValue -eq "good") {
                # Check for bitrateLow even when health reports "good"
                $hasBitrateLow = $false
                if ($response.streams) {
                  foreach ($s in $response.streams) {
                    if ($s.configuration_issues -and $s.configuration_issues -contains "bitrateLow") {
                      $hasBitrateLow = $true
                      Write-Host "  WARNING: bitrateLow detected on stream '$($s.title)'"
                    }
                  }
                }
                if ($hasBitrateLow) {
                  throw "FAILED: Second health check -- YouTube reports 'good' but bitrateLow present. Stream quality degraded after resilience tests."
                }

                Write-Host ""
                Write-Host "=========================================="
                Write-Host "  SECOND YOUTUBE HEALTH CHECK: GOOD"
                Write-Host "  Stream quality maintained after resilience tests."
                Write-Host "  No bitrateLow issues detected."
                Write-Host "=========================================="
                return
              }

              if ($response.stream_receiving -and $healthValue -and $healthValue -ne "good") {
                Write-Host "  Health='${healthValue}' (need 'good'). Waiting..."
              }
            } catch {
              if ($_.Exception.Message -match "^FAILED:") { throw }
              Write-Host "  Request failed: $_"
            }

            if ($i -lt $maxRetries) {
              Start-Sleep -Seconds $retryDelay
            }
          }

          if ($healthValue) {
            throw "FAILED: Second health check -- YouTube health is '${healthValue}' after resilience tests (must be 'good'). Stream quality degraded during OBS disconnect/reconnect or crash recovery."
          } else {
            throw "FAILED: Second health check -- YouTube not receiving stream after resilience tests ($maxRetries attempts)."
          }

      - name: Stop OBS stream
        if: always()
        shell: powershell
        run: |
          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $stopStream = @{
              op = 6
              d = @{
                requestType = "StopStream"
                requestId = "stop-stream-1"
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $stopStream
            $stopResp = Receive-OBSMessage $ws
            Write-Host "OBS stream stopped"

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }
          } catch {
            Write-Host "Failed to stop OBS stream (may not have been streaming): $_"
          }

      - name: Verify RTMP disconnected after OBS stream stop
        if: always()
        shell: powershell
        run: |
          Write-Host "Verifying rtmp_connected is false after OBS stream stopped..."
          $maxRetries = 15
          $retryDelay = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $status = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/status" -TimeoutSec 10
              $connected = $status.inpoint.details.rtmp_connected
              $state = $status.inpoint.state
              Write-Host "Attempt ${i}/${maxRetries}: state=$state, rtmp_connected=$connected"
              if ($connected -eq $false) {
                Write-Host "=== RTMP disconnect verified: rtmp_connected=false ==="
                return
              }
            } catch {
              Write-Host "Attempt ${i}/${maxRetries}: API request failed: $_"
            }
            if ($i -lt $maxRetries) {
              Start-Sleep -Seconds $retryDelay
            }
          }
          throw "FAILED: rtmp_connected is still true after OBS stream stopped ($maxRetries attempts, $($maxRetries * $retryDelay)s). The inpoint state did not reset after RTMP client disconnected."

      - name: Deactivate streaming event
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          # Stop delivery (Hetzner VPS)
          try {
            $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
            $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
            if ($targetEvent) {
              $body = @{ event_id = $targetEvent.id } | ConvertTo-Json
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/stop" `
                -Method POST -Body $body -ContentType "application/json" -TimeoutSec 60
              Write-Host "Delivery stopped for event_id=$($targetEvent.id)"
            }
          } catch {
            Write-Host "Delivery stop failed: $_"
          }

          # Deactivate event on local client
          try {
            $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
            $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
            if ($targetEvent) {
              Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events/$($targetEvent.id)/deactivate" `
                -Method POST -TimeoutSec 10
              Write-Host "Deactivated $($env:EVENT_NAME) on local client (id=$($targetEvent.id))"
            }
          } catch {
            Write-Host "Local deactivation failed: $_"
          }
          # Always exit successfully - deactivation is best-effort cleanup
          exit 0

      - name: Verify delivery instances cleaned up
        if: always()
        shell: powershell
        timeout-minutes: 2
        run: |
          Write-Host "Verifying all delivery instances have been cleaned up..."
          $maxRetries = 6
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances" -TimeoutSec 10

              if (-not $instances -or $instances.Count -eq 0) {
                Write-Host "All delivery instances cleaned up"
                exit 0
              }

              Write-Host "--- Attempt ${i}/${maxRetries} ---"
              foreach ($inst in $instances) {
                Write-Host "  Instance: id=$($inst.id), status=$($inst.status), event_id=$($inst.event_id)"
              }

              if ($i -lt $maxRetries) {
                Write-Host "  Waiting 10s for cleanup..."
                Start-Sleep -Seconds 10
              }
            } catch {
              Write-Host "Request failed: $_"
              if ($i -lt $maxRetries) { Start-Sleep -Seconds 10 }
            }
          }
          throw "FAIL: Delivery instances still exist after $maxRetries attempts"

      - name: Verify YouTube stopped receiving after deactivation
        if: always() && steps.verify_yt_receiving.outcome == 'success'
        shell: powershell
        timeout-minutes: 4
        run: |
          # Post-deactivation check: verify YouTube's ingest server is no longer
          # receiving stream data after the event was deactivated.
          # Completes the 3-phase lifecycle: not-receiving → receiving → not-receiving.
          $maxRetries = 12
          $retryDelay = 15

          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "--- Attempt ${i}/${maxRetries}: checking YouTube stopped receiving ---"
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30

              Write-Host "  stream_receiving: $($response.stream_receiving)"
              Write-Host "  stream_count: $($response.stream_count)"

              if ($response.error) {
                Write-Host "  API error: $($response.error)"
                throw "YouTube API error: $($response.error)"
              }

              if ($response.streams) {
                foreach ($s in $response.streams) {
                  Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status), cdn_resolution=$($s.cdn_resolution), cdn_frame_rate=$($s.cdn_frame_rate), cdn_ingestion=$($s.cdn_ingestion_type)"
                }
              }

              if (-not $response.stream_receiving) {
                Write-Host "=========================================="
                Write-Host "  YOUTUBE CONFIRMED NOT RECEIVING (post-deactivation)"
                Write-Host "  3-phase lifecycle verified: inactive -> active -> inactive"
                Write-Host "=========================================="
                return
              }

              Write-Host "  YouTube still receiving stream data"
            } catch {
              Write-Host "  Request failed: $_"
            }

            if ($i -lt $maxRetries) {
              Write-Host "  Waiting ${retryDelay}s before retry..."
              Start-Sleep -Seconds $retryDelay
            }
          }

          throw "FAILED: YouTube is still receiving stream data after deactivation ($maxRetries attempts, ~$($maxRetries * $retryDelay)s). Deactivation did not stop delivery to YouTube."

      - name: Restore OBS scene
        if: always()
        shell: powershell
        run: |
          $origScene = "${{ steps.obs-scene.outputs.ORIG_SCENE }}"
          if (-not $origScene -or $origScene -eq "test") {
            Write-Host "Original scene was 'test' or empty - skipping restore"
            exit 0
          }

          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            $setScene = @{
              op = 6
              d = @{
                requestType = "SetCurrentProgramScene"
                requestId = "restore-scene-1"
                requestData = @{
                  sceneName = $origScene
                }
              }
            } | ConvertTo-Json -Depth 5
            Send-OBSMessage $ws $setScene
            $setResp = Receive-OBSMessage $ws
            Write-Host "OBS scene restored to '$origScene'"

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }
          } catch {
            Write-Host "WARNING: Failed to restore OBS scene: $_"
          }

      - name: Restore OBS encoder bitrate
        if: always()
        shell: powershell
        run: |
          $origBitrate = "${{ steps.obs-bitrate.outputs.ORIG_BITRATE }}"
          $encoderFile = "${{ steps.obs-bitrate.outputs.ENCODER_FILE }}"

          if (-not $origBitrate -or -not $encoderFile) {
            Write-Host "No original bitrate saved - skipping restore"
            exit 0
          }

          $origBitrateInt = [int]$origBitrate
          if (Test-Path $encoderFile) {
            $encoder = Get-Content $encoderFile -Raw | ConvertFrom-Json
            if ($encoder.bitrate -ne $origBitrateInt) {
              $ciBitrate = $encoder.bitrate
              $encoder.bitrate = $origBitrateInt
              $encoder | ConvertTo-Json | Set-Content $encoderFile -Encoding UTF8
              Write-Host "Restored bitrate to $origBitrateInt (was $ciBitrate)"

              # Restart OBS to pick up restored bitrate. Graceful close —
              # force-kill triggers the crash-recovery dialog on next launch.
              Write-Host "Asking OBS to quit (WM_CLOSE via Stop-Process)..."
              Get-Process obs64 -ErrorAction SilentlyContinue | ForEach-Object {
                $null = $_.CloseMainWindow()
              }
              $exited = $false
              for ($i = 1; $i -le 20; $i++) {
                Start-Sleep -Seconds 1
                if (-not (Get-Process obs64 -ErrorAction SilentlyContinue)) { $exited = $true; break }
              }
              if (-not $exited) {
                Write-Host "WARNING: OBS did not exit gracefully, escalating to force-kill"
                Stop-Process -Name obs64 -Force -ErrorAction SilentlyContinue
                Get-Process | Where-Object { $_.ProcessName -like "obs-*" } | Stop-Process -Force -ErrorAction SilentlyContinue
                Start-Sleep -Seconds 3
                Remove-Item -Force "$env:APPDATA\obs-studio\.sentinel" -ErrorAction SilentlyContinue
              }
              schtasks.exe /run /tn "Start OBS Studio"
              Start-Sleep -Seconds 20
              $obs = Get-Process obs64 -ErrorAction SilentlyContinue
              if ($obs) {
                Write-Host "OBS restarted with restored bitrate $origBitrateInt (PID: $($obs.Id))"
              } else {
                Write-Host "WARNING: OBS did not restart after bitrate restore"
              }
            } else {
              Write-Host "Bitrate already at $origBitrateInt, no restore needed"
            }
          } else {
            Write-Host "WARNING: Encoder file not found at $encoderFile"
          }

      - name: Restore OBS stream settings
        if: always()
        shell: powershell
        run: |
          $origServer = "${{ steps.obs-original.outputs.ORIG_SERVER }}"
          $origKey = "${{ steps.obs-original.outputs.ORIG_KEY }}"
          $origType = "${{ steps.obs-original.outputs.ORIG_TYPE }}"

          if (-not $origServer -or -not $origKey) {
            Write-Host "No original settings saved - skipping restore"
            exit 0
          }

          try {
            $ws = New-Object System.Net.WebSockets.ClientWebSocket
            $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
            $cts = New-Object System.Threading.CancellationTokenSource
            $cts.CancelAfter(10000)
            $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

            function Send-OBSMessage($ws, $message) {
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
              $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
              $cts2 = New-Object System.Threading.CancellationTokenSource
              $cts2.CancelAfter(10000)
              $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
            }

            function Receive-OBSMessage($ws) {
              $buffer = New-Object byte[] 65536
              $result = ""
              do {
                $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
                $cts3 = New-Object System.Threading.CancellationTokenSource
                $cts3.CancelAfter(10000)
                $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
                $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
              } while (-not $recv.EndOfMessage)
              return $result | ConvertFrom-Json
            }

            $hello = Receive-OBSMessage $ws
            $authRequired = $hello.d.authentication
            if ($authRequired) {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $passBytes = [System.Text.Encoding]::UTF8.GetBytes($env:OBS_WS_PASSWORD + $authRequired.salt)
              $passHash = [Convert]::ToBase64String($sha256.ComputeHash($passBytes))
              $authBytes = [System.Text.Encoding]::UTF8.GetBytes($passHash + $authRequired.challenge)
              $authHash = [Convert]::ToBase64String($sha256.ComputeHash($authBytes))
              $identify = @{ op = 1; d = @{ rpcVersion = 1; authentication = $authHash } } | ConvertTo-Json -Depth 5
            } else {
              $identify = @{ op = 1; d = @{ rpcVersion = 1 } } | ConvertTo-Json -Depth 5
            }
            Send-OBSMessage $ws $identify
            $identified = Receive-OBSMessage $ws

            # Restore original settings
            $serviceType = if ($origType) { $origType } else { "rtmp_custom" }
            $setSettings = @{
              op = 6
              d = @{
                requestType = "SetStreamServiceSettings"
                requestId = "restore-settings-1"
                requestData = @{
                  streamServiceType = $serviceType
                  streamServiceSettings = @{
                    server = $origServer
                    key = $origKey
                  }
                }
              }
            } | ConvertTo-Json -Depth 5

            Send-OBSMessage $ws $setSettings
            $setResp = Receive-OBSMessage $ws
            Write-Host "Restore command sent"

            # Verify by reading back current settings
            $getSettings = @{
              op = 6
              d = @{
                requestType = "GetStreamServiceSettings"
                requestId = "verify-restore-1"
              }
            } | ConvertTo-Json -Depth 5
            Send-OBSMessage $ws $getSettings
            $verifyResp = Receive-OBSMessage $ws
            $currentServer = $verifyResp.d.responseData.streamServiceSettings.server
            if ($currentServer -ne $origServer) {
              throw "OBS restore FAILED: expected '$origServer', got '$currentServer'"
            }
            Write-Host "VERIFIED: OBS restored to $origServer"

            try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }
          } catch {
            Write-Host "ERROR: Failed to restore OBS settings: $_"
            Write-Host "OBS may be misconfigured - check stream settings manually"
            exit 1
          }

      - name: Verify cache_delay_secs unchanged
        if: always()
        shell: powershell
        env:
          EVENT_NAME: "E2E-Test"
        run: |
          # No restore needed — CI no longer patches cache_delay_secs.
          # Just verify it's still 120s (the production config value).
          $events = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/events" -TimeoutSec 10
          $targetEvent = $events | Where-Object { $_.name -eq $env:EVENT_NAME }
          if ($targetEvent -and $targetEvent.cache_delay_secs -ne 120) {
            Write-Host "WARNING: cache_delay_secs is $($targetEvent.cache_delay_secs), expected 120"
          } else {
            Write-Host "OK: cache_delay_secs=120"
          }

      - name: Verify production config is intact
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "=== CHECK 7: Hetzner API token present ==="
          $configPath = "C:\ProgramData\Restreamer\config.json"
          if (-not (Test-Path $configPath)) {
            Write-Error "FAIL: Config file not found at $configPath"
            exit 1
          }

          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          if (-not $config.hetzner -or [string]::IsNullOrWhiteSpace($config.hetzner.api_token)) {
            Write-Error "FAIL: Hetzner API token is missing from production config"
            Write-Host "Delivery functionality will fail without this token"
            exit 1
          }
          Write-Host "OK: Hetzner API token present"

          Write-Host "=== CHECK 8: Delivery API accessible ==="
          try {
            $instances = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/delivery/instances" -TimeoutSec 10
            Write-Host "OK: Delivery API accessible - instances: $($instances.Count)"
          } catch {
            Write-Error "FAIL: Delivery API not working - DeliveryOrchestrator may not be available"
            Write-Host "Error: $_"
            exit 1
          }

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "PRODUCTION CONFIG VERIFIED"
          Write-Host "=========================================="

  e2e-gate:
    name: E2E Gate
    if: always()
    needs: [rust-ci-gate, e2e-streaming-test, e2e-obs-youtube-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "rust-ci-gate:          ${{ needs.rust-ci-gate.result }}"
          echo "e2e-streaming-test:    ${{ needs.e2e-streaming-test.result }}"
          echo "e2e-obs-youtube-test:  ${{ needs.e2e-obs-youtube-test.result }}"

          # Gate must always pass
          if [[ "${{ needs.rust-ci-gate.result }}" != "success" ]]; then
            echo "FAIL: rust-ci-gate did not succeed"
            exit 1
          fi

          # On push/workflow_dispatch to dev/main, E2E tests MUST succeed -- no exceptions
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ needs.e2e-streaming-test.result }}" != "success" ]]; then
              echo "FAIL: E2E Streaming Test did not succeed (result: ${{ needs.e2e-streaming-test.result }})"
              echo "E2E tests must pass on every dev/main run."
              exit 1
            fi
            if [[ "${{ needs.e2e-obs-youtube-test.result }}" != "success" ]]; then
              echo "FAIL: E2E OBS-to-YouTube Test did not succeed (result: ${{ needs.e2e-obs-youtube-test.result }})"
              echo "E2E tests must pass on every dev/main run."
              exit 1
            fi
            echo "All E2E tests passed!"
          else
            # On PR events, E2E tests don't run here -- but a push-triggered run
            # for the same commit DOES run E2E tests. We must check that run's
            # E2E Gate result to prevent a green PR when push E2E tests fail.
            echo "PR event: checking push-triggered E2E Gate for commit ${{ github.event.pull_request.head.sha }}..."
            SHA="${{ github.event.pull_request.head.sha }}"
            MAX_WAIT=100
            WAIT_INTERVAL=30
            for i in $(seq 1 $MAX_WAIT); do
              # Find E2E Gate check run from the push-triggered workflow on this commit.
              # Filter out check runs from the current workflow run by matching the run ID
              # in the details_url (check_run.id != github.run_id doesn't work because
              # they're different ID namespaces).
              PUSH_GATE=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs?check_name=E2E+Gate&per_page=100" \
                --jq "[.check_runs[] | select(.details_url | test(\"/${{ github.run_id }}/\") | not)] | sort_by(.started_at) | last")

              if [[ -z "$PUSH_GATE" || "$PUSH_GATE" == "null" ]]; then
                echo "Attempt $i/$MAX_WAIT: Push-triggered E2E Gate not found yet, waiting ${WAIT_INTERVAL}s..."
                sleep $WAIT_INTERVAL
                continue
              fi

              STATUS=$(echo "$PUSH_GATE" | jq -r '.status')
              CONCLUSION=$(echo "$PUSH_GATE" | jq -r '.conclusion')
              RUN_URL=$(echo "$PUSH_GATE" | jq -r '.html_url')

              echo "Push E2E Gate: status=$STATUS conclusion=$CONCLUSION"
              echo "Run: $RUN_URL"

              if [[ "$STATUS" == "completed" ]]; then
                if [[ "$CONCLUSION" == "success" ]]; then
                  echo "Push-triggered E2E Gate passed!"
                  break
                else
                  echo "FAIL: Push-triggered E2E Gate did not succeed (conclusion: $CONCLUSION)"
                  echo "PR cannot be green when push E2E tests fail."
                  exit 1
                fi
              fi

              echo "Attempt $i/$MAX_WAIT: Push E2E Gate still running ($STATUS), waiting ${WAIT_INTERVAL}s..."
              sleep $WAIT_INTERVAL
            done

            if [[ "$STATUS" != "completed" ]]; then
              echo "FAIL: Push-triggered E2E Gate did not complete after $((MAX_WAIT * WAIT_INTERVAL))s"
              exit 1
            fi
          fi

          echo "All CI checks passed!"

  auto-release:
    name: Auto-release tag
    needs: [e2e-gate]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.e2e-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="restreamer-v${VERSION}"
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"
          echo "Triggering release workflow..."
          gh workflow run release.yml -f tag="$TAG"
          echo "Release workflow triggered for $TAG"
