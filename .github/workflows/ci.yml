      - name: Set OBS encoder bitrate to 12000 for CI
        id: obs-bitrate
        shell: powershell
        run: |
          # OBS Advanced mode stores encoder bitrate in streamEncoder.json
          # CI requires 12000 kbps for YouTube 'good' health verdict
          # CI runner runs as SYSTEM -- use newlevel user's AppData explicitly
          $userAppData = "C:\Users\newlevel\AppData\Roaming"
          $profileDir = "$userAppData\obs-studio\basic\profiles"
          $globalIni = "$userAppData\obs-studio\global.ini"

          # Detect active profile from OBS global config
          $profileMatch = Select-String -Path $globalIni -Pattern "^Profile=" -ErrorAction SilentlyContinue
          if ($profileMatch) {
            $activeProfile = $profileMatch.Line.Split("=", 2)[1].Trim()
          }
          if (-not $activeProfile) {
            # Fallback: use first profile directory that has streamEncoder.json
            $activeProfile = (Get-ChildItem $profileDir -Directory | Where-Object {
              Test-Path "$($_.FullName)\streamEncoder.json"
            } | Select-Object -First 1).Name
          }
          if (-not $activeProfile) {
            throw "Cannot detect active OBS profile"
          }

          $encoderFile = "$profileDir\$activeProfile\streamEncoder.json"
          Write-Host "Active profile: $activeProfile"
          Write-Host "Encoder config: $encoderFile"

          if (Test-Path $encoderFile) {
            $encoder = Get-Content $encoderFile -Raw | ConvertFrom-Json
            $origBitrate = $encoder.bitrate
            Write-Host "Original bitrate: $origBitrate"
            "ORIG_BITRATE=$origBitrate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "ENCODER_FILE=$encoderFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            if ($origBitrate -ne 12000) {
              $encoder.bitrate = 12000
              $encoder | ConvertTo-Json | Set-Content $encoderFile -Encoding UTF8
              Write-Host "Bitrate set to 12000 for CI (was $origBitrate)"

              # OBS reads streamEncoder.json on stream start, so restart OBS
              # to ensure the new bitrate takes effect.
              #
              # CRITICAL: gracefully close OBS (WM_CLOSE) — NOT force-kill.
              # Force-kill leaves OBS's .sentinel file on disk and OBS shows
              # the "last session did not shut down cleanly" recovery dialog
              # on the next launch, which hangs OBS at ~18 MB. The dialog
              # blocks startup EVEN WITH --disable-shutdown-check (flag
              # suppresses the error message but not the interactive prompt).
              # WM_CLOSE lets OBS run its normal shutdown path which deletes
              # the sentinel — the next launch is clean.
              Write-Host "Asking OBS to quit (WM_CLOSE via Stop-Process)..."
              # Stop-Process (no -Force) sends CloseMainWindow (WM_CLOSE) to
              # OBS's main window. OBS runs its normal shutdown, deletes
              # .sentinel. We do NOT use `taskkill /T` because it writes to
              # stderr when child browser processes don't acknowledge in time,
              # which PowerShell with $ErrorActionPreference=Stop treats as
              # a step failure even though the main OBS process is exiting
              # normally.
              Get-Process obs64 -ErrorAction SilentlyContinue | ForEach-Object {
                $null = $_.CloseMainWindow()
              }
              $exited = $false
              for ($i = 1; $i -le 20; $i++) {
                Start-Sleep -Seconds 1
                if (-not (Get-Process obs64 -ErrorAction SilentlyContinue)) { $exited = $true; break }
              }
              if (-not $exited) {
                Write-Host "WARNING: OBS did not exit gracefully in 20s, escalating to force-kill"
                Stop-Process -Name obs64 -Force -ErrorAction SilentlyContinue
                Get-Process | Where-Object { $_.ProcessName -like "obs-*" } | Stop-Process -Force -ErrorAction SilentlyContinue
                Start-Sleep -Seconds 3
              }
              # ALWAYS clean leftover child processes + sentinel/safe_mode
              # markers before relaunch. Even with a "graceful" CloseMainWindow,
              # OBS doesn't reliably delete .sentinel on Windows when child
              # browser-page processes are still alive at exit, and the
              # next launch then shows the crash-recovery dialog (OBS hung
              # at 25 MB with WS port closed).
              Get-Process | Where-Object { $_.ProcessName -like "obs-*" } | Stop-Process -Force -ErrorAction SilentlyContinue
              Remove-Item -Force "$env:APPDATA\obs-studio\.sentinel" -ErrorAction SilentlyContinue
              Remove-Item -Force "$env:APPDATA\obs-studio\safe_mode" -ErrorAction SilentlyContinue
              schtasks.exe /run /tn "Start OBS Studio"
              if ($LASTEXITCODE -ne 0) { throw "Failed to restart OBS after bitrate change" }

              # Wait for OBS to be fully up: memory > 500MB AND WebSocket
              # port 4455 open. Healthy OBS on stream.lan reports ~1.3 GB;
              # the old 50MB threshold let partial/crash-dialog states pass
              # and the next test step then failed on WS-connect.
              $ready = $false
              for ($i = 1; $i -le 60; $i++) {
                Start-Sleep -Seconds 2
                $obs = Get-Process obs64 -ErrorAction SilentlyContinue
                if (-not $obs) { continue }
                $mem = [math]::Round($obs.WorkingSet64 / 1MB)
                $wsOpen = (Test-NetConnection -ComputerName 127.0.0.1 -Port 4455 -WarningAction SilentlyContinue -InformationLevel Quiet)
                Write-Host "OBS startup wait ${i}/60: mem=${mem}MB ws4455=$wsOpen"
                if ($mem -ge 500 -and $wsOpen) { $ready = $true; break }
              }
              if (-not $ready) {
                $obs = Get-Process obs64 -ErrorAction SilentlyContinue
                $mem = if ($obs) { [math]::Round($obs.WorkingSet64 / 1MB) } else { 0 }
                throw "OBS did not fully start after bitrate change (mem=${mem}MB, ws4455 not reachable). Recovery dialog may be blocking startup."
              }
              Write-Host "OBS restarted with 12000 kbps bitrate (PID: $($obs.Id), Memory: $([math]::Round($obs.WorkingSet64/1MB))MB)"
            } else {
              Write-Host "Bitrate already 12000, no change needed"
              "ORIG_BITRATE=12000" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              "ENCODER_FILE=$encoderFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            }
          } else {
            Write-Host "WARNING: streamEncoder.json not found at $encoderFile - cannot set bitrate"
            "ORIG_BITRATE=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "ENCODER_FILE=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: "Baseline: OBS direct-to-YouTube RTMP (prove OBS works)"
        shell: powershell
        timeout-minutes: 4
        run: |
          # Stream directly from OBS to YouTube RTMP to prove OBS+YouTube
          # work fine. If this fails, the problem is OBS/YouTube, not restreamer.
          $ws = New-Object System.Net.WebSockets.ClientWebSocket
          $uri = [Uri]"ws://$($env:OBS_WS_HOST):$($env:OBS_WS_PORT)"
          $cts = New-Object System.Threading.CancellationTokenSource
          $cts.CancelAfter(10000)
          $ws.ConnectAsync($uri, $cts.Token).GetAwaiter().GetResult()

          function Send-OBSMessage($ws, $message) {
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($message)
            $segment = [ArraySegment[byte]]::new($bytes, 0, $bytes.Length)
            $cts2 = New-Object System.Threading.CancellationTokenSource
            $cts2.CancelAfter(10000)
            $ws.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $cts2.Token).GetAwaiter().GetResult()
          }

          function Receive-OBSMessage($ws) {
            $buffer = New-Object byte[] 65536
            $result = ""
            do {
              $segment = [ArraySegment[byte]]::new($buffer, 0, $buffer.Length)
              $cts3 = New-Object System.Threading.CancellationTokenSource
              $cts3.CancelAfter(10000)
              $recv = $ws.ReceiveAsync($segment, $cts3.Token).GetAwaiter().GetResult()
              $result += [System.Text.Encoding]::UTF8.GetString($buffer, 0, $recv.Count)
            } while (-not $recv.EndOfMessage)
            return $result | ConvertFrom-Json
          }

          # Identify with OBS
          $hello = Receive-OBSMessage $ws
          $identify = @{
            op = 1
            d = @{
              rpcVersion = 1
            }
          } | ConvertTo-Json -Depth 5
          Send-OBSMessage $ws $identify
          $identified = Receive-OBSMessage $ws

          # Point OBS directly to YouTube RTMP
          $setSettings = @{
            op = 6
            d = @{
              requestType = "SetStreamServiceSettings"
              requestId = "baseline-set-yt"
              requestData = @{
                streamServiceType = "rtmp_custom"
                streamServiceSettings = @{
                  server = "rtmp://a.rtmp.youtube.com/live2"
                  key = "5jya-pz2d-51x5-mbx4-ddvs"
                }
              }
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $setSettings
          $setResp = Receive-OBSMessage $ws
          Write-Host "OBS pointed to YouTube RTMP for baseline test"

          # Start streaming
          $startStream = @{
            op = 6
            d = @{
              requestType = "StartStream"
              requestId = "baseline-start"
            }
          } | ConvertTo-Json -Depth 5

          Send-OBSMessage $ws $startStream
          $startResp = Receive-OBSMessage $ws
          Write-Host "OBS baseline stream started to YouTube RTMP"

          try { $ws.CloseAsync([System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure, "", [System.Threading.CancellationToken]::None).GetAwaiter().GetResult() } catch { }

          # Wait for YouTube to receive and fully analyze the stream.
          # Must wait long enough for YouTube to detect bitrate issues
          # (short waits give false "good" before analysis completes).
          Write-Host "Waiting 180 seconds for YouTube to fully analyze direct stream..."
          Start-Sleep -Seconds 180

      - name: "Baseline: Verify YouTube plays OBS direct stream"
        shell: powershell
        timeout-minutes: 4
        run: |
          # Verify YouTube receives AND plays the direct OBS stream.
          # Uses the API (broadcast_testing=true proves video preview renders).
          # If this fails, the problem is OBS/YouTube, not restreamer.
          $maxRetries = 12
          $retryDelay = 15

          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "--- Baseline attempt ${i}/${maxRetries} ---"
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/youtube/status" -TimeoutSec 30
              $baselineHealth = ""
              Write-Host "  stream_receiving: $($response.stream_receiving)"

              if ($response.streams) {
                foreach ($s in $response.streams) {
                  Write-Host "  Stream '$($s.title)': status=$($s.stream_status), health=$($s.health_status)"
                  if ($s.stream_status -eq "active") {
                    $baselineHealth = $s.health_status
                  }
                  if ($s.configuration_issues -and $s.configuration_issues.Count -gt 0) {
                    foreach ($issue in $s.configuration_issues) {
                      Write-Host "    ISSUE: $issue"
                    }
                  }
                }
              }

              if ($response.stream_receiving -and $baselineHealth -eq "good") {
                Write-Host ""
                Write-Host "=========================================="
                Write-Host "  BASELINE: OBS direct health=good"
                Write-Host "=========================================="
                return
              }

              if ($response.stream_receiving -and $baselineHealth) {
                Write-Host "  OBS baseline: stream active but health='${baselineHealth}' (not good yet)"
              }
            } catch {
              Write-Host "  Request failed: $_"
            }

            if ($i -lt $maxRetries) {
              Start-Sleep -Seconds $retryDelay
            }
          }

          Write-Host "WARNING: OBS baseline health=${baselineHealth} (not good). Both OBS and restreamer have this issue."
          Write-Host "This means the stream key/YouTube CDN config is the problem, not restreamer."

