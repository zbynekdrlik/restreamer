name: Dev Deploy to stream.lan

on:
  workflow_run:
    workflows: ["Rust CI"]
    types: [completed]
    branches: [dev]

concurrency:
  group: dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to stream.lan
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, windows, stream-lan]
    steps:
      - name: Download service artifact
        uses: actions/download-artifact@v4
        with:
          name: restreamer-service-windows-latest
          path: artifacts/service
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: restreamer-tauri-installer
          path: artifacts/tauri
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        run: |
          Write-Host "=== Downloaded Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem -Recurse artifacts | Format-Table Name, Length, LastWriteTime

      - name: Stop existing service
        run: |
          $svc = Get-Service -Name "restreamer-service" -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -eq "Running") {
            Write-Host "Stopping restreamer-service..." -ForegroundColor Yellow
            Stop-Service -Name "restreamer-service" -Force
            Start-Sleep -Seconds 2
            Write-Host "Service stopped" -ForegroundColor Green
          } else {
            Write-Host "Service not running or not found" -ForegroundColor Gray
          }

      - name: Stop tray app
        run: |
          Get-Process -Name "Restreamer" -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep -Seconds 1

      - name: Install service binary
        run: |
          $InstallDir = "C:\Program Files\Restreamer"
          $serviceBin = Get-ChildItem -Path "artifacts/service" -Filter "*.exe" | Select-Object -First 1

          if (-not $serviceBin) {
            Write-Error "No service binary found in artifacts"
            exit 1
          }

          New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null
          Copy-Item $serviceBin.FullName "$InstallDir\restreamer-service.exe" -Force
          Write-Host "Installed: $($serviceBin.Name) -> $InstallDir\restreamer-service.exe" -ForegroundColor Green

      - name: Install Tauri app (silent)
        run: |
          $installer = Get-ChildItem -Path "artifacts/tauri" -Filter "*setup*.exe" | Select-Object -First 1

          if (-not $installer) {
            Write-Warning "No Tauri installer found - skipping tray app update"
            exit 0
          }

          Write-Host "Running Tauri installer: $($installer.Name)" -ForegroundColor Yellow
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          Write-Host "Tauri app installed" -ForegroundColor Green

      - name: Register Windows service (if needed)
        run: |
          $ServiceName = "restreamer-service"
          $InstallDir = "C:\Program Files\Restreamer"
          $ConfigFile = "C:\ProgramData\Restreamer\config.json"

          $existingSvc = Get-Service -Name $ServiceName -ErrorAction SilentlyContinue
          if (-not $existingSvc) {
            Write-Host "Registering Windows service..." -ForegroundColor Yellow
            sc.exe create $ServiceName binPath= "`"$InstallDir\restreamer-service.exe`" `"$ConfigFile`"" start= auto DisplayName= "Restreamer Service" | Out-Null
            sc.exe description $ServiceName "Restreamer local client service - RTMP capture, chunk upload, manager sync" | Out-Null
            Write-Host "Service registered" -ForegroundColor Green
          } else {
            Write-Host "Service already registered" -ForegroundColor Gray
          }

      - name: Start service
        run: |
          Write-Host "Starting restreamer-service..." -ForegroundColor Yellow
          Start-Service -Name "restreamer-service"
          Start-Sleep -Seconds 2

          $svc = Get-Service -Name "restreamer-service"
          if ($svc.Status -eq "Running") {
            Write-Host "Service started successfully" -ForegroundColor Green
          } else {
            Write-Error "Service failed to start: $($svc.Status)"
            exit 1
          }

      - name: Launch tray app
        run: |
          $trayPath = "$env:LOCALAPPDATA\Restreamer\Restreamer.exe"
          if (Test-Path $trayPath) {
            Write-Host "Launching tray app..." -ForegroundColor Yellow
            Start-Process -FilePath $trayPath
            Write-Host "Tray app launched" -ForegroundColor Green
          } else {
            Write-Warning "Tray app not found at $trayPath"
          }

      - name: Verify deployment
        run: |
          Write-Host ""
          Write-Host "=== Deployment Verification ===" -ForegroundColor Cyan

          # Check service status
          $svc = Get-Service -Name "restreamer-service"
          Write-Host "Service Status: $($svc.Status)" -ForegroundColor $(if ($svc.Status -eq "Running") { "Green" } else { "Red" })

          # Check API health
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:8910/api/v1/health" -TimeoutSec 5
            Write-Host "API Health: OK" -ForegroundColor Green
          } catch {
            Write-Warning "API Health check failed: $_"
          }

          # Get service version
          $servicePath = "C:\Program Files\Restreamer\restreamer-service.exe"
          if (Test-Path $servicePath) {
            $version = (Get-Item $servicePath).VersionInfo.FileVersion
            Write-Host "Service Binary Version: $version" -ForegroundColor Cyan
          }

          Write-Host ""
          Write-Host "Dev deployment to stream.lan complete!" -ForegroundColor Green
